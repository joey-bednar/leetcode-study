- id: 49
  title: "Group Anagrams"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, String, Sorting]
  verified: true
  description: |
    Given an array of strings `strs`, group **the anagrams** together. You can return the answer
    in **any order**.

    **Example 1:**
      Input:  strs = ["eat","tea","tan","ate","nat","bat"]
      Output: [["bat"],["nat","tan"],["ate","eat","tea"]]

    **Example 2:**
      Input:  strs = [""]
      Output: [[""]]

    **Example 3:**
      Input:  strs = ["a"]
      Output: [["a"]]

    **Constraints:**
      - 1 <= strs.length <= 10^4
      - 0 <= strs[i].length <= 100
      - strs[i] consists of lowercase English letters.
  time: "O(m * n)"
  space: "O(m), O(m * n) space for the output list"
  approach: |
    Count the frequency of each character in a string, convert to a 26 index
    tuple. Create a dict(key=tuple,value=list of strings with matching char
    counts). Loop through the dict and print the arrays of strings.
  solution: |
    def groupAnagrams(self, strs: List[str]) -> List[List[str]]:
        res = defaultdict(list)
        for s in strs:
            count = [0] * 26
            for c in s:
                count[ord(c) - ord('a')] += 1
            res[tuple(count)].append(s)
        return list(res.values())
- id: 50
  title: "Pow(x, n)"
  difficulty: Medium
  tags: [Neetcode 150, Math, Recursion]
  time: "O(log n)"
  space: "O(1)"
  description: |
    Implement `pow(x, n)`, which calculates `x` raised to the power `n` (i.e., `x^n`).

    **Example 1:**
    Input: x = 2.00000, n = 10
    Output: 1024.00000

    **Example 2:**
    Input: x = 2.10000, n = 3
    Output: 9.26100

    **Example 3:**
    Input: x = 2.00000, n = -2
    Output: 0.25000
    Explanation: 2^-2 = 1/2^2 = 1/4 = 0.25

    **Constraints:**
    - `-100.0 < x < 100.0`
    - `-2^31 <= n <= 2^31 - 1`
    - `n` is an integer.
    - Either `x` is not zero or `n > 0`.
    - `-10^4 <= x^n <= 10^4`
  approach: |
    Use binary exponentiation (fast power). When the current exponent is even, square the base and halve the exponent; when odd, multiply the result by the current base, then square and halve. This reduces the problem logarithmically. Handle negative exponents by computing the positive case and returning its reciprocal.
  solution: |
    class Solution:
        def myPow(self, x: float, n: int) -> float:
            if x == 0:
                return 0
            if n == 0:
                return 1

            res = 1
            power = abs(n)

            while power:
                if power & 1:
                    res *= x
                x *= x
                power >>= 1

            return res if n >= 0 else 1 / res
