- id: 67
  title: "Add Binary"
  difficulty: Easy
  tags: [Math, String, Bit Manipulation, Simulation]
  verified: false
  description: |
    Given two binary strings `a` and `b`, return their sum as a binary string.

    **Example 1:**
      Input: a = "11", b = "1"
      Output: "100"

    **Example 2:**
      Input: a = "1010", b = "1011"
      Output: "10101"

    **Constraints:**
      - 1 <= a.length, b.length <= 10^4
      - a and b consist only of '0' or '1' characters.
      - Each string does not contain leading zeros except for the zero itself.
  time: "O(max(m, n))"
  space: "O(max(m, n))"
  approach: |
    Use two pointers starting at the rightmost positions of both strings and work
    right to left, maintaining a carry. At each step, sum the digits plus carry;
    the result digit is (sum % 2) and the new carry is (sum // 2). Continue until
    both pointers are exhausted and carry is 0, then reverse the accumulated result.
  solution: |
    class Solution:
        def addBinary(self, a: str, b: str) -> str:
            res = []
            carry = 0

            i, j = len(a) - 1, len(b) - 1
            while i >= 0 or j >= 0 or carry > 0:
                digitA = int(a[i]) if i >= 0 else 0
                digitB = int(b[j]) if j >= 0 else 0

                total = digitA + digitB + carry
                res.append(total % 2)
                carry = total // 2

                i -= 1
                j -= 1

            res.reverse()
            return ''.join(map(str, res))
- id: 70
  title: "Climbing Stairs"
  difficulty: Easy
  tags: [Neetcode 150, Math, Dynamic Programming, Memoization]
  verified: false
  description: |
    You are given an integer `n` representing the number of steps to reach the top of a
    staircase. You can climb with either 1 or 2 steps at a time.

    Return the number of distinct ways to climb to the top.

    **Example 1:**
      Input:  n = 2
      Output: 2
      Explanation: 1+1=2 or 2=2

    **Example 2:**
      Input:  n = 3
      Output: 3
      Explanation: 1+1+1=3, 1+2=3, or 2+1=3

    **Constraints:**
      - 1 <= n <= 45
  time: "O(n)"
  space: "O(1)"
  approach: |
    This problem follows a Fibonacci pattern. At each step, you can arrive from either the
    previous step (1 step back) or two steps back. The ways to reach step i equals the sum of
    ways to reach steps i-1 and i-2. Use two variables to track only the previous two values,
    reducing space to O(1) while maintaining O(n) time.
  solution: |
    class Solution:
        def climbStairs(self, n: int) -> int:
            one, two = 1, 1
            for i in range(n - 1):
                temp = one
                one = one + two
                two = temp
            return one
- id: 72
  title: "Edit Distance"
  difficulty: Medium
  tags: [Neetcode 150, String, Dynamic Programming]
  verified: false
  description: |
    You are given two strings `word1` and `word2`, each consisting of lowercase English
    letters. You are allowed to perform three operations on `word1` any number of times:
    - Insert a character at any position
    - Delete a character at any position
    - Replace a character at any position

    Return the minimum number of operations to make `word1` equal to `word2`.

    **Example 1:**
      Input:  word1 = "monkeys", word2 = "money"
      Output: 2
      Explanation: monkeys -> monkey (remove s) -> money (remove k)

    **Example 2:**
      Input:  word1 = "neatcdee", word2 = "neetcode"
      Output: 3

    **Constraints:**
      - 0 <= word1.length, word2.length <= 100
      - word1 and word2 consist of lowercase English letters
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use dynamic programming where `dp[i][j]` represents the minimum edit distance to transform
    `word1[i:]` into `word2[j:]`. Compare characters at each position: if they match, no
    operation is needed — move forward in both strings. If they don't match, consider three
    options: delete from word1 (advance i), insert into word1 (advance j), or replace the
    character (advance both). Take the minimum cost and add 1. Handle base cases where either
    string is exhausted by inserting or deleting remaining characters.
  solution: |
    class Solution:
        def minDistance(self, word1: str, word2: str) -> int:
            m, n = len(word1), len(word2)
            if m < n:
                m, n = n, m
                word1, word2 = word2, word1

            dp = [n - i for i in range(n + 1)]

            for i in range(m - 1, -1, -1):
                nextDp = dp[n]
                dp[n] = m - i
                for j in range(n - 1, -1, -1):
                    temp = dp[j]
                    if word1[i] == word2[j]:
                        dp[j] = nextDp
                    else:
                        dp[j] = 1 + min(dp[j], dp[j + 1], nextDp)
                    nextDp = temp

            return dp[0]
- id: 73
  title: "Set Matrix Zeroes"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, Matrix]
  time: "O(m * n)"
  space: "O(1)"
  description: |
    Given an `m x n` integer matrix `matrix`, if an element is `0`, set its entire row and column to `0`'s.

    You must do it **in place**.

    **Example 1:**
    Input: matrix = [[1,1,1],[1,0,1],[1,1,1]]
    Output: [[1,0,1],[0,0,0],[1,0,1]]

    **Example 2:**
    Input: matrix = [[0,1,2,0],[3,4,5,2],[1,3,1,5]]
    Output: [[0,0,0,0],[0,4,5,0],[0,3,1,0]]

    **Constraints:**
    - `m == matrix.length`
    - `n == matrix[0].length`
    - `1 <= m, n <= 200`
    - `-2^31 <= matrix[i][j] <= 2^31 - 1`
  approach: |
    Reuse the first row and first column as markers to avoid extra space. For each zero found in the matrix, mark its column at matrix[0][c] and its row at matrix[r][0]. Since matrix[0][0] would be shared between both markers, use a separate boolean flag for whether the first row itself needs zeroing. Apply the markers to inner cells first, then zero the first column based on matrix[0][0], then zero the first row based on the flag.
  solution: |
    class Solution:
        def setZeroes(self, matrix: List[List[int]]) -> None:
            ROWS, COLS = len(matrix), len(matrix[0])
            rowZero = False

            for r in range(ROWS):
                for c in range(COLS):
                    if matrix[r][c] == 0:
                        matrix[0][c] = 0
                        if r > 0:
                            matrix[r][0] = 0
                        else:
                            rowZero = True

            for r in range(1, ROWS):
                for c in range(1, COLS):
                    if matrix[0][c] == 0 or matrix[r][0] == 0:
                        matrix[r][c] = 0

            if matrix[0][0] == 0:
                for r in range(ROWS):
                    matrix[r][0] = 0

            if rowZero:
                for c in range(COLS):
                    matrix[0][c] = 0
  verified: false
- id: 74
  title: "Search a 2D Matrix"
  difficulty: Medium
  tags: [Neetcode 150, Array, Binary Search, Matrix]
  verified: false
  description: |
    You are given an `m x n` integer matrix `matrix` with the following two properties:
      - Each row is sorted in non-decreasing order.
      - The first integer of each row is greater than the last integer of the previous row.

    Given an integer `target`, return `true` if `target` is in `matrix` or `false` otherwise.

    You must write a solution in `O(log(m * n))` time complexity.

    **Example 1:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3
      Output: true

    **Example 2:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 13
      Output: false

    **Constraints:**
      - m == matrix.length
      - n == matrix[0].length
      - 1 <= m, n <= 100
      - -10^4 <= matrix[i][j] <= 10^4
  time: "O(log(m * n))"
  space: "O(1)"
  approach: |
    Treat the 2D matrix as a flattened 1D sorted array of length m*n. Binary search from 0 to m*n-1. For each midpoint, convert to 2D coordinates: row = mid // COLS, col = mid % COLS. Compare matrix[row][col] to target and adjust l or r.
  solution: |
    class Solution:
        def searchMatrix(self, matrix: List[List[int]], target: int) -> bool:
            ROWS, COLS = len(matrix), len(matrix[0])

            l, r = 0, ROWS * COLS - 1
            while l <= r:
                m = l + (r - l) // 2
                row, col = m // COLS, m % COLS
                if target > matrix[row][col]:
                    l = m + 1
                elif target < matrix[row][col]:
                    r = m - 1
                else:
                    return True
            return False
- id: 75
  title: "Sort Colors"
  difficulty: Medium
  tags: [Array, Two Pointers, Sorting]
  verified: false
  description: |
    Given an array `nums` with `n` objects colored red, white, or blue, sort them
    in-place so that objects of the same color are adjacent, with the colors in the
    order red, white, and blue.

    We will use the integers `0`, `1`, and `2` to represent the color red, white,
    and blue, respectively.

    You must solve this problem without using the library's sort function.

    **Example 1:**
      Input: nums = [2,0,2,1,1,0]
      Output: [0,0,1,1,2,2]

    **Example 2:**
      Input: nums = [2,0,1]
      Output: [0,1,2]

    **Constraints:**
      - n == nums.length
      - 1 <= n <= 300
      - nums[i] is either 0, 1, or 2.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use the Dutch National Flag algorithm with three pointers: one for the boundary
    of 0s (left), one for 2s (right), and one for the current position. When the
    current element is 0, swap it to the left boundary; when it is 2, swap it to
    the right boundary without advancing the current pointer (the swapped value still
    needs evaluation); leave 1s in place.
  solution: |
    class Solution:
        def sortColors(self, nums: List[int]) -> None:
            zero = one = 0
            for two in range(len(nums)):
                tmp = nums[two]
                nums[two] = 2
                if tmp < 2:
                    nums[one] = 1
                    one += 1
                if tmp < 1:
                    nums[zero] = 0
                    zero += 1
- id: 76
  title: "Minimum Window Substring"
  difficulty: Hard
  tags: [Neetcode 150, Hash Table, String, Sliding Window]
  verified: false
  description: |
    Given two strings `s` and `t` of lengths `m` and `n` respectively, return the **minimum
    window substring** of `s` such that every character in `t` (including duplicates) is
    included in the window. If there is no such substring, return the empty string `""`.

    The testcases will be generated such that the answer is **unique**.

    **Example 1:**
      Input:  s = "ADOBECODEBANC", t = "ABC"
      Output: "BANC"
      Explanation: The minimum window substring "BANC" includes 'A', 'B', and 'C' from
        string t.

    **Example 2:**
      Input:  s = "a", t = "a"
      Output: "a"
      Explanation: The entire string s is the minimum window.

    **Example 3:**
      Input:  s = "a", t = "aa"
      Output: ""
      Explanation: Both 'a's from t must be included in the window. Since the largest window
        of s only has one 'a', return empty string.

    **Constraints:**
      - m == s.length
      - n == t.length
      - 1 <= m, n <= 10^5
      - s and t consist of uppercase and lowercase English letters.

    **Follow up:** Could you find an algorithm that runs in `O(m + n)` time?
  time: "O(n + m)"
  space: "O(m)"
  approach: |
    Sliding window with have/need counters. Build countT from t. Expand right, updating window counts; when a character's count matches its required count, increment have. Once have == need, record the window if smallest so far, then shrink from the left until the window is no longer valid.
  solution: |
    class Solution:
        def minWindow(self, s: str, t: str) -> str:
            if t == "":
                return ""

            countT, window = {}, {}
            for c in t:
                countT[c] = 1 + countT.get(c, 0)

            have, need = 0, len(countT)
            res, resLen = [-1, -1], float("infinity")
            l = 0

            for r in range(len(s)):
                c = s[r]
                window[c] = 1 + window.get(c, 0)

                if c in countT and window[c] == countT[c]:
                    have += 1

                while have == need:
                    if (r - l + 1) < resLen:
                        res = [l, r]
                        resLen = r - l + 1
                    window[s[l]] -= 1
                    if s[l] in countT and window[s[l]] < countT[s[l]]:
                        have -= 1
                    l += 1

            l, r = res
            return s[l:r + 1] if resLen != float("infinity") else ""
- id: 78
  title: "Subsets"
  difficulty: Medium
  tags: [Neetcode 150, Array, Backtracking, Bit Manipulation]
  verified: false
  description: |
    Given an integer array `nums` of **unique** elements, return all possible subsets (the
    power set).

    The solution set **must not** contain duplicate subsets. Return the solution in **any
    order**.

    **Example 1:**
      Input:  nums = [1,2,3]
      Output: [[],[1],[2],[1,2],[3],[1,3],[2,3],[1,2,3]]

    **Example 2:**
      Input:  nums = [0]
      Output: [[],[0]]

    **Constraints:**
      - 1 <= nums.length <= 10
      - -10 <= nums[i] <= 10
      - All the integers of `nums` are **unique**.
  time: "O(n * 2^n)"
  space: "O(n)"
  approach: |
    Use backtracking to build all subsets by making a binary decision at each element —
    include it or exclude it. Starting with an empty subset, recursively explore both
    branches. When the end of the array is reached, store the formed subset. This generates
    all 2^n possible combinations without duplicates.
  solution: |
    class Solution:
        def subsets(self, nums: List[int]) -> List[List[int]]:
            res = []
            subset = []

            def dfs(i):
                if i >= len(nums):
                    res.append(subset.copy())
                    return
                subset.append(nums[i])
                dfs(i + 1)
                subset.pop()
                dfs(i + 1)

            dfs(0)
            return res
- id: 79
  title: "Word Search"
  difficulty: Medium
  tags: [Neetcode 150, Array, String, Backtracking, Depth-First Search, Matrix]
  verified: false
  description: |
    Given a 2-D grid of characters `board` and a string `word`, return `true` if the word
    exists in the grid.

    The word can be constructed from letters of sequentially adjacent cells, where adjacent
    cells are horizontally or vertically neighboring. The same cell may not be used more than
    once.

    **Example 1:**
      Input:  board = [["A","B","C","D"],["S","A","A","T"],["A","C","A","E"]], word = "CAT"
      Output: true

    **Example 2:**
      Input:  board = [["A","B","C","D"],["S","A","A","T"],["A","C","A","E"]], word = "BAT"
      Output: false

    **Constraints:**
      - 1 <= board.length, board[i].length <= 5
      - 1 <= word.length <= 10
      - board and `word` consist of only uppercase and lowercase English letters.
  time: "O(m * 4^n)"
  space: "O(n)"
  approach: |
    Use DFS with backtracking, trying each cell as a potential starting point. For each
    position, verify the character matches the current index in the word. Explore all four
    directional neighbors recursively. Mark cells as visited by temporarily overwriting with
    '#' to prevent reuse. When all word characters are matched, return true. After exploring,
    restore the cell to its original character.
  solution: |
    class Solution:
        def exist(self, board: List[List[str]], word: str) -> bool:
            ROWS, COLS = len(board), len(board[0])

            def dfs(r, c, i):
                if i == len(word):
                    return True
                if (r < 0 or c < 0 or r >= ROWS or c >= COLS or
                    word[i] != board[r][c] or board[r][c] == '#'):
                    return False

                board[r][c] = '#'
                res = (dfs(r + 1, c, i + 1) or
                       dfs(r - 1, c, i + 1) or
                       dfs(r, c + 1, i + 1) or
                       dfs(r, c - 1, i + 1))
                board[r][c] = word[i]
                return res

            for r in range(ROWS):
                for c in range(COLS):
                    if dfs(r, c, 0):
                        return True
            return False
- id: 84
  title: "Largest Rectangle In Histogram"
  difficulty: Hard
  tags: [Neetcode 150, Array, Stack, Monotonic Stack]
  verified: false
  description: |
    Given an array of integers `heights` representing the histogram's bar height where the
    width of each bar is `1`, return the area of the largest rectangle in the histogram.

    **Example 1:**
      Input:  heights = [2,1,5,6,2,3]
      Output: 10
      Explanation: The above is a histogram where width of each bar is 1. The largest
        rectangle is shown in the red area, which has an area = 10 units.

    **Example 2:**
      Input:  heights = [2,4]
      Output: 4

    **Constraints:**
      - 1 <= heights.length <= 10^5
      - 0 <= heights[i] <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    Monotonic increasing stack of indices. For each bar (plus a virtual height-0 sentinel at position n), while the stack top's height >= current height, pop it and compute the rectangle: height = heights[popped], width = i if stack is empty else i - stack[-1] - 1. Push the current index. Track the max area throughout.
  solution: |
    class Solution:
        def largestRectangleArea(self, heights: List[int]) -> int:
            n = len(heights)
            maxArea = 0
            stack = []

            for i in range(n + 1):
                while stack and (i == n or heights[stack[-1]] >= heights[i]):
                    height = heights[stack.pop()]
                    width = i if not stack else i - stack[-1] - 1
                    maxArea = max(maxArea, height * width)
                stack.append(i)
            return maxArea
- id: 90
  title: "Subsets II"
  difficulty: Medium
  tags: [Neetcode 150, Array, Backtracking, Bit Manipulation]
  verified: false
  description: |
    Given an integer array `nums` that may contain duplicates, return all possible subsets
    (the power set).

    The solution set **must not** contain duplicate subsets. Return the solution in **any
    order**.

    **Example 1:**
      Input:  nums = [1,2,1]
      Output: [[],[1],[1,2],[1,1],[1,2,1],[2]]

    **Example 2:**
      Input:  nums = [7,7]
      Output: [[],[7],[7,7]]

    **Constraints:**
      - 1 <= nums.length <= 11
      - -20 <= nums[i] <= 20
  time: "O(n * 2^n)"
  space: "O(n)"
  approach: |
    Sort the array first to group duplicates adjacently. Use backtracking to generate subsets
    while preventing duplicates by skipping redundant choices at each recursion level. When
    excluding a value and the next value is identical, skip forward to avoid generating the
    same subset twice.
  solution: |
    class Solution:
        def subsetsWithDup(self, nums: List[int]) -> List[List[int]]:
            nums.sort()
            res = []

            def backtrack(i, subset):
                if i == len(nums):
                    res.append(subset[::])
                    return

                subset.append(nums[i])
                backtrack(i + 1, subset)
                subset.pop()

                while i + 1 < len(nums) and nums[i] == nums[i + 1]:
                    i += 1
                backtrack(i + 1, subset)

            backtrack(0, [])
            return res
- id: 91
  title: "Decode Ways"
  difficulty: Medium
  tags: [Neetcode 150, String, Dynamic Programming]
  verified: false
  description: |
    A string of uppercase English characters can be encoded to numbers using the mapping:
    'A' → "1", 'B' → "2", ..., 'Z' → "26".

    Given a string `s` containing only digits, return the number of ways to decode it. Valid
    groupings must not contain leading zeros (e.g., "01" is invalid).

    **Example 1:**
      Input:  s = "12"
      Output: 2
      Explanation: Can decode as "AB" (1, 2) or "L" (12).

    **Example 2:**
      Input:  s = "01"
      Output: 0
      Explanation: "01" cannot map to any letter.

    **Constraints:**
      - 1 <= s.length <= 100
      - s consists of digits
  time: "O(n)"
  space: "O(1)"
  approach: |
    At each index, two choices exist: decode one digit (if not '0') or decode two consecutive
    digits (if they form a number 10-26). Use dynamic programming working backward from the
    end. For each position, accumulate the ways to decode one digit plus the ways to decode two
    digits (when valid). Track only the next two positions (dp1, dp2) to minimize space.
  solution: |
    class Solution:
        def numDecodings(self, s: str) -> int:
            dp1, dp2 = 1, 0

            for i in range(len(s) - 1, -1, -1):
                if s[i] == '0':
                    current = 0
                else:
                    current = dp1
                    if i + 1 < len(s) and (s[i] == '1' or
                       (s[i] == '2' and s[i + 1] <= '6')):
                        current += dp2

                dp2, dp1 = dp1, current

            return dp1
- id: 94
  title: "Binary Tree Inorder Traversal"
  difficulty: Easy
  tags: [Stack, Tree, Depth-First Search, Binary Tree]
  verified: true
  description: |
    Given the root of a binary tree, return the inorder traversal of its nodes' values.

    **Example 1:**
    Input: root = [1,null,2,3]
    Output: [1,3,2]

    **Example 2:**
    Input: root = [1,2,3,4,5,null,8,null,null,6,7,9]
    Output: [4,2,6,5,7,1,3,9,8]

    **Example 3:**
    Input: root = []
    Output: []

    **Example 4:**
    Input: root = [1]
    Output: [1]

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 100].
      - -100 <= Node.val <= 100
     
    Follow up: Recursive solution is trivial, could you do it iteratively?
  easy_time: "O(n)"
  easy_space: "O(n)"
  easy_approach: |
    Continue down left path pushing to stack. If you cannot go left, pop once from the stack, output, and go right once.
  easy_solution: |
    class Solution:
        def inorderTraversal(self, root):
            out = []
            stack = []
            curr = root
            while curr or stack:
                while curr:
                    stack.append(curr)
                    curr = curr.left
                curr = stack.pop()
                out.append(curr.val)
                curr = curr.right
            return out
  time: "O(n)"
  space: "O(1), output array is O(n)"
  approach: |
    Morris Traversal achieves O(1) extra space by temporarily modifying the tree
    structure. The idea is to create a temporary link from the rightmost node of
    the left subtree back to the current node. This allows us to return to the
    current node after traversing the left subtree without using a stack. After
    processing, we remove the temporary link to restore the original tree.

    1. Initialize the current node to the root.
    2. While the current node is not null:
      - If the current node has no left child, add its value to the result and move to the right child.
      - Otherwise, find the rightmost node in the left subtree (the inorder predecessor).
      - If the predecessor's right pointer is null, set it to the current node (create a thread) and move to the left child.
      - If the predecessor's right pointer already points to the current node, remove the thread, add the current node's value to the result, and move to the right child.
    3. Return the result list.
  solution: |
    class Solution:
        def inorderTraversal(self, root: Optional[TreeNode]) -> List[int]:
            res = []
            cur = root

            while cur:
                if not cur.left:
                    res.append(cur.val)
                    cur = cur.right
                else:
                    prev = cur.left
                    while prev.right and prev.right != cur:
                        prev = prev.right

                    if not prev.right:
                        prev.right = cur
                        cur = cur.left
                    else:
                        prev.right = None
                        res.append(cur.val)
                        cur = cur.right

            return res
- id: 97
  title: "Interleaving String"
  difficulty: Medium
  tags: [Neetcode 150, String, Dynamic Programming]
  verified: false
  description: |
    Given three strings `s1`, `s2`, and `s3`, determine if `s3` is formed by an interleaving
    of `s1` and `s2` while preserving the relative character order from each source string.

    **Example 1:**
      Input:  s1 = "aaaa", s2 = "bbbb", s3 = "aabbbbaa"
      Output: true

    **Example 2:**
      Input:  s1 = "", s2 = "", s3 = ""
      Output: true

    **Example 3:**
      Input:  s1 = "abc", s2 = "xyz", s3 = "abxzcy"
      Output: false

    **Constraints:**
      - 0 <= s1.length, s2.length <= 100
      - 0 <= s3.length <= 200
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use dynamic programming with space optimization. At any position, only two indices matter:
    the current position in `s1` and `s2` (the position in `s3` is always their sum). Process
    from back to front with a 1D `dp` array where each element indicates whether remaining
    characters can form the remaining portion of `s3`. For each position, check if taking the
    next character from either `s1` or `s2` produces a valid match. If `len(s1) + len(s2) !=
    len(s3)`, return false immediately.
  solution: |
    class Solution:
        def isInterleave(self, s1: str, s2: str, s3: str) -> bool:
            m, n = len(s1), len(s2)
            if m + n != len(s3):
                return False
            if n < m:
                s1, s2 = s2, s1
                m, n = n, m

            dp = [False] * (n + 1)
            dp[n] = True

            for i in range(m, -1, -1):
                nextDp = True if i == m else False
                for j in range(n, -1, -1):
                    res = False if j < n else nextDp
                    if i < m and s1[i] == s3[i + j] and dp[j]:
                        res = True
                    if j < n and s2[j] == s3[i + j] and nextDp:
                        res = True
                    dp[j] = res
                    nextDp = dp[j]

            return dp[0]
- id: 98
  title: "Validate Binary Search Tree"
  difficulty: Medium
  tags: [Neetcode 150, Tree, DFS, BST]
  verified: false
  description: |
    Given the `root` of a binary tree, determine if it is a valid binary search tree (BST).

    A **valid BST** is defined as follows:
      - The left subtree of a node contains only nodes with keys **less than** the node's key.
      - The right subtree of a node contains only nodes with keys **greater than** the node's key.
      - Both the left and right subtrees must also be binary search trees.

    **Example 1:**
      Input:  root = [2,1,3]
      Output: true

    **Example 2:**
      Input:  root = [5,1,4,null,null,3,6]
      Output: false
      Explanation: The root node's value is 5 but its right child's value is 4.

    **Constraints:**
      - The number of nodes in the tree is in the range [1, 10^4].
      - -2^31 <= Node.val <= 2^31 - 1
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS with an inherited valid range. Pass float('-inf') and float('inf') at the root. Each node must satisfy left < node.val < right. Recurse left with right bound = node.val; recurse right with left bound = node.val.
  solution: |
    class Solution:
        def isValidBST(self, root: Optional[TreeNode]) -> bool:
            def valid(node, left, right):
                if not node:
                    return True
                if not (left < node.val < right):
                    return False
                return valid(node.left, left, node.val) and valid(node.right, node.val, right)

            return valid(root, float("-inf"), float("inf"))
- id: 100
  title: "Same Tree"
  difficulty: Easy
  tags: [Neetcode 150, Tree, DFS, BFS]
