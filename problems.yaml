- id: 1
  title: "Two Sum"
  difficulty: Easy
  tags: [Array, Hash Table]
  verified: true
  description: |
    Given an array of integers `nums` and an integer `target`, return indices of the two numbers
    such that they add up to `target`.

    You may assume that each input would have **exactly one solution**, and you may not use the
    same element twice. You can return the answer in any order.

    **Example 1:**
      Input:  nums = [2,7,11,15], target = 9
      Output: [0,1]
      Explanation: nums[0] + nums[1] == 9, so we return [0, 1].

    **Example 2:**
      Input:  nums = [3,2,4], target = 6
      Output: [1,2]

    **Constraints:**
      - 2 <= nums.length <= 10^4
      - -10^9 <= nums[i] <= 10^9
      - Only one valid answer exists.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a hash map to store (key=number,value=index) as you iterate.
    For each element, check if (target - current) is already in the map.
    If yes → found the pair. If no → add current to the map.
  solution: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        seen = {}  # value -> index
        for i, num in enumerate(nums):
            diff = target - num
            if diff in seen:
                return [seen[diff], i]
            seen[num] = i
        return []  # no solution found
- id: 4
  title: "Median of Two Sorted Arrays"
  difficulty: Hard
  tags: [Array, Binary Search, Divide and Conquer]
  verified: false
  description: |
    Given two sorted arrays `nums1` and `nums2` of size `m` and `n` respectively, return the
    **median** of the two sorted arrays.

    The overall run time complexity should be `O(log (m+n))`.

    **Example 1:**
      Input:  nums1 = [1,3], nums2 = [2]
      Output: 2.00000
      Explanation: merged array = [1,2,3] and median is 2.

    **Example 2:**
      Input:  nums1 = [1,2], nums2 = [3,4]
      Output: 2.50000
      Explanation: merged array = [1,2,3,4] and median is (2 + 3) / 2 = 2.5.

    **Constraints:**
      - nums1.length == m
      - nums2.length == n
      - 0 <= m <= 1000
      - 0 <= n <= 1000
      - 1 <= m + n <= 2000
      - -10^6 <= nums1[i], nums2[i] <= 10^6
  time: "O(log(min(m, n)))"
  space: "O(1)"
  approach: |
    Binary search on the smaller array. Find partition points i (in A) and j = half - i - 2
    (in B) such that A[i] <= B[j+1] and B[j] <= A[i+1]. Use boundary sentinels (-inf/+inf)
    for out-of-range indices. Once the correct partition is found, the median is derived from
    the max of the left elements and the min of the right elements.
  solution: |
    def find_median_sorted_arrays(nums1: list[int], nums2: list[int]) -> float:
        A, B = nums1, nums2
        total = len(nums1) + len(nums2)
        half = total // 2
        if len(B) < len(A):
            A, B = B, A
        l, r = 0, len(A) - 1
        while True:
            i = (l + r) // 2
            j = half - i - 2
            Aleft = A[i] if i >= 0 else float("-infinity")
            Aright = A[i + 1] if (i + 1) < len(A) else float("infinity")
            Bleft = B[j] if j >= 0 else float("-infinity")
            Bright = B[j + 1] if (j + 1) < len(B) else float("infinity")
            if Aleft <= Bright and Bleft <= Aright:
                if total % 2:
                    return min(Aright, Bright)
                return (max(Aleft, Bleft) + min(Aright, Bright)) / 2
            elif Aleft > Bright:
                r = i - 1
            else:
                l = i + 1
- id: 11
  title: "Container With Most Water"
  difficulty: Medium
  tags: [Array, Two Pointers, Greedy]
  verified: false
  description: |
    You are given an integer array `height` of length `n`. There are `n` vertical lines drawn
    such that the two endpoints of the `i`th line are `(i, 0)` and `(i, height[i])`.

    Find two lines that together with the x-axis form a container, such that the container
    contains the most water.

    Return the maximum amount of water a container can store.

    **Note:** You may not slant the container.

    **Example 1:**
      Input:  height = [1,8,6,2,5,4,8,3,7]
      Output: 49
      Explanation: The above vertical lines are represented by array [1,8,6,2,5,4,8,3,7].
        In this case, the max area of water the container can contain is 49.

    **Example 2:**
      Input:  height = [1,1]
      Output: 1

    **Constraints:**
      - n == height.length
      - 2 <= n <= 10^5
      - 0 <= height[i] <= 10^4
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end of the array. At each step, calculate the water
    trapped between them as min(height[l], height[r]) * (r - l). Move the pointer with the
    smaller height inward, since the width decreases regardless, and only a taller boundary
    could increase the area.
  solution: |
    def max_area(height: list[int]) -> int:
        l, r = 0, len(height) - 1
        res = 0
        while l < r:
            res = max(res, min(height[l], height[r]) * (r - l))
            if height[l] < height[r]:
                l += 1
            else:
                r -= 1
        return res
- id: 15
  title: "3Sum"
  difficulty: Medium
  tags: [Array, Two Pointers, Sorting]
  verified: false
  description: |
    Given an integer array `nums`, return all the triplets `[nums[i], nums[j], nums[k]]` such
    that `i != j`, `i != k`, and `j != k`, and `nums[i] + nums[j] + nums[k] == 0`.

    Notice that the solution set must not contain duplicate triplets.

    **Example 1:**
      Input:  nums = [-1,0,1,2,-1,-4]
      Output: [[-1,-1,2],[-1,0,1]]
      Explanation: nums[0] + nums[1] + nums[2] = (-1) + 0 + 1 = 0.
        nums[1] + nums[2] + nums[4] = 0 + 1 + (-1) = 0.
        nums[0] + nums[3] + nums[4] = (-1) + 2 + (-1) = 0.
        The distinct triplets are [-1,0,1] and [-1,-1,2].
        Notice that the order of the output and the order of the triplets does not matter.

    **Example 2:**
      Input:  nums = [0,1,1]
      Output: []
      Explanation: The only possible triplet does not sum up to 0.

    **Example 3:**
      Input:  nums = [0,0,0]
      Output: [[0,0,0]]
      Explanation: The only possible triplet sums up to 0.

    **Constraints:**
      - 3 <= nums.length <= 3000
      - -10^5 <= nums[i] <= 10^5
  time: "O(n^2)"
  space: "O(1)"
  approach: |
    Sort the array, then iterate with a fixed index i. For each i, skip duplicates and use
    two pointers (l = i+1, r = end) to find pairs that sum to -nums[i]. If the sum is too
    large, move r left; if too small, move l right. When a valid triplet is found, record it
    and advance l past any duplicate values before continuing.
  solution: |
    def three_sum(nums: list[int]) -> list[list[int]]:
        nums.sort()
        res = []
        for i, a in enumerate(nums):
            if i > 0 and nums[i] == nums[i - 1]:
                continue
            l, r = i + 1, len(nums) - 1
            while l < r:
                total = a + nums[l] + nums[r]
                if total > 0:
                    r -= 1
                elif total < 0:
                    l += 1
                else:
                    res.append([a, nums[l], nums[r]])
                    l += 1
                    while l < r and nums[l] == nums[l - 1]:
                        l += 1
        return res
- id: 20
  title: "Valid Parentheses"
  difficulty: Easy
  tags: [String, Stack]
  verified: false
  description: |
    Given a string `s` containing just the characters `'('`, `')'`, `'{'`, `'}'`, `'['` and
    `']'`, determine if the input string is valid.

    An input string is valid if:
    1. Open brackets must be closed by the same type of brackets.
    2. Open brackets must be closed in the correct order.
    3. Every close bracket has a corresponding open bracket of the same type.

    **Example 1:**
      Input:  s = "()"
      Output: true

    **Example 2:**
      Input:  s = "()[]{}"
      Output: true

    **Example 3:**
      Input:  s = "(]"
      Output: false

    **Example 4:**
      Input:  s = "([])"
      Output: true

    **Constraints:**
      - 1 <= s.length <= 10^4
      - s consists of parentheses only `'()[]{}'`.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a stack. For each opening bracket, push it onto the stack. For each closing bracket,
    check if the stack is non-empty and its top matches the expected opening bracket. If not,
    return False. After processing all characters, return True only if the stack is empty.
  solution: |
    def is_valid(s: str) -> bool:
        stack = []
        close_to_open = {')': '(', '}': '{', ']': '['}
        for c in s:
            if c in close_to_open:
                if stack and stack[-1] == close_to_open[c]:
                    stack.pop()
                else:
                    return False
            else:
                stack.append(c)
        return not stack
- id: 33
  title: "Search In Rotated Sorted Array"
  difficulty: Medium
  tags: [Array, Binary Search]
  verified: false
  description: |
    There is an integer array `nums` sorted in ascending order (with **distinct** values).

    Prior to being passed to your function, `nums` is **possibly rotated** at an unknown pivot
    index `k` (`1 <= k < nums.length`) such that the resulting array is
    `[nums[k], nums[k+1], ..., nums[n-1], nums[0], nums[1], ..., nums[k-1]]` (0-indexed).
    For example, `[0,1,2,4,5,6,7]` might be rotated at pivot index `3` and become
    `[4,5,6,7,0,1,2]`.

    Given the array `nums` after the possible rotation and an integer `target`, return the index
    of `target` if it is in `nums`, or `-1` if it is not in `nums`.

    You must write an algorithm with `O(log n)` runtime complexity.

    **Example 1:**
      Input:  nums = [4,5,6,7,0,1,2], target = 0
      Output: 4

    **Example 2:**
      Input:  nums = [4,5,6,7,0,1,2], target = 3
      Output: -1

    **Example 3:**
      Input:  nums = [1], target = 3
      Output: -1

    **Constraints:**
      - 1 <= nums.length <= 5000
      - -10^4 <= nums[i] <= 10^4
      - All values of nums are unique.
      - nums is an ascending array that is possibly rotated.
      - -10^4 <= target <= 10^4
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Standard binary search with rotation detection at each step. If the left half is sorted
    (nums[l] <= nums[mid]), check if target falls in [nums[l], nums[mid]); if so search left,
    otherwise right. If the right half is sorted, check if target falls in (nums[mid], nums[r]];
    if so search right, otherwise left.
  solution: |
    def search(nums: list[int], target: int) -> int:
        l, r = 0, len(nums) - 1
        while l <= r:
            mid = (l + r) // 2
            if nums[mid] == target:
                return mid
            if nums[l] <= nums[mid]:
                if nums[l] <= target < nums[mid]:
                    r = mid - 1
                else:
                    l = mid + 1
            else:
                if nums[mid] < target <= nums[r]:
                    l = mid + 1
                else:
                    r = mid - 1
        return -1
- id: 36
  title: "Valid Sudoku"
  difficulty: Medium
  tags: [Array, Hash Table, Matrix]
  verified: false
  description: |
    Determine if a `9 x 9` Sudoku board is valid. Only the filled cells need to be validated
    according to the following rules:

    1. Each row must contain the digits `1-9` without repetition.
    2. Each column must contain the digits `1-9` without repetition.
    3. Each of the nine `3 x 3` sub-boxes of the grid must contain the digits `1-9` without
       repetition.

    **Note:**
      - A Sudoku board (partially filled) could be valid but is not necessarily solvable.
      - Only the filled cells need to be validated according to the mentioned rules.

    **Example 1:**
      Input:  board =
        [["5","3",".",".","7",".",".",".","."]
        ,["6",".",".","1","9","5",".",".","."]
        ,[".","9","8",".",".",".",".","6","."]
        ,["8",".",".",".","6",".",".",".","3"]
        ,["4",".",".","8",".","3",".",".","1"]
        ,["7",".",".",".","2",".",".",".","6"]
        ,[".","6",".",".",".",".","2","8","."]
        ,[".",".",".","4","1","9",".",".","5"]
        ,[".",".",".",".","8",".",".","7","9"]]
      Output: true

    **Example 2:**
      Input:  board =
        [["8","3",".",".","7",".",".",".","."]
        ,["6",".",".","1","9","5",".",".","."]
        ,[".","9","8",".",".",".",".","6","."]
        ,["8",".",".",".","6",".",".",".","3"]
        ,["4",".",".","8",".","3",".",".","1"]
        ,["7",".",".",".","2",".",".",".","6"]
        ,[".","6",".",".",".",".","2","8","."]
        ,[".",".",".","4","1","9",".",".","5"]
        ,[".",".",".",".","8",".",".","7","9"]]
      Output: false
      Explanation: Same as Example 1, except with the 5 in the top left corner being modified
        to 8. Since there are two 8's in the top left 3x3 sub-box, it is invalid.

    **Constraints:**
      - board.length == 9
      - board[i].length == 9
      - board[i][j] is a digit 1-9 or '.'.
  time: "O(n^2) where n is the number of rows in the grid"
  space: "O(n^2)"
  approach: |
    Use three arrays of sets — one per row, one per column, one per 3x3 box.
    The box index for cell (r, c) is (r // 3) * 3 + (c // 3).
    Iterate every cell; skip '.'. If the digit is already in any of the three
    corresponding sets, return False. Otherwise add it to all three.
  solution: |
    def is_valid_sudoku(board: list[list[str]]) -> bool:
        rows = [set() for _ in range(9)]
        cols = [set() for _ in range(9)]
        boxes = [set() for _ in range(9)]

        for r in range(9):
            for c in range(9):
                val = board[r][c]
                if val == ".":
                    continue
                box = (r // 3) * 3 + (c // 3)
                if val in rows[r] or val in cols[c] or val in boxes[box]:
                    return False
                rows[r].add(val)
                cols[c].add(val)
                boxes[box].add(val)
        return True
- id: 42
  title: "Trapping Rain Water"
  difficulty: Hard
  tags: [Array, Two Pointers, Dynamic Programming, Stack, Monotonic Stack]
  verified: false
  description: |
    Given `n` non-negative integers representing an elevation map where the width of each bar
    is `1`, compute how much water it can trap after raining.

    **Example 1:**
      Input:  height = [0,1,0,2,1,0,1,3,2,1,2,1]
      Output: 6
      Explanation: The above elevation map (black section) is represented by array
        [0,1,0,2,1,0,1,3,2,1,2,1]. In this case, 6 units of rain water (blue section)
        are being trapped.

    **Example 2:**
      Input:  height = [4,2,0,3,2,5]
      Output: 9

    **Constraints:**
      - n == height.length
      - 1 <= n <= 2 * 10^4
      - 0 <= height[i] <= 10^5
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end. Track the maximum height seen from each side
    (left_max and right_max). At each step, process the side with the smaller max — the water
    it can hold at that position is max - current height. Move that pointer inward. This works
    because the water level is bounded by the smaller of the two surrounding maximums.
  solution: |
    def trap(height: list[int]) -> int:
        l, r = 0, len(height) - 1
        left_max, right_max = height[l], height[r]
        res = 0
        while l < r:
            if left_max < right_max:
                l += 1
                left_max = max(left_max, height[l])
                res += left_max - height[l]
            else:
                r -= 1
                right_max = max(right_max, height[r])
                res += right_max - height[r]
        return res
- id: 49
  title: "Group Anagrams"
  difficulty: Medium
  tags: [Array, Hash Table, String, Sorting]
  verified: true
  description: |
    Given an array of strings `strs`, group **the anagrams** together. You can return the answer
    in **any order**.

    **Example 1:**
      Input:  strs = ["eat","tea","tan","ate","nat","bat"]
      Output: [["bat"],["nat","tan"],["ate","eat","tea"]]

    **Example 2:**
      Input:  strs = [""]
      Output: [[""]]

    **Example 3:**
      Input:  strs = ["a"]
      Output: [["a"]]

    **Constraints:**
      - 1 <= strs.length <= 10^4
      - 0 <= strs[i].length <= 100
      - strs[i] consists of lowercase English letters.
  time: "O(m * n)"
  space: "O(m), O(m * n) space for the output list"
  approach: |
    Count the frequency of each character in a string, convert to a 26 index
    tuple. Create a dict(key=tuple,value=list of strings with matching char
    counts). Loop through the dict and print the arrays of strings.
  solution: |
    def groupAnagrams(self, strs: List[str]) -> List[List[str]]:
        res = defaultdict(list)
        for s in strs:
            count = [0] * 26
            for c in s:
                count[ord(c) - ord('a')] += 1
            res[tuple(count)].append(s)
        return list(res.values())
- id: 74
  title: "Search a 2D Matrix"
  difficulty: Medium
  tags: [Array, Binary Search, Matrix]
  verified: false
  description: |
    You are given an `m x n` integer matrix `matrix` with the following two properties:
      - Each row is sorted in non-decreasing order.
      - The first integer of each row is greater than the last integer of the previous row.

    Given an integer `target`, return `true` if `target` is in `matrix` or `false` otherwise.

    You must write a solution in `O(log(m * n))` time complexity.

    **Example 1:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3
      Output: true

    **Example 2:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 13
      Output: false

    **Constraints:**
      - m == matrix.length
      - n == matrix[0].length
      - 1 <= m, n <= 100
      - -10^4 <= matrix[i][j] <= 10^4
  time: "O(log(m * n))"
  space: "O(1)"
  approach: |
    Treat the 2D matrix as a flattened 1D sorted array of length m*n. Binary search with l=0
    and r=m*n-1. For each midpoint, convert to row = mid // COLS and col = mid % COLS to
    access matrix[row][col]. Adjust l or r based on comparison with target.
  solution: |
    def search_matrix(matrix: list[list[int]], target: int) -> bool:
        ROWS, COLS = len(matrix), len(matrix[0])
        l, r = 0, ROWS * COLS - 1
        while l <= r:
            mid = (l + r) // 2
            row, col = mid // COLS, mid % COLS
            if matrix[row][col] == target:
                return True
            elif matrix[row][col] < target:
                l = mid + 1
            else:
                r = mid - 1
        return False
- id: 84
  title: "Largest Rectangle In Histogram"
  difficulty: Hard
  tags: [Array, Stack, Monotonic Stack]
  verified: false
  description: |
    Given an array of integers `heights` representing the histogram's bar height where the
    width of each bar is `1`, return the area of the largest rectangle in the histogram.

    **Example 1:**
      Input:  heights = [2,1,5,6,2,3]
      Output: 10
      Explanation: The above is a histogram where width of each bar is 1. The largest
        rectangle is shown in the red area, which has an area = 10 units.

    **Example 2:**
      Input:  heights = [2,4]
      Output: 4

    **Constraints:**
      - 1 <= heights.length <= 10^5
      - 0 <= heights[i] <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a monotonic increasing stack of (index, height) pairs. For each bar, if it is shorter
    than the stack top, pop and compute the rectangle area using the popped height extended
    back to the popped index. Track the start index so the current bar can extend left as far
    as bars were popped. After the loop, compute areas for all remaining stack entries
    extending to the end.
  solution: |
    def largest_rectangle_area(heights: list[int]) -> int:
        stack = []  # (index, height)
        max_area = 0
        for i, h in enumerate(heights):
            start = i
            while stack and stack[-1][1] > h:
                idx, height = stack.pop()
                max_area = max(max_area, height * (i - idx))
                start = idx
            stack.append((start, h))
        for idx, height in stack:
            max_area = max(max_area, height * (len(heights) - idx))
        return max_area
- id: 125
  title: "Valid Palindrome"
  difficulty: Easy
  tags: [Two Pointers, String]
  verified: false
  description: |
    A phrase is a **palindrome** if, after converting all uppercase letters into lowercase
    letters and removing all non-alphanumeric characters, it reads the same forward and
    backward. Alphanumeric characters include letters and numbers.

    Given a string `s`, return `true` if it is a **palindrome**, or `false` otherwise.

    **Example 1:**
      Input:  s = "A man, a plan, a canal: Panama"
      Output: true
      Explanation: "amanaplanacanalpanama" is a palindrome.

    **Example 2:**
      Input:  s = "race a car"
      Output: false
      Explanation: "raceacar" is not a palindrome.

    **Example 3:**
      Input:  s = " "
      Output: true
      Explanation: s is an empty string "" after removing non-alphanumeric characters.
        Since an empty string reads the same forward and backward, it is a palindrome.

    **Constraints:**
      - 1 <= s.length <= 2 * 10^5
      - s consists only of printable ASCII characters.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end of the string. Skip non-alphanumeric characters on
    both sides. Compare characters case-insensitively — if they differ at any point, return
    False. If the pointers meet without a mismatch, return True.
  solution: |
    def is_palindrome(s: str) -> bool:
        l, r = 0, len(s) - 1
        while l < r:
            while l < r and not s[l].isalnum():
                l += 1
            while l < r and not s[r].isalnum():
                r -= 1
            if s[l].lower() != s[r].lower():
                return False
            l += 1
            r -= 1
        return True
- id: 128
  title: "Longest Consecutive Sequence"
  difficulty: Medium
  tags: [Array, Hash Table, Union Find]
  verified: false
  description: |
    Given an unsorted array of integers `nums`, return the length of the longest consecutive
    elements sequence.

    You must write an algorithm that runs in `O(n)` time.

    **Example 1:**
      Input:  nums = [100,4,200,1,3,2]
      Output: 4
      Explanation: The longest consecutive elements sequence is [1, 2, 3, 4]. Therefore its
        length is 4.

    **Example 2:**
      Input:  nums = [0,3,7,2,5,8,1,6,0,4]
      Output: 9

    **Constraints:**
      - 0 <= nums.length <= 10^5
      - -10^9 <= nums[i] <= 10^9
  easy_time: "O(n)"
  easy_space: "O(n)"
  easy_approach: |
    Put all numbers into a hash set for O(1) lookup.
    For each number, check if (num - 1) is absent — that means it's the start of a sequence.
    From each sequence start, extend right while consecutive numbers exist and track the max length.
    Each number is visited at most twice overall, so the algorithm is O(n).
  easy_solution: |
    def longest_consecutive(nums: list[int]) -> int:
        num_set = set(nums)
        best = 0
        for num in num_set:
            if num - 1 not in num_set:
                length = 1
                while num + length in num_set:
                    length += 1
                best = max(best, length)
        return best
  time: "O(n)"
  space: "O(n)"
  approach: |
    Put all numbers into a hash set for O(1) lookup.
    For each number, check if (num - 1) is absent — that means it's the start of a sequence.
    From each sequence start, extend right while consecutive numbers exist and track the max length.
    Each number is visited at most twice overall, so the algorithm is O(n).
  solution: |
    def longest_consecutive(nums: list[int]) -> int:
        num_set = set(nums)
        best = 0
        for num in num_set:
            if num - 1 not in num_set:
                length = 1
                while num + length in num_set:
                    length += 1
                best = max(best, length)
        return best
- id: 150
  title: "Evaluate Reverse Polish Notation"
  difficulty: Medium
  tags: [Array, Math, Stack]
  verified: false
  description: |
    You are given an array of strings `tokens` that represents an arithmetic expression in
    **Reverse Polish Notation**.

    Evaluate the expression. Return an integer that represents the value of the expression.

    **Note:**
      - The valid operators are `'+'`, `'-'`, `'*'`, and `'/'`.
      - Each operand may be an integer or another expression.
      - Division between two integers always **truncates toward zero**.
      - There will not be any division by zero.
      - The input represents a valid arithmetic expression in reverse polish notation.
      - The answer and all intermediate calculations can be represented in a **32-bit** integer.

    **Example 1:**
      Input:  tokens = ["2","1","+","3","*"]
      Output: 9
      Explanation: ((2 + 1) * 3) = 9

    **Example 2:**
      Input:  tokens = ["4","13","5","/","+"]
      Output: 6
      Explanation: (4 + (13 / 5)) = 6

    **Example 3:**
      Input:  tokens = ["10","6","9","3","+","-11","*","/","*","17","+","5","+"]
      Output: 22
      Explanation: ((10 * (6 / ((9 + 3) * -11))) + 17) + 5 = 22

    **Constraints:**
      - 1 <= tokens.length <= 10^4
      - tokens[i] is either an operator `"+"`, `"-"`, `"*"`, or `"/"`, or an integer in the
        range `[-200, 200]`.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a stack. For each token, if it is a number push it. If it is an operator, pop two
    operands (b then a), apply the operation (a op b), and push the result. For division,
    use int(a / b) to truncate toward zero. The final answer is the single remaining value
    on the stack.
  solution: |
    def eval_rpn(tokens: list[str]) -> int:
        stack = []
        for t in tokens:
            if t == '+':
                stack.append(stack.pop() + stack.pop())
            elif t == '-':
                b, a = stack.pop(), stack.pop()
                stack.append(a - b)
            elif t == '*':
                stack.append(stack.pop() * stack.pop())
            elif t == '/':
                b, a = stack.pop(), stack.pop()
                stack.append(int(a / b))
            else:
                stack.append(int(t))
        return stack[0]
- id: 153
  title: "Find Minimum In Rotated Sorted Array"
  difficulty: Medium
  tags: [Array, Binary Search]
  verified: false
  description: |
    Suppose an array of length `n` sorted in ascending order is **rotated** between `1` and `n`
    times. For example, the array `nums = [0,1,2,4,5,6,7]` might become:
      - `[4,5,6,7,0,1,2]` if it was rotated `4` times.
      - `[0,1,2,4,5,6,7]` if it was rotated `7` times.

    Notice that **rotating** an array `[a[0], a[1], a[2], ..., a[n-1]]` 1 time results in the
    array `[a[n-1], a[0], a[1], a[2], ..., a[n-2]]`.

    Given the sorted rotated array `nums` of **unique** elements, return the **minimum element**
    of this array.

    You must write an algorithm that runs in `O(log n)` time.

    **Example 1:**
      Input:  nums = [3,4,5,1,2]
      Output: 1
      Explanation: The original array was [1,2,3,4,5] rotated 3 times.

    **Example 2:**
      Input:  nums = [4,5,6,7,0,1,2]
      Output: 0
      Explanation: The original array was [0,1,2,4,5,6,7] and it was rotated 4 times.

    **Example 3:**
      Input:  nums = [11,13,15,17]
      Output: 11
      Explanation: The original array was [11,13,15,17] and it was rotated 4 times.

    **Constraints:**
      - n == nums.length
      - 1 <= n <= 5000
      - -5000 <= nums[i] <= 5000
      - All the integers of nums are unique.
      - nums is sorted and rotated between 1 and n times.
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Binary search tracking the minimum seen so far. If nums[l] < nums[r], the current
    subarray is fully sorted so nums[l] is the local minimum — record it and break. Otherwise
    compute mid, update res with nums[mid], and detect which half contains the rotation: if
    nums[mid] >= nums[l], the left half is sorted and the minimum lies in the right half
    (l = mid + 1); otherwise search the left half (r = mid - 1).
  solution: |
    def find_min(nums: list[int]) -> int:
        l, r = 0, len(nums) - 1
        res = nums[0]
        while l <= r:
            if nums[l] < nums[r]:
                res = min(res, nums[l])
                break
            mid = (l + r) // 2
            res = min(res, nums[mid])
            if nums[mid] >= nums[l]:
                l = mid + 1
            else:
                r = mid - 1
        return res
- id: 155
  title: "Min Stack"
  difficulty: Medium
  tags: [Stack, Design]
  verified: false
  description: |
    Design a stack that supports push, pop, top, and retrieving the minimum element in
    constant time.

    Implement the `MinStack` class:
      - `MinStack()` initializes the stack object.
      - `void push(int val)` pushes the element `val` onto the stack.
      - `void pop()` removes the element on the top of the stack.
      - `int top()` gets the top element of the stack.
      - `int getMin()` retrieves the minimum element in the stack.

    You must implement a solution with `O(1)` time complexity for each function.

    **Example 1:**
      Input:
        ["MinStack","push","push","push","getMin","pop","top","getMin"]
        [[],[-3],[0],[-2],[],[],[],[]]
      Output: [null,null,null,null,-3,null,0,-2]
      Explanation:
        MinStack minStack = new MinStack();
        minStack.push(-3);
        minStack.push(0);
        minStack.push(-2);
        minStack.getMin(); // return -3
        minStack.pop();
        minStack.top();    // return 0
        minStack.getMin(); // return -3

    **Constraints:**
      - -2^31 <= val <= 2^31 - 1
      - Methods pop, top and getMin operations will always be called on non-empty stacks.
      - At most 3 * 10^4 calls will be made to push, pop, top, and getMin.
  time: "O(1)"
  space: "O(n)"
  approach: |
    Use two stacks: one for values and one to track the running minimum. On each push,
    append the new value to the main stack and append the minimum of the new value and the
    current min (stack top) to the min stack. On pop, pop both stacks. getMin() returns the
    top of the min stack.
  solution: |
    class MinStack:
        def __init__(self):
            self.stack = []
            self.min_stack = []

        def push(self, val: int) -> None:
            self.stack.append(val)
            min_val = min(val, self.min_stack[-1] if self.min_stack else val)
            self.min_stack.append(min_val)

        def pop(self) -> None:
            self.stack.pop()
            self.min_stack.pop()

        def top(self) -> int:
            return self.stack[-1]

        def getMin(self) -> int:
            return self.min_stack[-1]
- id: 167
  title: "Two Sum II - Input Array Is Sorted"
  difficulty: Medium
  tags: [Array, Two Pointers, Binary Search]
  verified: false
  description: |
    Given a **1-indexed** array of integers `numbers` that is already **sorted in non-decreasing
    order**, find two numbers such that they add up to a specific `target` number. Let these two
    numbers be `numbers[index1]` and `numbers[index2]` where
    `1 <= index1 < index2 <= numbers.length`.

    Return the indices of the two numbers, `index1` and `index2`, **added by one** as an integer
    array `[index1, index2]` of length 2.

    The tests are generated such that there is **exactly one solution**. You **may not** use the
    same element twice.

    Your solution must use only constant extra space.

    **Example 1:**
      Input:  numbers = [2,7,11,15], target = 9
      Output: [1,2]
      Explanation: The sum of 2 and 7 is 9. Therefore, index1 = 1, index2 = 2. We return [1, 2].

    **Example 2:**
      Input:  numbers = [2,3,4], target = 6
      Output: [1,3]
      Explanation: The sum of 2 and 4 is 6. Therefore index1 = 1, index2 = 3. We return [1, 3].

    **Example 3:**
      Input:  numbers = [-1,0], target = -1
      Output: [1,2]
      Explanation: The sum of -1 and 0 is -1. Therefore index1 = 1, index2 = 2. We return [1, 2].

    **Constraints:**
      - 2 <= numbers.length <= 3 * 10^4
      - -1000 <= numbers[i] <= 1000
      - numbers is sorted in non-decreasing order.
      - -1000 <= target <= 1000
      - The tests are generated such that there is exactly one solution.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end. If the sum equals target, return the 1-indexed
    positions. If the sum is greater than target, move the right pointer left to decrease it.
    If less, move the left pointer right to increase it. The sorted order guarantees
    convergence to exactly one solution.
  solution: |
    def two_sum(numbers: list[int], target: int) -> list[int]:
        l, r = 0, len(numbers) - 1
        while l < r:
            s = numbers[l] + numbers[r]
            if s == target:
                return [l + 1, r + 1]
            elif s > target:
                r -= 1
            else:
                l += 1
        return []
