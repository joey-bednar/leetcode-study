    **Example 3:**
      Input:  strs = ["a"]
      Output: [["a"]]

    **Constraints:**
      - 1 <= strs.length <= 10^4
      - 0 <= strs[i].length <= 100
      - strs[i] consists of lowercase English letters.
  time: "O(m * n)"
  space: "O(m), O(m * n) space for the output list"
  approach: |
    Count the frequency of each character in a string, convert to a 26 index
    tuple. Create a dict(key=tuple,value=list of strings with matching char
    counts). Loop through the dict and print the arrays of strings.
  solution: |
    def groupAnagrams(self, strs: List[str]) -> List[List[str]]:
        res = defaultdict(list)
        for s in strs:
            count = [0] * 26
            for c in s:
                count[ord(c) - ord('a')] += 1
            res[tuple(count)].append(s)
        return list(res.values())
- id: 74
  title: "Search a 2D Matrix"
  difficulty: Medium
  tags: [Array, Binary Search, Matrix]
  verified: false
  description: |
    You are given an `m x n` integer matrix `matrix` with the following two properties:
      - Each row is sorted in non-decreasing order.
      - The first integer of each row is greater than the last integer of the previous row.

    Given an integer `target`, return `true` if `target` is in `matrix` or `false` otherwise.

    You must write a solution in `O(log(m * n))` time complexity.

    **Example 1:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 3
      Output: true

    **Example 2:**
      Input:  matrix = [[1,3,5,7],[10,11,16,20],[23,30,34,60]], target = 13
      Output: false

    **Constraints:**
      - m == matrix.length
      - n == matrix[0].length
      - 1 <= m, n <= 100
      - -10^4 <= matrix[i][j] <= 10^4
  time: "O(log(m * n))"
  space: "O(1)"
  approach: |
    Treat the 2D matrix as a flattened 1D sorted array of length m*n. Binary search with l=0
    and r=m*n-1. For each midpoint, convert to row = mid // COLS and col = mid % COLS to
    access matrix[row][col]. Adjust l or r based on comparison with target.
  solution: |
    def search_matrix(matrix: list[list[int]], target: int) -> bool:
        ROWS, COLS = len(matrix), len(matrix[0])
        l, r = 0, ROWS * COLS - 1
        while l <= r:
            mid = (l + r) // 2
            row, col = mid // COLS, mid % COLS
            if matrix[row][col] == target:
                return True
            elif matrix[row][col] < target:
                l = mid + 1
            else:
                r = mid - 1
        return False
- id: 76
  title: "Minimum Window Substring"
  difficulty: Hard
  tags: [Hash Table, String, Sliding Window]
  verified: false
  description: |
    Given two strings `s` and `t` of lengths `m` and `n` respectively, return the **minimum
    window substring** of `s` such that every character in `t` (including duplicates) is
    included in the window. If there is no such substring, return the empty string `""`.

    The testcases will be generated such that the answer is **unique**.

    **Example 1:**
      Input:  s = "ADOBECODEBANC", t = "ABC"
      Output: "BANC"
      Explanation: The minimum window substring "BANC" includes 'A', 'B', and 'C' from
        string t.

    **Example 2:**
      Input:  s = "a", t = "a"
      Output: "a"
      Explanation: The entire string s is the minimum window.

    **Example 3:**
      Input:  s = "a", t = "aa"
      Output: ""
      Explanation: Both 'a's from t must be included in the window. Since the largest window
        of s only has one 'a', return empty string.

    **Constraints:**
      - m == s.length
      - n == t.length
      - 1 <= m, n <= 10^5
      - s and t consist of uppercase and lowercase English letters.

    **Follow up:** Could you find an algorithm that runs in `O(m + n)` time?
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two frequency maps (count_t and window) and counters `have` and `need`. `need` is the
    number of unique characters in t that must be satisfied. Expand right; when a character's
    window count meets its required count in t, increment `have`. When have == need, record the
    window if it's the smallest so far, then shrink from the left until the window is invalid.
  solution: |
    def min_window(s: str, t: str) -> str:
        if t == "":
            return ""
        count_t, window = {}, {}
        for c in t:
            count_t[c] = 1 + count_t.get(c, 0)
        have, need = 0, len(count_t)
        res, res_len = [-1, -1], float("infinity")
        l = 0
        for r in range(len(s)):
            c = s[r]
            window[c] = 1 + window.get(c, 0)
            if c in count_t and window[c] == count_t[c]:
                have += 1
            while have == need:
                if (r - l + 1) < res_len:
                    res = [l, r]
                    res_len = r - l + 1
                window[s[l]] -= 1
                if s[l] in count_t and window[s[l]] < count_t[s[l]]:
                    have -= 1
                l += 1
        l, r = res
        return s[l:r + 1] if res_len != float("infinity") else ""
- id: 84
  title: "Largest Rectangle In Histogram"
  difficulty: Hard
  tags: [Array, Stack, Monotonic Stack]
  verified: false
  description: |
    Given an array of integers `heights` representing the histogram's bar height where the
    width of each bar is `1`, return the area of the largest rectangle in the histogram.

    **Example 1:**
      Input:  heights = [2,1,5,6,2,3]
      Output: 10
      Explanation: The above is a histogram where width of each bar is 1. The largest
        rectangle is shown in the red area, which has an area = 10 units.

    **Example 2:**
      Input:  heights = [2,4]
      Output: 4

    **Constraints:**
      - 1 <= heights.length <= 10^5
      - 0 <= heights[i] <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a monotonic increasing stack of (index, height) pairs. For each bar, if it is shorter
    than the stack top, pop and compute the rectangle area using the popped height extended
    back to the popped index. Track the start index so the current bar can extend left as far
    as bars were popped. After the loop, compute areas for all remaining stack entries
    extending to the end.
  solution: |
    def largest_rectangle_area(heights: list[int]) -> int:
        stack = []  # (index, height)
        max_area = 0
        for i, h in enumerate(heights):
            start = i
            while stack and stack[-1][1] > h:
                idx, height = stack.pop()
                max_area = max(max_area, height * (i - idx))
                start = idx
            stack.append((start, h))
        for idx, height in stack:
            max_area = max(max_area, height * (len(heights) - idx))
        return max_area
- id: 98
  title: "Validate Binary Search Tree"
  difficulty: Medium
  tags: [Tree, DFS, BST]
  verified: false
  description: |
    Given the `root` of a binary tree, determine if it is a valid binary search tree (BST).

    A **valid BST** is defined as follows:
      - The left subtree of a node contains only nodes with keys **less than** the node's key.
      - The right subtree of a node contains only nodes with keys **greater than** the node's key.
      - Both the left and right subtrees must also be binary search trees.

    **Example 1:**
      Input:  root = [2,1,3]
      Output: true

    **Example 2:**
      Input:  root = [5,1,4,null,null,3,6]
      Output: false
      Explanation: The root node's value is 5 but its right child's value is 4.

    **Constraints:**
      - The number of nodes in the tree is in the range [1, 10^4].
      - -2^31 <= Node.val <= 2^31 - 1
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS with a valid range [min, max] passed down. Each node must satisfy min < val < max. When
    going left, the current node's value becomes the new max. When going right, it becomes the
    new min. Start with (-inf, inf) at the root.
  solution: |
    def isValidBST(root: Optional[TreeNode]) -> bool:
        def valid(node, left, right):
            if not node:
                return True
            if not (node.val < right and node.val > left):
                return False
            return valid(node.left, left, node.val) and valid(node.right, node.val, right)
        return valid(root, float("-inf"), float("inf"))
- id: 100
  title: "Same Tree"
  difficulty: Easy
