    **Constraints:**
    - `n == matrix.length == matrix[i].length`
    - `1 <= n <= 20`
    - `-1000 <= matrix[i][j] <= 1000`
  approach: |
    90-degree clockwise rotation: reverse rows (vertical) then transpose.
    90-degree counterclockwise rotation: transpose then reverse rows (vertical).
    Only transpose half of the entries otherwise you will recreate the same matrix.
  solution: |
    class Solution:
        def rotate(self, matrix: List[List[int]]) -> None:
            matrix.reverse()
            for i in range(len(matrix)):
                for j in range(i + 1, len(matrix)):
                    matrix[i][j], matrix[j][i] = matrix[j][i], matrix[i][j]
