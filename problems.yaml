      - 0 <= ai, bi < n
      - ai != bi
      - No duplicate edges.
  time: "O(V + E)"
  space: "O(V + E)"
  approach: |
    A valid tree has no cycles and is fully connected — a tree with n nodes has exactly n-1
    edges. Build an adjacency list and run DFS from node 0, tracking visited nodes and the
    parent to avoid falsely flagging the incoming edge as a cycle. If DFS encounters a visited
    non-parent node, a cycle exists. After traversal, verify all n nodes were visited.
  solution: |
    class Solution:
        def validTree(self, n: int, edges: List[List[int]]) -> bool:
            if len(edges) > n - 1:
                return False

            adj = [[] for _ in range(n)]
            for u, v in edges:
                adj[u].append(v)
                adj[v].append(u)

            visit = set()

            def dfs(node, parent):
                if node in visit:
                    return False
                visit.add(node)
                for neighbor in adj[node]:
                    if neighbor == parent:
                        continue
                    if not dfs(neighbor, node):
                        return False
                return True

            return dfs(0, -1) and len(visit) == n
- id: 268
  title: "Missing Number"
  difficulty: Easy
  tags: [Neetcode 150, Array, Hash Table, Math, Binary Search, Bit Manipulation, Sorting]
  verified: false
  description: |
    Given an array `nums` containing `n` distinct numbers in the range `[0, n]`, return the
    only number in the range that is missing from the array.

    **Example 1:**
      Input:  nums = [1,2,3]
      Output: 0
      Explanation: n = 3 since there are 3 numbers, so all numbers are in the range [0,3].
        0 is the missing number in the range since it does not appear in nums.

    **Example 2:**
      Input:  nums = [0,2]
      Output: 1

    **Constraints:**
      - 1 <= nums.length <= 1000
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use XOR: XORing all values from 0 to n together with all array elements causes every number
    that appears twice to cancel out (a ^ a = 0), leaving only the missing number. This achieves
    linear time with constant space.
  solution: |
    class Solution:
        def missingNumber(self, nums: List[int]) -> int:
            n = len(nums)
            xorr = n
            for i in range(n):
                xorr ^= i ^ nums[i]
            return xorr
- id: 269
  title: "Alien Dictionary"
  difficulty: Hard
  tags: [Neetcode 150, Array, String, DFS, BFS, Graph, Topological Sort]
  time: "O(N + V + E)"
  space: "O(V + E)"
  description: |
    There is a foreign language which uses the latin alphabet, but the order among letters is not "alphabetical". You have received a list of non-empty words from the dictionary, where the words are sorted lexicographically based on the rules of this new language.

    Derive the order of letters in this new language. If the order is invalid, return an empty string. If there are multiple valid orders, return any of them.

    **Example 1:**
    Input: words = ["wrt","wrf","er","ett","rftt"]
    Output: "wertf"

    **Example 2:**
    Input: words = ["z","x"]
    Output: "zx"

    **Example 3:**
    Input: words = ["z","x","z"]
    Output: ""
    Explanation: The order is invalid, so return "".

    **Constraints:**
    - `1 <= words.length <= 100`
    - `1 <= words[i].length <= 100`
    - `words[i]` consists of only lowercase English letters.
  approach: |
    Compare adjacent words in the list to extract character ordering constraints as directed edges. For each pair of adjacent words, find the first character that differs — this gives an edge from the earlier character to the later one. Special case: if a longer word appears before its prefix (e.g., "abc" before "ab"), the order is invalid.

    Build an adjacency list from all unique characters to their "must come after" neighbors. Then run DFS with three states per node: unvisited, in current path (cycle detection), and fully processed. Collect nodes in post-order and reverse to get topological order. If a cycle is detected, return "".
  solution: |
    class Solution:
        def foreignDictionary(self, words: List[str]) -> str:
            adj = {c: set() for w in words for c in w}

            for i in range(len(words) - 1):
                w1, w2 = words[i], words[i + 1]
                minLen = min(len(w1), len(w2))
                if len(w1) > len(w2) and w1[:minLen] == w2[:minLen]:
                    return ""
                for j in range(minLen):
                    if w1[j] != w2[j]:
                        adj[w1[j]].add(w2[j])
                        break

            visited = {}  # False = visited, True = current path
            res = []

            def dfs(c):
                if c in visited:
                    return visited[c]
                visited[c] = True
                for nei in adj[c]:
                    if dfs(nei):
                        return True
                visited[c] = False
                res.append(c)
                return False

            for c in adj:
                if dfs(c):
                    return ""

            res.reverse()
            return "".join(res)
  verified: false
- id: 271
  title: "Encode and Decode Strings"
  difficulty: Medium
  tags: [Neetcode 150, Array, String, Design]
  verified: false
  description: |
    Design an algorithm to encode **a list of strings** to **a single string**. The encoded
    string is then sent over the network and is decoded back to the original list of strings.

    Please implement `encode` and `decode`.

    **Example 1:**
      Input:  dummy_input = ["Hello","World"]
      Output: ["Hello","World"]
      Explanation: Machine 1 encodes ["Hello","World"] into a single string, then Machine 2
        decodes it back to the original list.

    **Example 2:**
      Input:  dummy_input = [""]
      Output: [""]

    **Constraints:**
      - 1 <= strs.length <= 200
      - 0 <= strs[i].length <= 200
      - strs[i] contains any possible characters out of 256 valid ASCII characters.
  time: "O(m)"
  space: "O(m + n)"
  approach: |
    Length-prefix encoding: for each string, prepend its length and a '#' delimiter then the string content. During decoding, scan from i until '#' to get the length, then slice exactly that many characters as the original string.
  solution: |
    class Solution:
        def encode(self, strs: List[str]) -> str:
            res = ""
            for s in strs:
                res += str(len(s)) + "#" + s
            return res

        def decode(self, s: str) -> List[str]:
            res = []
            i = 0

            while i < len(s):
                j = i
                while s[j] != '#':
                    j += 1
                length = int(s[i:j])
                i = j + 1
                j = i + length
                res.append(s[i:j])
                i = j

            return res
- id: 286
  title: "Walls And Gates"
  difficulty: Medium
  tags: [Neetcode 150, Array, Breadth-First Search, Matrix]
  verified: false
  description: |
    You are given an `m x n` grid `rooms` initialized with these possible values:
    - `-1`: A wall or an obstacle.
    - `0`: A gate.
    - `2147483647`: Infinity, representing an empty room.

    Fill each empty room with the distance to its **nearest gate**. If it is impossible to
    reach a gate, leave it as `2147483647`. Movement is allowed in the four cardinal directions.

    **Example 1:**
      Input:  rooms =
        [[2147483647,-1,0,2147483647],
         [2147483647,2147483647,2147483647,-1],
         [2147483647,-1,2147483647,-1],
         [0,-1,2147483647,2147483647]]
      Output:
        [[3,-1,0,1],
         [2,2,1,-1],
         [1,-1,2,-1],
         [0,-1,3,4]]

    **Example 2:**
      Input:  rooms = [[-1]]
      Output: [[-1]]

    **Constraints:**
      - 1 <= m, n <= 250
      - rooms[i][j] is -1, 0, or 2^31 - 1.
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Multi-source BFS starting simultaneously from all gates. Initialize the queue with all gate
    positions. Expand outward level by level — each level represents one additional step of
    distance. When visiting an empty room for the first time, set its value to the current
    distance. Walls are never enqueued. Because BFS explores in distance order, the first time
    a room is reached is always via the shortest path.
  solution: |
    class Solution:
        def islandsAndTreasure(self, grid: List[List[int]]) -> None:
            ROWS, COLS = len(grid), len(grid[0])
            visit = set()
            q = deque()

            def addCell(r, c):
                if (min(r, c) < 0 or r == ROWS or c == COLS or
                    (r, c) in visit or grid[r][c] == -1):
                    return
                visit.add((r, c))
                q.append([r, c])

            for r in range(ROWS):
                for c in range(COLS):
                    if grid[r][c] == 0:
                        q.append([r, c])
                        visit.add((r, c))

            dist = 0
            while q:
                for i in range(len(q)):
                    r, c = q.popleft()
                    grid[r][c] = dist
                    addCell(r + 1, c)
                    addCell(r - 1, c)
                    addCell(r, c + 1)
                    addCell(r, c - 1)
                dist += 1
- id: 287
  title: "Find The Duplicate Number"
  difficulty: Medium
  tags: [Neetcode 150, Array, Two Pointers, Binary Search, Bit Manipulation]
  verified: false
  description: |
    Given an array of integers `nums` containing `n + 1` integers where each integer is in the
    range `[1, n]` inclusive.

    There is only **one repeated number** in `nums`, return this repeated number.

    You must solve the problem **without** modifying the array `nums` and uses only constant
    extra space.

    **Example 1:**
      Input:  nums = [1,3,4,2,2]
      Output: 2

    **Example 2:**
      Input:  nums = [3,1,3,4,2]
      Output: 3

    **Example 3:**
      Input:  nums = [3,3,3,3,3]
      Output: 3

    **Constraints:**
      - 1 <= n <= 10^5
      - nums.length == n + 1
      - 1 <= nums[i] <= n
      - All the integers in nums appear only once except for precisely one integer which appears
        two or more times.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Floyd's cycle detection treating the array as a linked list where each value is a pointer to the next index. Phase 1: advance slow (1 step) and fast (2 steps) until they meet. Phase 2: reset slow2 to 0 and advance both slow pointers one step at a time — where they meet is the duplicate.
  solution: |
    class Solution:
        def findDuplicate(self, nums: List[int]) -> int:
            slow, fast = 0, 0
            while True:
                slow = nums[slow]
                fast = nums[nums[fast]]
                if slow == fast:
                    break

            slow2 = 0
            while True:
                slow = nums[slow]
                slow2 = nums[slow2]
                if slow == slow2:
                    return slow
- id: 295
  title: "Find Median From Data Stream"
  difficulty: Hard
  tags: [Neetcode 150, Two Pointers, Design, Sorting, Heap (Priority Queue), Data Stream]
  verified: false
  description: |
    The **median** is the middle value in an ordered integer list. If the size of the list is
    even, there is no middle value, and the median is the mean of the two middle values.

    - For example, for `arr = [2,3,4]`, the median is `3`.
    - For example, for `arr = [2,3]`, the median is `(2 + 3) / 2 = 2.5`.

    Implement the `MedianFinder` class:

    - `MedianFinder()`: initializes the `MedianFinder` object.
    - `void addNum(int num)`: adds the integer `num` from the data stream to the data structure.
    - `double findMedian()`: returns the median of all elements so far. Answers within `10^-5`
      of the actual answer will be accepted.

    **Example 1:**
      Input:
        ["MedianFinder", "addNum", "findMedian", "addNum", "findMedian"]
        [[], [1], [], [2], []]
      Output: [null, null, 1.0, null, 1.5]
      Explanation:
        MedianFinder medianFinder = new MedianFinder();
        medianFinder.addNum(1);
        medianFinder.findMedian(); // return 1.0
        medianFinder.addNum(2);
        medianFinder.findMedian(); // return 1.5

    **Constraints:**
      - -10^5 <= num <= 10^5
      - There will be at least one element in the data structure before calling `findMedian`.
      - At most 5 * 10^4 calls will be made to `addNum` and `findMedian`.
  time: "O(log n) for addNum, O(1) for findMedian"
  space: "O(n)"
  approach: |
    Maintain two heaps: a max-heap (`small`) for the lower half of numbers, and a min-heap
    (`large`) for the upper half. When adding a number, push it to `small` (max-heap) if it
    belongs to the lower half, otherwise to `large`. Then rebalance so the two heaps differ in
    size by at most 1. For `findMedian`, if sizes are equal, average the two tops; otherwise
    return the top of the larger heap.
  solution: |
    class MedianFinder:
        def __init__(self):
            self.small, self.large = [], []

        def addNum(self, num: int) -> None:
            if self.large and num > self.large[0]:
                heapq.heappush(self.large, num)
            else:
                heapq.heappush(self.small, -1 * num)

            if len(self.small) > len(self.large) + 1:
                val = -1 * heapq.heappop(self.small)
                heapq.heappush(self.large, val)
            if len(self.large) > len(self.small) + 1:
                val = heapq.heappop(self.large)
                heapq.heappush(self.small, -1 * val)

        def findMedian(self) -> float:
            if len(self.small) > len(self.large):
                return -1 * self.small[0]
            elif len(self.large) > len(self.small):
                return self.large[0]
            return (-1 * self.small[0] + self.large[0]) / 2.0
- id: 297
  title: "Serialize And Deserialize Binary Tree"
  difficulty: Hard
  tags: [Neetcode 150, Tree, DFS, BFS, Design]
  verified: false
  description: |
    Serialization is the process of converting a data structure or object into a sequence of bits
    so that it can be stored in a file or memory buffer, or transmitted across a network
    connection link to be reconstructed later in the same or another computer environment.

    Design an algorithm to serialize and deserialize a binary tree. There is no restriction on
    how your serialization/deserialization algorithm should work. You just need to ensure that a
    binary tree can be serialized to a string and this string can be deserialized to the original
    tree structure.

    **Example 1:**
      Input:  root = [1,2,3,null,null,4,5]
      Output: [1,2,3,null,null,4,5]

    **Example 2:**
      Input:  root = []
      Output: []

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 10^4].
      - -1000 <= Node.val <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    Preorder DFS for both operations. Serialize: record each node value or 'N' for null, joined by commas. Deserialize: split on commas, use a shared self.i index and recursively build the tree consuming values left to right.
  solution: |
    class Codec:
        def serialize(self, root: Optional[TreeNode]) -> str:
            res = []

            def dfs(node):
                if not node:
                    res.append("N")
                    return
                res.append(str(node.val))
                dfs(node.left)
                dfs(node.right)

            dfs(root)
            return ",".join(res)

        def deserialize(self, data: str) -> Optional[TreeNode]:
            vals = data.split(",")
            self.i = 0

            def dfs():
                if vals[self.i] == "N":
                    self.i += 1
                    return None
                node = TreeNode(int(vals[self.i]))
                self.i += 1
                node.left = dfs()
                node.right = dfs()
                return node

            return dfs()
- id: 300
  title: "Longest Increasing Subsequence"
  difficulty: Medium
  tags: [Neetcode 150, Array, Binary Search, Dynamic Programming]
  verified: false
  description: |
    Given an integer array `nums`, return the length of the longest **strictly increasing**
    subsequence.

    A **subsequence** is derived from the array by deleting some or no elements without
    changing the relative order of the remaining elements.

    **Example 1:**
      Input:  nums = [9,1,4,2,3,3,7]
      Output: 4
      Explanation: The longest increasing subsequence is [1,2,3,7].

    **Example 2:**
      Input:  nums = [0,3,1,3,2,3]
      Output: 4

    **Constraints:**
      - 1 <= nums.length <= 1000
      - -1000 <= nums[i] <= 1000
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    Maintain a dp array where each position stores the smallest tail element of all increasing
    subsequences of that length. For each new element, if it exceeds the last element in dp,
    append it (extends the longest subsequence). Otherwise, use binary search to find the
    position where this element should replace an existing value, keeping dp optimal for future
    extensions. The length of dp at the end is the LIS length.
  solution: |
    from bisect import bisect_left

    class Solution:
        def lengthOfLIS(self, nums: List[int]) -> int:
            dp = [nums[0]]
            LIS = 1

            for i in range(1, len(nums)):
                if dp[-1] < nums[i]:
                    dp.append(nums[i])
                    LIS += 1
                    continue

                idx = bisect_left(dp, nums[i])
                dp[idx] = nums[i]

            return LIS
- id: 309
  title: "Best Time to Buy and Sell Stock with Cooldown"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming]
  verified: false
  description: |
    You are given an integer array `prices` where `prices[i]` is the price of a stock on the
    `i`th day. You may complete as many transactions as you like with the following
    restrictions:
    - After you sell your stock, you cannot buy stock on the next day (cooldown one day).
    - You may not engage in multiple transactions simultaneously (you must sell before buying).

    Return the maximum profit you can achieve.

    **Example 1:**
      Input:  prices = [1,3,4,0,4]
      Output: 6
      Explanation: Buy day 0, sell day 1 (profit 2). Buy day 3, sell day 4 (profit 4). Total = 6.

    **Example 2:**
      Input:  prices = [1]
      Output: 0

    **Constraints:**
      - 1 <= prices.length <= 5000
      - 0 <= prices[i] <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use dynamic programming with state tracking. At each day, there are two states: buying
    (you don't own stock) or selling (you own stock). When selling, skip to day `i+2` to
    enforce the one-day cooldown. The space-optimized approach tracks only three variables
    representing future profits while iterating backward through the prices array.
  solution: |
    class Solution:
        def maxProfit(self, prices: List[int]) -> int:
            dp1_buy, dp1_sell = 0, 0
            dp2_buy = 0

            for i in range(len(prices) - 1, -1, -1):
                dp_buy = max(dp1_sell - prices[i], dp1_buy)
                dp_sell = max(dp2_buy + prices[i], dp1_sell)
                dp2_buy = dp1_buy
                dp1_buy, dp1_sell = dp_buy, dp_sell

            return dp1_buy
- id: 310
  title: "Minimum Height Trees"
  difficulty: Medium
  tags: [Depth-First Search, Breadth-First Search, Graph, Topological Sort]
  verified: false
  description: |
    A tree is an undirected graph in which any two vertices are connected by exactly
    one path. Given a tree of `n` nodes labelled from `0` to `n - 1`, and an array
    of `n - 1` edges where `edges[i] = [ai, bi]` indicates that there is an
    undirected edge between the two nodes `ai` and `bi`, you can choose any node of
    the tree as the root. When you select a node `x` as the root, the result tree
    has height `h`. Among all possible rooted trees, find all the roots that give
    the minimum height and return them in **any order**.

    **Example 1:**
      Input: n = 4, edges = [[1,0],[1,2],[1,3]]
      Output: [1]

    **Example 2:**
      Input: n = 6, edges = [[3,0],[3,1],[3,2],[3,4],[5,4]]
      Output: [3,4]

    **Constraints:**
      - 1 <= n <= 2 * 10^4
      - edges.length == n - 1
      - 0 <= ai, bi < n
      - ai != bi
      - All the pairs (ai, bi) are distinct.
      - The given input is guaranteed to be a tree and there will be no repeated edges.
  time: "O(V + E)"
  space: "O(V)"
  approach: |
    Use topological sort by iteratively trimming leaves. Build an adjacency list and
    track each node's degree. Initialize a queue with all leaf nodes (degree == 1).
    Remove leaves layer by layer, decrementing neighbor degrees and enqueueing any
    neighbor that becomes a leaf. Stop when 2 or fewer nodes remain — those are the
    centroids that minimize tree height.
  solution: |
    class Solution:
        def findMinHeightTrees(self, n: int, edges: List[List[int]]) -> List[int]:
            if n == 1:
                return [0]

            adj = [[] for _ in range(n)]
            for u, v in edges:
                adj[u].append(v)
                adj[v].append(u)

            edge_cnt = [len(adj[i]) for i in range(n)]
            leaves = deque([i for i in range(n) if edge_cnt[i] == 1])

            remaining = n
            while leaves:
                if remaining <= 2:
                    return list(leaves)

                remaining -= len(leaves)
                for _ in range(len(leaves)):
                    node = leaves.popleft()
                    for nei in adj[node]:
                        edge_cnt[nei] -= 1
                        if edge_cnt[nei] == 1:
                            leaves.append(nei)

            return []
- id: 312
  title: "Burst Balloons"
  difficulty: Hard
  tags: [Neetcode 150, Array, Dynamic Programming]
  verified: false
  description: |
    You are given an array of integers `nums` representing balloons. When you burst balloon
    `i`, you earn `nums[i-1] * nums[i] * nums[i+1]` coins. Out-of-bounds neighbors are
    treated as 1. You must burst all balloons. Return the maximum coins you can collect.

    **Example 1:**
      Input:  nums = [4,2,3,7]
      Output: 143
      Explanation: Burst in order 2,3,4,7: coins = 4*2*3 + 4*3*7 + 1*4*7 + 1*7*1 = 143.

    **Constraints:**
      - 1 <= n <= 300
      - 0 <= nums[i] <= 100
  time: "O(n^3)"
  space: "O(n^2)"
  approach: |
    Instead of choosing which balloon to burst first, determine which balloon is burst **last**
    in a range. When balloon `i` is the final one burst between indices `l` and `r`, all
    others are already gone, so its neighbors are fixed at `nums[l-1]` and `nums[r+1]`. This
    creates independent subproblems on `(l, i-1)` and `(i+1, r)`. Pad the array with 1s at
    both ends and use memoized DFS where `dp[l][r]` = maximum coins from bursting all
    balloons between `l` and `r`.
  solution: |
    class Solution:
        def maxCoins(self, nums: List[int]) -> int:
            nums = [1] + nums + [1]
            dp = {}

            def dfs(l, r):
                if l > r:
                    return 0
                if (l, r) in dp:
                    return dp[(l, r)]

                dp[(l, r)] = 0
                for i in range(l, r + 1):
                    coins = nums[l - 1] * nums[i] * nums[r + 1]
                    coins += dfs(l, i - 1) + dfs(i + 1, r)
                    dp[(l, r)] = max(dp[(l, r)], coins)
                return dp[(l, r)]

            return dfs(1, len(nums) - 2)
- id: 322
  title: "Coin Change"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming, Breadth-First Search]
  verified: false
  description: |
    Given an integer array `coins` representing coin denominations and an integer `amount`,
    return the minimum number of coins needed to form the exact target amount. Return `-1` if
    it is impossible.

    You may assume that you have an infinite number of each kind of coin.

    **Example 1:**
      Input:  coins = [1,5,10], amount = 12
      Output: 3
      Explanation: 12 = 10 + 1 + 1

    **Example 2:**
      Input:  coins = [2], amount = 3
      Output: -1

    **Example 3:**
      Input:  coins = [1], amount = 0
      Output: 0

    **Constraints:**
      - 1 <= coins.length <= 10
      - 1 <= coins[i] <= 2^31 - 1
      - 0 <= amount <= 10000
  time: "O(n * t)"
  space: "O(t)"
  approach: |
    Build solutions incrementally using bottom-up dynamic programming from amount 0 to the
    target. Initialize dp[0] = 0 (zero coins for amount 0) and all other positions to
    amount + 1 (sentinel for impossible). For each amount a and each coin c, update:
    dp[a] = min(dp[a], 1 + dp[a - c]) when a - c >= 0. Return dp[amount] if reachable, else -1.
  solution: |
    class Solution:
        def coinChange(self, coins: List[int], amount: int) -> int:
            dp = [amount + 1] * (amount + 1)
            dp[0] = 0

            for a in range(1, amount + 1):
                for c in coins:
                    if a - c >= 0:
                        dp[a] = min(dp[a], 1 + dp[a - c])

            return dp[amount] if dp[amount] != amount + 1 else -1
- id: 323
  title: "Number of Connected Components In An Undirected Graph"
  difficulty: Medium
  tags: [Neetcode 150, Depth-First Search, Breadth-First Search, Union Find, Graph]
  verified: false
  description: |
    Given an integer `n` representing the number of nodes and an array `edges` where
    `edges[i] = [ai, bi]` represents an undirected edge between nodes `ai` and `bi`, return
    the number of connected components in the graph.

    **Example 1:**
      Input:  n = 5, edges = [[0,1],[1,2],[3,4]]
      Output: 2

    **Example 2:**
      Input:  n = 5, edges = [[0,1],[1,2],[2,3],[3,4]]
      Output: 1

    **Constraints:**
      - 1 <= n <= 2000
      - 1 <= edges.length <= 5000
      - edges[i].length == 2
      - 0 <= ai <= bi < n
      - ai != bi
      - No repeated edges.
  time: "O(V + E)"
  space: "O(V + E)"
  approach: |
    Use Disjoint Set Union (Union-Find) with path compression and union by rank. Initialize each
    of n nodes as its own component. For each edge, attempt to union its two endpoints. If they
    already share a root, the edge is within an existing component; otherwise merge them and
    decrement the component count. Return the final count.
  solution: |
    class DSU:
        def __init__(self, n):
            self.parent = list(range(n))
            self.rank = [1] * n

        def find(self, node):
            cur = node
            while cur != self.parent[cur]:
                self.parent[cur] = self.parent[self.parent[cur]]
                cur = self.parent[cur]
            return cur

        def union(self, u, v):
            pu = self.find(u)
            pv = self.find(v)
            if pu == pv:
                return False
            if self.rank[pv] > self.rank[pu]:
                pu, pv = pv, pu
            self.parent[pv] = pu
            self.rank[pu] += self.rank[pv]
            return True

    class Solution:
        def countComponents(self, n: int, edges: List[List[int]]) -> int:
            dsu = DSU(n)
            res = n
            for u, v in edges:
                if dsu.union(u, v):
                    res -= 1
            return res
- id: 329
  title: "Longest Increasing Path In a Matrix"
  difficulty: Hard
  tags: [Neetcode 150, Array, Dynamic Programming, Depth-First Search, Graph, Memoization, Matrix]
  verified: false
  description: |
    You are given a 2-D grid of integers `matrix`. Return the length of the longest strictly
    increasing path within `matrix`. From each cell, you can move horizontally or vertically
    (not diagonally).

    **Example 1:**
      Input:  matrix = [[5,5,3],[2,3,6],[1,1,1]]
      Output: 4
      Explanation: The longest increasing path is [1, 2, 3, 6] or [1, 2, 3, 5].

    **Example 2:**
      Input:  matrix = [[1,2,3],[2,1,4],[7,6,5]]
      Output: 7
      Explanation: The longest increasing path is [1, 2, 3, 4, 5, 6, 7].

    **Constraints:**
      - 1 <= matrix.length, matrix[i].length <= 100
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use DFS with memoization. For any cell, the longest increasing path from that cell is
    constant regardless of how you reached it — because you can only move to strictly larger
    values, revisits are impossible (the graph is a DAG). Run DFS from every cell, exploring
    all four directional neighbors with strictly greater values. Cache the result for each cell
    to avoid redundant calculations. Return the maximum value found across all cells.
  solution: |
    class Solution:
        def longestIncreasingPath(self, matrix: List[List[int]]) -> int:
            ROWS, COLS = len(matrix), len(matrix[0])
            dp = {}  # (r, c) -> LIP

            def dfs(r, c, prevVal):
                if (r < 0 or r == ROWS or c < 0 or
                    c == COLS or matrix[r][c] <= prevVal
                ):
                    return 0
                if (r, c) in dp:
                    return dp[(r, c)]

                res = 1
                res = max(res, 1 + dfs(r + 1, c, matrix[r][c]))
                res = max(res, 1 + dfs(r - 1, c, matrix[r][c]))
                res = max(res, 1 + dfs(r, c + 1, matrix[r][c]))
                res = max(res, 1 + dfs(r, c - 1, matrix[r][c]))
                dp[(r, c)] = res
                return res

            for r in range(ROWS):
                for c in range(COLS):
                    dfs(r, c, -1)
            return max(dp.values())
- id: 332
  title: "Reconstruct Itinerary"
  difficulty: Hard
  tags: [Neetcode 150, DFS, Graph]
  time: "O(E log E)"
  space: "O(E)"
  description: |
    You are given a list of airline tickets where `tickets[i] = [fromi, toi]` represent the departure and the arrival airports of one flight. Reconstruct the itinerary in order and return it.

    All of the tickets must be used once and exactly once. The itinerary must begin with `"JFK"`. If there are multiple valid itineraries, return the itinerary that has the smallest lexical order when read as a single string.

    **Example 1:**
    Input: tickets = [["MUC","LHR"],["JFK","MUC"],["SFO","SJC"],["LHR","SFO"]]
    Output: ["JFK","MUC","LHR","SFO","SJC"]

    **Example 2:**
    Input: tickets = [["JFK","SFO"],["JFK","ATL"],["SFO","ATL"],["ATL","JFK"],["ATL","SFO"]]
    Output: ["JFK","ATL","JFK","SFO","ATL","SFO"]

    **Constraints:**
    - `1 <= tickets.length <= 300`
    - `tickets[i].length == 2`
    - `fromi.length == 3`
    - `toi.length == 3`
    - `fromi` and `toi` consist of uppercase English letters.
    - `fromi != toi`
  approach: |
    Use Hierholzer's algorithm to find an Eulerian path starting from "JFK". Sort all tickets in reverse lexicographic order so that when destinations are stored in an adjacency list and popped, we always take the smallest lexicographic destination first.

    Perform a DFS from "JFK", appending airports to the result in post-order (after all outgoing edges are exhausted). Reverse the result at the end to get the correct order.
  solution: |
    class Solution:
        def findItinerary(self, tickets: List[List[str]]) -> List[str]:
            adj = defaultdict(list)
            for src, dst in sorted(tickets, reverse=True):
                adj[src].append(dst)

            res = []

            def dfs(src):
                while adj[src]:
                    dst = adj[src].pop()
                    dfs(dst)
                res.append(src)

            dfs("JFK")
            return res[::-1]
  verified: false
- id: 338
  title: "Counting Bits"
  difficulty: Easy
  tags: [Neetcode 150, Dynamic Programming, Bit Manipulation]
  verified: false
  description: |
    Given an integer `n`, count the number of `1`'s in the binary representation of every
    number in the range `[0, n]`. Return an array `output` where `output[i]` is the number of
    `1`'s in the binary representation of `i`.

    **Example 1:**
      Input:  n = 4
      Output: [0,1,1,2,1]
      Explanation: 0 --> 0, 1 --> 1, 2 --> 10, 3 --> 11, 4 --> 100

    **Constraints:**
      - 0 <= n <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use dynamic programming with bit manipulation. Right-shifting a number by 1 (i >> 1)
    removes the least significant bit. The bit count of i equals the bit count of i >> 1 plus
    the last bit of i (extracted by i & 1). This recurrence lets each result be computed from a
    previously computed smaller number, building all results incrementally in one pass.
  solution: |
    class Solution:
        def countBits(self, n: int) -> List[int]:
            dp = [0] * (n + 1)
            for i in range(n + 1):
                dp[i] = dp[i >> 1] + (i & 1)
            return dp
- id: 347
  title: "Top K Frequent Elements"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, Divide and Conquer, Sorting, Heap, Bucket Sort, Counting, Quickselect]
  verified: false
  description: |
    Given an integer array `nums` and an integer `k`, return the `k` most frequent elements.
    You may return the answer in **any order**.

    **Example 1:**
      Input:  nums = [1,1,1,2,2,3], k = 2
      Output: [1,2]

    **Example 2:**
      Input:  nums = [1], k = 1
      Output: [1]

    **Constraints:**
      - 1 <= nums.length <= 10^5
      - -10^4 <= nums[i] <= 10^4
      - k is in the range [1, the number of unique elements in the array].
      - It is guaranteed that the answer is unique.

    **Follow up:** Your algorithm's time complexity must be better than `O(n log n)`, where n
    is the array's size.
  easy_time: "O(n log k)"
  easy_space: "O(n+k)"
  easy_approach: |
    After counting how often each number appears, we want to efficiently keep track of only the k most frequent elements.
    A min-heap is perfect for this because it always keeps the smallest element at the top.
    By pushing (frequency, value) pairs into the heap and removing the smallest whenever the heap grows beyond size k, we ensure that the heap always contains the top k most frequent elements.
    In the end, the heap holds exactly the k values with the highest frequencies.
  easy_solution: |
    def topKFrequent(self, nums: List[int], k: int) -> List[int]:
        count = {}
        for num in nums:
            count[num] = 1 + count.get(num, 0)

        heap = []
        for num in count.keys():
            heapq.heappush(heap, (count[num], num))
            if len(heap) > k:
                heapq.heappop(heap)

        res = []
        for i in range(k):
            res.append(heapq.heappop(heap)[1])
        return res
  time: "O(n)"
  space: "O(n)"
  approach: |
    Each number in the array appears a certain number of times, and the maximum possible frequency is the length of the array.
    We can use this idea by creating a list where the index represents a frequency, and at each index we store all numbers that appear exactly that many times.

    For example:

        All numbers that appear 1 time go into group freq[1].
        All numbers that appear 2 times go into group freq[2].
        And so on.

    After we build these groups, we look from the highest possible frequency down to the lowest and collect numbers from these groups until we have k of them.
    This way, we directly jump to the most frequent numbers without sorting all the elements by frequency.
  solution: |
    class Solution:
        def topKFrequent(self, nums: List[int], k: int) -> List[int]:
            count = {}
            freq = [[] for i in range(len(nums) + 1)]

            for num in nums:
                count[num] = 1 + count.get(num, 0)
            for num, cnt in count.items():
                freq[cnt].append(num)

            res = []
            for i in range(len(freq) - 1, 0, -1):
                for num in freq[i]:
                    res.append(num)
                    if len(res) == k:
                        return res
- id: 355
  title: "Design Twitter"
  difficulty: Medium
  tags: [Neetcode 150, Hash Table, Linked List, Design, Heap (Priority Queue)]
  verified: false
  description: |
    Design a simplified version of Twitter where users can post tweets, follow/unfollow another
    user, and is able to see the `10` most recent tweets in the user's news feed.

    Implement the `Twitter` class:

    - `Twitter()`: Initializes your twitter object.
    - `void postTweet(int userId, int tweetId)`: Composes a new tweet with ID `tweetId` by the
      user `userId`. Each call to this function will be made with a unique `tweetId`.
    - `List<Integer> getNewsFeed(int userId)`: Retrieves the `10` most recent tweet IDs in the
      user's news feed. Each item in the news feed must be posted by users who the user followed
      or by the user themself. Tweets must be **ordered from most recent to least recent**.
    - `void follow(int followerId, int followeeId)`: The user with ID `followerId` starts
      following the user with ID `followeeId`.
    - `void unfollow(int followerId, int followeeId)`: The user with ID `followerId` starts
      unfollowing the user with ID `followeeId`.

    **Example 1:**
      Input:
        ["Twitter", "postTweet", "getNewsFeed", "follow", "postTweet", "getNewsFeed",
         "unfollow", "getNewsFeed"]
        [[], [1, 5], [1], [1, 2], [2, 6], [1], [1, 2], [1]]
      Output: [null, null, [5], null, null, [6, 5], null, [5]]

    **Constraints:**
      - 1 <= userId, followerId, followeeId <= 500
      - 0 <= tweetId <= 10^4
      - All `tweetId`s are unique.
      - At most 3 * 10^4 calls will be made to `postTweet`, `getNewsFeed`, `follow`, and
        `unfollow`.
  time: "O(n log n) for getNewsFeed, O(1) for all other methods"
  space: "O(N * m + N * M + n)"
  approach: |
    Use a hash map from userId to a list of their (timestamp, tweetId) pairs, and another hash
    map from userId to a set of followees. Assign a decreasing counter as the timestamp so newer
    tweets have smaller values. For `getNewsFeed`, add the user to their own followees, then push
    the most recent tweet from each followee onto a min-heap. Repeatedly pop the minimum (most
    recent) tweet, append it to the result, and push that followee's next tweet onto the heap.
    Stop once 10 tweets are collected or the heap is empty.
  solution: |
    class Twitter:
        def __init__(self):
            self.count = 0
            self.tweetMap = defaultdict(list)
            self.followMap = defaultdict(set)

        def postTweet(self, userId: int, tweetId: int) -> None:
            self.tweetMap[userId].append([self.count, tweetId])
            self.count -= 1

        def getNewsFeed(self, userId: int) -> List[int]:
            res = []
            minHeap = []

            self.followMap[userId].add(userId)
            for followeeId in self.followMap[userId]:
                if followeeId in self.tweetMap:
                    index = len(self.tweetMap[followeeId]) - 1
                    count, tweetId = self.tweetMap[followeeId][index]
                    heapq.heappush(minHeap, [count, tweetId, followeeId, index - 1])

            while minHeap and len(res) < 10:
                count, tweetId, followeeId, index = heapq.heappop(minHeap)
                res.append(tweetId)
                if index >= 0:
                    count, tweetId = self.tweetMap[followeeId][index]
                    heapq.heappush(minHeap, [count, tweetId, followeeId, index - 1])

            return res

        def follow(self, followerId: int, followeeId: int) -> None:
            self.followMap[followerId].add(followeeId)

        def unfollow(self, followerId: int, followeeId: int) -> None:
            self.followMap[followerId].discard(followeeId)
- id: 371
  title: "Sum of Two Integers"
  difficulty: Medium
  tags: [Neetcode 150, Math, Bit Manipulation]
  verified: false
  description: |
    Given two integers `a` and `b`, return the sum of the two integers without using the
    operators `+` and `-`.

    **Example 1:**
      Input:  a = 1, b = 1
      Output: 2

    **Example 2:**
      Input:  a = 4, b = 7
      Output: 11

    **Constraints:**
      - -1000 <= a <= 1000
      - -1000 <= b <= 1000
  time: "O(1)"
  space: "O(1)"
  approach: |
    Binary addition uses two operations: XOR produces the sum of bits without carry (1 XOR 1 =
    0, matching addition), and AND with left shift identifies carry (both bits are 1). Repeatedly
    compute carry as (a & b) << 1, update sum as a XOR b, then assign carry to b — until no
    carry remains. A 32-bit mask handles overflow; negative results in two's complement require
    conversion back to signed representation.
  solution: |
    class Solution:
        def getSum(self, a: int, b: int) -> int:
            mask = 0xFFFFFFFF
            max_int = 0x7FFFFFFF

            while b != 0:
                carry = (a & b) << 1
                a = (a ^ b) & mask
                b = carry & mask

            return a if a <= max_int else ~(a ^ mask)
- id: 383
  title: "Ransom Note"
  difficulty: Easy
  tags: [Hash Table, String, Counting]
  verified: false
  description: |
    Given two strings `ransomNote` and `magazine`, return `true` if `ransomNote`
    can be constructed by using the letters from `magazine` and `false` otherwise.

    Each letter in `magazine` can only be used once in `ransomNote`.

    **Example 1:**
      Input: ransomNote = "a", magazine = "b"
      Output: false

    **Example 2:**
      Input: ransomNote = "aa", magazine = "ab"
      Output: false

    **Example 3:**
      Input: ransomNote = "aa", magazine = "aab"
      Output: true

    **Constraints:**
      - 1 <= ransomNote.length, magazine.length <= 10^5
      - ransomNote and magazine consist of lowercase English letters.
  time: "O(m + n)"
  space: "O(1)"
  approach: |
    Count character frequencies in the magazine using a fixed 26-element array.
    Then iterate through the ransom note, decrementing the count for each required
    character. If any count drops below zero, the magazine lacks sufficient letters
    for the ransom note.
  solution: |
    class Solution:
        def canConstruct(self, ransomNote: str, magazine: str) -> bool:
            count = [0] * 26
            for c in magazine:
                count[ord(c) - ord('a')] += 1

            for c in ransomNote:
                count[ord(c) - ord('a')] -= 1
                if count[ord(c) - ord('a')] < 0:
                    return False

            return True
- id: 409
  title: "Longest Palindrome"
  difficulty: Easy
  tags: [Hash Table, String, Greedy]
  verified: false
  description: |
    Given a string `s` which consists of lowercase or uppercase letters, return the
    length of the **longest palindrome** that can be built with those letters.

    Letters are **case sensitive**, for example, `"Aa"` is not considered a
    palindrome.

    **Example 1:**
      Input: s = "abccccdd"
      Output: 7
      Explanation: One longest palindrome that can be built is "dccaccd", whose length is 7.

    **Example 2:**
      Input: s = "a"
      Output: 1

    **Constraints:**
      - 1 <= s.length <= 2000
      - s consists of lowercase **and/or** uppercase English letters only.
  time: "O(n)"
  space: "O(1)"
  approach: |
    A palindrome uses character pairs (even counts) with at most one odd-count
    character in the center. Track characters with odd occurrence counts using a
    hash set. When a character appears again, it forms a pair (add 2 to result) and
    is removed from the set. Any characters remaining in the set after processing
    can contribute one character as the center, so add 1 if the set is non-empty.
  solution: |
    class Solution:
        def longestPalindrome(self, s: str) -> int:
            seen = set()
            res = 0

            for c in s:
                if c in seen:
                    seen.remove(c)
                    res += 2
                else:
                    seen.add(c)

            return res + 1 if seen else res
- id: 416
  title: "Partition Equal Subset Sum"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming]
  verified: false
  description: |
    Given an array of positive integers `nums`, determine if the array can be partitioned into
    two subsets where both subsets have equal sum.

    **Example 1:**
      Input:  nums = [1,2,3,4]
      Output: true
      Explanation: Array partitions as [1, 4] and [2, 3].

    **Example 2:**
      Input:  nums = [1,2,3,4,5]
      Output: false

    **Constraints:**
      - 1 <= nums.length <= 100
      - 1 <= nums[i] <= 50
  time: "O(n * t)"
  space: "O(t)"
  approach: |
    If the total sum is odd, return false immediately. Otherwise, check whether any subset sums
    to exactly half the total — if it does, the remaining elements automatically form an equal
    counterpart. Use a boolean dp array where dp[j] represents achievable sums. For each number,
    iterate backwards through possible sums (0/1 knapsack) to ensure each element is used at
    most once: dp[j] = dp[j] or dp[j - num].
  solution: |
    class Solution:
        def canPartition(self, nums: List[int]) -> bool:
            if sum(nums) % 2:
                return False

            target = sum(nums) // 2
            dp = [False] * (target + 1)
            dp[0] = True

            for num in nums:
                for j in range(target, num - 1, -1):
                    dp[j] = dp[j] or dp[j - num]

            return dp[target]
- id: 417
  title: "Pacific Atlantic Water Flow"
  difficulty: Medium
  tags: [Neetcode 150, Array, Depth-First Search, Breadth-First Search, Matrix]
  verified: false
  description: |
    There is an `m x n` rectangular island that borders both the **Pacific Ocean** and the
    **Atlantic Ocean**. The Pacific Ocean touches the island's left and top edges, and the
    Atlantic Ocean touches the island's right and bottom edges.

    You are given an `m x n` integer matrix `heights` where `heights[r][c]` represents the
    height above sea level of the cell at `(r, c)`. Rain water can flow to neighboring cells
    (north, south, east, west) if the neighbor's height is **less than or equal to** the
    current height.

    Return a list of grid coordinates where water can flow to **both** the Pacific and Atlantic
    oceans.

    **Example 1:**
      Input:  heights = [[1,2,2,3,5],[3,2,3,4,4],[2,4,5,3,1],[6,7,1,4,5],[5,1,1,2,4]]
      Output: [[0,4],[1,3],[1,4],[2,2],[3,0],[3,1],[4,0]]

    **Example 2:**
      Input:  heights = [[1],[1]]
      Output: [[0,0],[1,0]]

    **Constraints:**
      - m == heights.length
      - n == heights[r].length
      - 1 <= m, n <= 200
      - 0 <= heights[r][c] <= 10^5
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Reverse the flow direction: start from the ocean boundaries and propagate inward. A cell
    can reach an ocean if water can flow uphill from the ocean to that cell (height >=
    neighbor). Run two DFS passes: one from the Pacific boundary (top row + left column) and
    one from the Atlantic boundary (bottom row + right column), marking all reachable cells.
    Cells reachable from both passes are added to the result.
  solution: |
    class Solution:
        def pacificAtlantic(self, heights: List[List[int]]) -> List[List[int]]:
            ROWS, COLS = len(heights), len(heights[0])
            pac, atl = set(), set()

            def dfs(r, c, visit, prevHeight):
                if ((r, c) in visit or r < 0 or c < 0 or
                    r == ROWS or c == COLS or
                    heights[r][c] < prevHeight):
                    return
                visit.add((r, c))
                dfs(r + 1, c, visit, heights[r][c])
                dfs(r - 1, c, visit, heights[r][c])
                dfs(r, c + 1, visit, heights[r][c])
                dfs(r, c - 1, visit, heights[r][c])

            for c in range(COLS):
                dfs(0, c, pac, heights[0][c])
                dfs(ROWS - 1, c, atl, heights[ROWS - 1][c])

            for r in range(ROWS):
                dfs(r, 0, pac, heights[r][0])
                dfs(r, COLS - 1, atl, heights[r][COLS - 1])

            res = []
            for r in range(ROWS):
                for c in range(COLS):
                    if (r, c) in pac and (r, c) in atl:
                        res.append([r, c])
            return res
- id: 424
  title: "Longest Repeating Character Replacement"
  difficulty: Medium
  tags: [Neetcode 150, Hash Table, String, Sliding Window]
  verified: false
  description: |
    You are given a string `s` and an integer `k`. You can choose any character of the string
    and change it to any other uppercase English character. You can perform this operation at
    most `k` times.

    Return the length of the longest substring containing the same letter you can get after
    performing the above operations.

    **Example 1:**
      Input:  s = "ABAB", k = 2
      Output: 4
      Explanation: Replace the two 'A's with two 'B's or vice versa.

    **Example 2:**
      Input:  s = "AABABBA", k = 1
      Output: 4
      Explanation: Replace the one 'A' in the middle with 'B' and form "AABBBBA". The
        substring "BBBB" has the longest repeating letters, which is 4. There may exist other
        ways to achieve this answer too.

    **Constraints:**
      - 1 <= s.length <= 10^5
      - s consists of only uppercase English letters.
      - 0 <= k <= s.length
  easy_time: "O(m*n), n is length of string, m is the number of unique characters"
  easy_space: "O(m)"
  easy_approach: |
    Loop through each unique character in the string (fix a character). If the character matches, move the right pointer and increase the count. Move the left pointer if k limit is exceeded.
  easy_solution: |
    class Solution:
        def characterReplacement(self, s: str, k: int) -> int:
            out = 0
            charset = set(s)

            for c in charset:
                count = l = 0
                for r in range(len(s)):
                    if s[r] == c:
                        count += 1

                    while (r - l + 1) - count > k:
                        if s[l] == c:
                            count -= 1
                        l += 1

                    out = max(out, r - l + 1)
            return out
  time: "O(n)"
  space: "O(m)"
  approach: |
    Sliding window with a character frequency map. A window is valid when (window_size - max_freq) <= k. Expand right tracking max_freq; when invalid shrink from the left. Track the maximum valid window size seen.
  solution: |
    class Solution:
        def characterReplacement(self, s: str, k: int) -> int:
            count = {}
            res = 0

            l = 0
            maxf = 0
            for r in range(len(s)):
                count[s[r]] = 1 + count.get(s[r], 0)
                maxf = max(maxf, count[s[r]])

                while (r - l + 1) - maxf > k:
                    count[s[l]] -= 1
                    l += 1
                res = max(res, r - l + 1)

            return res
- id: 435
  title: "Non Overlapping Intervals"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming, Greedy, Sorting]
  verified: false
  description: |
    Given an array of intervals `intervals` where `intervals[i] = [start_i, end_i]`, return the
    **minimum** number of intervals you need to remove to make the rest of the intervals
    non-overlapping.

    **Note** that intervals which only touch at a point are **non-overlapping**. For example,
    `[1, 2]` and `[2, 3]` are non-overlapping.

    **Example 1:**
      Input:  intervals = [[1,2],[2,3],[3,4],[1,3]]
      Output: 1
      Explanation: [1,3] can be removed and the rest of the intervals are non-overlapping.

    **Example 2:**
      Input:  intervals = [[1,2],[1,2],[1,2]]
      Output: 2
      Explanation: You need to remove two [1,2] to make the rest of the intervals non-overlapping.

    **Example 3:**
      Input:  intervals = [[1,2],[2,3]]
      Output: 0
      Explanation: You don't need to remove any of the intervals since they're already
        non-overlapping.

    **Constraints:**
      - 1 <= intervals.length <= 10^5
      - intervals[i].length == 2
      - -5 * 10^4 <= start_i < end_i <= 5 * 10^4
  time: "O(n log n)"
  space: "O(1)"
  approach: |
    Greedy: sort intervals by end time. Track the previous end time and a removal count. For
    each interval, if it overlaps with the previous end (prevEnd > current start), increment
    the removal count — keep the one ending earlier (already in hand since we sorted by end).
    Otherwise update prevEnd to the current interval's end. Return the removal count.
  solution: |
    class Solution:
        def eraseOverlapIntervals(self, intervals: List[List[int]]) -> int:
            intervals.sort(key=lambda x: x[1])
            prevEnd = intervals[0][1]
            res = 0

            for i in range(1, len(intervals)):
                if prevEnd > intervals[i][0]:
                    res += 1
                else:
                    prevEnd = intervals[i][1]

            return res
- id: 438
  title: "Find All Anagrams in a String"
  difficulty: Medium
  tags: [Hash Table, String, Sliding Window]
  verified: false
  description: |
    Given two strings `s` and `p`, return an array of all the start indices of
    `p`'s anagrams in `s`. You may return the answer in **any order**.

    An **Anagram** is a word or phrase formed by rearranging the letters of a
    different word or phrase, typically using all the original letters exactly once.

    **Example 1:**
      Input: s = "cbaebabacd", p = "abc"
      Output: [0,6]
      Explanation: The substring with start index 0 is "cba", which is an anagram of "abc".
                   The substring with start index 6 is "bac", which is an anagram of "abc".

    **Example 2:**
      Input: s = "abab", p = "ab"
      Output: [0,1,2]

    **Constraints:**
      - 1 <= s.length, p.length <= 3 * 10^4
      - s and p consist of lowercase English letters.
  time: "O(n + m)"
  space: "O(1)"
  approach: |
    Use a sliding window of size len(p). Build frequency arrays for both p and the
    initial window of s, and track how many of the 26 characters have matching
    counts. As the window slides, update counts for the removed left character and
    the added right character, adjusting the match count incrementally. Record the
    window start index whenever all 26 characters match.
  solution: |
    class Solution:
        def findAnagrams(self, s: str, p: str) -> List[int]:
            n, m = len(s), len(p)
            if m > n:
                return []

            pCount = [0] * 26
            sCount = [0] * 26
            for i in range(m):
                pCount[ord(p[i]) - ord('a')] += 1
                sCount[ord(s[i]) - ord('a')] += 1

            match = sum(1 for i in range(26) if pCount[i] == sCount[i])
            res = []
            if match == 26:
                res.append(0)

            l = 0
            for r in range(m, n):
                c = ord(s[l]) - ord('a')
                if sCount[c] == pCount[c]:
                    match -= 1
                sCount[c] -= 1
                l += 1
                if sCount[c] == pCount[c]:
                    match += 1

                c = ord(s[r]) - ord('a')
                if sCount[c] == pCount[c]:
                    match -= 1
                sCount[c] += 1
                if sCount[c] == pCount[c]:
                    match += 1

                if match == 26:
                    res.append(l)

            return res
- id: 494
  title: "Target Sum"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming, Backtracking]
  verified: false
  description: |
    You are given an array of integers `nums` and an integer `target`. For each number in the
    array, you can choose to either add or subtract it. Return the number of different
    expressions that evaluate to `target`.

    **Example 1:**
      Input:  nums = [2,2,2], target = 2
      Output: 3
      Explanation: +2+2-2=2, +2-2+2=2, -2+2+2=2

    **Constraints:**
      - 1 <= nums.length <= 20
      - 0 <= nums[i] <= 1000
      - -1000 <= target <= 1000
  time: "O(n * m)"
  space: "O(n * m)"
  approach: |
    Use space-optimized bottom-up dynamic programming. Maintain a map (dictionary) tracking
    all achievable sums and their counts. For each number, iterate through existing sums and
    branch each into two possibilities: adding and subtracting the current number. Update a
    new map with these branches, then replace the old map. Return the count stored at `target`
    in the final map.
  solution: |
    class Solution:
        def findTargetSumWays(self, nums: List[int], target: int) -> int:
            dp = defaultdict(int)
            dp[0] = 1

            for num in nums:
                next_dp = defaultdict(int)
                for total, count in dp.items():
                    next_dp[total + num] += count
                    next_dp[total - num] += count
                dp = next_dp

            return dp[target]
- id: 518
  title: "Coin Change II"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming]
  verified: false
  description: |
    Given an integer array `coins` representing coin denominations and an integer `amount`
    representing a target sum, return the number of distinct combinations that total to
    `amount`. You may use each coin denomination an unlimited number of times.

    **Example 1:**
      Input:  amount = 4, coins = [1,2,3]
      Output: 4
      Explanation: 1+1+1+1, 1+1+2, 2+2, 1+3

    **Example 2:**
      Input:  amount = 7, coins = [2,4]
      Output: 0

    **Constraints:**
      - 1 <= coins.length <= 100
      - 1 <= coins[i] <= 5000
      - 0 <= amount <= 5000
  time: "O(n * a)"
  space: "O(n * a)"
  approach: |
    Use a 1D dynamic programming array where `dp[a]` is the number of combinations that sum to
    `a`. Iterate through coins in the outer loop and amounts in the inner loop. For each coin,
    update all reachable amounts by adding the count for `a - coin`. By iterating coins in the
    outer loop, each unique combination is counted once, avoiding duplicates from different
    orderings. Initialize `dp[0] = 1` (one way to make amount 0).
  solution: |
    class Solution:
        def change(self, amount: int, coins: List[int]) -> int:
            dp = [0] * (amount + 1)
            dp[0] = 1

            for coin in coins:
                for a in range(coin, amount + 1):
                    dp[a] += dp[a - coin]

            return dp[amount]
- id: 543
  title: "Diameter of Binary Tree"
  difficulty: Easy
  tags: [Neetcode 150, Tree, DFS]
  verified: false
  description: |
    Given the `root` of a binary tree, return the length of the **diameter** of the tree.

    The **diameter** of a binary tree is the **length** of the longest path between any two
    nodes in a tree. This path may or may not pass through the `root`.

    The **length** of a path between two nodes is represented by the number of edges between them.

    **Example 1:**
      Input:  root = [1,2,3,4,5]
      Output: 3
      Explanation: 3 is the length of the path [4,2,1,3] or [5,2,1,3].

    **Example 2:**
      Input:  root = [1,2]
      Output: 1

    **Constraints:**
      - The number of nodes in the tree is in the range [1, 10^4].
      - -100 <= Node.val <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS returning the height of each subtree. At each node, update the global max with left_height + right_height (the diameter through this node). Return 1 + max(left, right) as the height.
  solution: |
    class Solution:
        def diameterOfBinaryTree(self, root: Optional[TreeNode]) -> int:
            res = 0

            def dfs(root):
                nonlocal res

                if not root:
                    return 0

                left = dfs(root.left)
                right = dfs(root.right)
                res = max(res, left + right)

                return 1 + max(left, right)

            dfs(root)
            return res
- id: 567
  title: "Permutation In String"
  difficulty: Medium
  tags: [Neetcode 150, Hash Table, Two Pointers, String, Sliding Window]
  verified: true
  description: |
    Given two strings `s1` and `s2`, return `true` if `s2` contains a **permutation** of `s1`,
    or `false` otherwise.

    In other words, return `true` if one of `s1`'s permutations is a substring of `s2`.

    **Example 1:**
      Input:  s1 = "ab", s2 = "eidbaooo"
      Output: true
      Explanation: s2 contains one permutation of s1 ("ba").

    **Example 2:**
      Input:  s1 = "ab", s2 = "eidboaoo"
      Output: false

    **Constraints:**
      - 1 <= s1.length, s2.length <= 10^4
      - s1 and s2 consist of lowercase English letters.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Fixed-size sliding window of length len(s1). Maintain one 26-element counter array. Count s1 characters initially as negative. Slide rightward: update the entering and leaving character counts. Return True when count is all zeros.
  solution: |
    class Solution:
        def checkInclusion(self, s1: str, s2: str) -> bool:
            
            if len(s1) > len(s2):
                return False

            count = [0]*26
            for c in s1:
                count[ord(c) - ord('a')] -= 1
            
            l = 0
            for r in range(len(s1)):
                count[ord(s2[r]) - ord('a')] += 1

            if all(c == 0 for c in count):
                return True

            for r in range(len(s1),len(s2)):
                count[ord(s2[r]) - ord('a')] += 1
                count[ord(s2[l]) - ord('a')] -= 1
                if all(c == 0 for c in count):
                    return True
                l += 1
            return False
- id: 572
  title: "Subtree of Another Tree"
  difficulty: Easy
  tags: [Neetcode 150, Tree, DFS, Hash Function]
  verified: false
  description: |
    Given the roots of two binary trees `root` and `subRoot`, return `true` if there is a
    subtree of `root` with the same structure and node values of `subRoot` and `false` otherwise.

    A subtree of a binary tree `tree` is a tree that consists of a node in `tree` and all of
    this node's descendants. The tree `tree` could also be considered as a subtree of itself.

    **Example 1:**
      Input:  root = [3,4,5,1,2], subRoot = [4,1,2]
      Output: true

    **Example 2:**
      Input:  root = [3,4,5,1,2,null,null,null,null,0], subRoot = [4,1,2]
      Output: false

    **Constraints:**
      - The number of nodes in the root tree is in the range [1, 2000].
      - The number of nodes in the subRoot tree is in the range [1, 1000].
      - -10^4 <= root.val <= 10^4
      - -10^4 <= subRoot.val <= 10^4
  time: "O(m * n)"
  space: "O(m + n)"
  approach: |
    For each node in root, check whether the subtree rooted there is identical to subRoot using a helper sameTree function. Return True if any match is found. sameTree recursively checks: both null → True; matching values with equal subtrees → True; otherwise False.
  solution: |
    class Solution:
        def isSubtree(self, root: Optional[TreeNode], subRoot: Optional[TreeNode]) -> bool:
            if not subRoot:
                return True
            if not root:
                return False

            if self.sameTree(root, subRoot):
                return True
            return (self.isSubtree(root.left, subRoot) or
                    self.isSubtree(root.right, subRoot))

        def sameTree(self, root: Optional[TreeNode], subRoot: Optional[TreeNode]) -> bool:
            if not root and not subRoot:
                return True
            if root and subRoot and root.val == subRoot.val:
                return (self.sameTree(root.left, subRoot.left) and
                        self.sameTree(root.right, subRoot.right))
            return False
- id: 621
  title: "Task Scheduler"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, Greedy, Sorting, Heap (Priority Queue), Counting]
  verified: false
  description: |
    You are given an array of CPU `tasks`, each labeled with a letter from A to Z, and a number
    `n`. Each CPU interval can be idle or allow the completion of one task. Tasks can be completed
    in any order, but there is a cooldown interval of `n` units of time between any two tasks with
    the **same** label.

    Return the **minimum** number of CPU intervals required to complete all tasks.

    **Example 1:**
      Input:  tasks = ["X","X","Y","Y"], n = 2
      Output: 5
      Explanation: One valid sequence is: X → Y → Idle → X → Y.

    **Example 2:**
      Input:  tasks = ["A","A","A","B","C"], n = 3
      Output: 9
      Explanation: One valid sequence is: A → B → C → Idle → A → Idle → Idle → Idle → A.

    **Constraints:**
      - 1 <= tasks.length <= 1000
      - tasks[i] is an uppercase English letter.
      - 0 <= n <= 100
  easy_time: "O(m)"
  easy_space: "O(1), only max 26 different characters. Otherwise O(t)"
  easy_approach: |
    We always want to run the task that still has the most remaining occurrences, because those are the hardest to fit into the schedule (they need more slots with cooldown gaps).

    - Keep a max-heap of tasks by their remaining count (most frequent on top).
    - At each time unit, we take the most frequent available task and run it.
    - After running a task, it goes into a cooldown queue with the time when it will be available again (current time + n).
    - When a task’s cooldown finishes, we push it back into the heap so it can be scheduled again.
    - If the heap is empty but some tasks are still in cooldown, we can jump the current time forward to the next time when a task becomes available.

    This way we always use the CPU as efficiently as possible while respecting the cooldown.
  easy_solution: |
    class Solution:
        def leastInterval(self, tasks: List[str], n: int) -> int:

            heap = [freq for freq in Counter(tasks).values()]
            heapq.heapify_max(heap)

            queue = deque()

            time = 0

            while heap or queue:

                time += 1

                if not heap:
                    time = queue[0][0]

                if queue and time >= queue[0][0]:
                    _,freq = queue.popleft()
                    heapq.heappush_max(heap,freq)

                if heap:
                    freq = heapq.heappop_max(heap)
                    if freq-1 > 0:
                        queue.append((time+n+1,freq-1))

            return time
  time: "O(m)"
  space: "O(1)"
  approach: |
    Use a mathematical formula based on the most frequent task. If `maxf` is the highest
    frequency of any task, it requires `(maxf - 1)` frames each of size `(n + 1)`. If
    `maxCount` tasks share that maximum frequency, they all fill a slot in the final frame.
    The minimum time is `(maxf - 1) * (n + 1) + maxCount`. However, if there are so many
    tasks that idle slots are never needed, the answer is simply the total number of tasks.
    Return the max of both.
  solution: |
    class Solution:
        def leastInterval(self, tasks: List[str], n: int) -> int:
            count = [0] * 26
            for task in tasks:
                count[ord(task) - ord('A')] += 1

            maxf = max(count)
            maxCount = sum(1 for c in count if c == maxf)

            time = (maxf - 1) * (n + 1) + maxCount
            return max(len(tasks), time)
- id: 647
  title: "Palindromic Substrings"
  difficulty: Medium
  tags: [Neetcode 150, Two Pointers, String, Dynamic Programming]
  verified: false
  description: |
    Given a string `s`, return the number of substrings within `s` that are palindromes.

    **Example 1:**
      Input:  s = "abc"
      Output: 3
      Explanation: "a", "b", "c"

    **Example 2:**
      Input:  s = "aaa"
      Output: 6
      Explanation: "a", "a", "a", "aa", "aa", "aaa"

    **Constraints:**
      - 1 <= s.length <= 1000
      - s consists of lowercase English letters
  time: "O(n^2)"
  space: "O(1)"
  approach: |
    Use expand-around-center. Every palindrome has a center — either a single character
    (odd-length) or between two characters (even-length). Iterate through each potential center
    and expand outward while characters match, counting each successful expansion as one
    palindromic substring. This handles both palindrome types without redundant comparisons.
  solution: |
    class Solution:
        def countSubstrings(self, s: str) -> int:
            res = 0

            for i in range(len(s)):
                res += self.countPali(s, i, i)
                res += self.countPali(s, i, i + 1)

            return res

        def countPali(self, s, l, r):
            count = 0
            while l >= 0 and r < len(s) and s[l] == s[r]:
                count += 1
                l -= 1
                r += 1
            return count
- id: 678
  title: "Valid Parenthesis String"
  difficulty: Medium
  tags: [Neetcode 150, String, Dynamic Programming, Stack, Greedy]
  verified: false
  description: |
    Given a string `s` containing only three types of characters: `'('`, `')'` and `'*'`,
    return `true` if `s` is **valid**.

    The following rules define a **valid** string:
      - Any left parenthesis `'('` must have a corresponding right parenthesis `')'`.
      - Any right parenthesis `')'` must have a corresponding left parenthesis `'('`.
      - Left parenthesis `'('` must go before the corresponding right parenthesis `')'`.
      - `'*'` could be treated as a single right parenthesis `')'` or a single left parenthesis
        `'('` or an empty string `""`.

    **Example 1:**
      Input:  s = "()"
      Output: true

    **Example 2:**
      Input:  s = "(*)"
      Output: true

    **Example 3:**
      Input:  s = "(*))"
      Output: true

    **Constraints:**
      - 1 <= s.length <= 100
      - s[i] is '(', ')' or '*'.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Track a range [leftMin, leftMax] representing the possible number of unmatched opening
    parentheses. For '(' increment both; for ')' decrement both; for '*' decrement leftMin
    (treat as ')') and increment leftMax (treat as '('). If leftMax goes negative, too many
    closing brackets exist — return false. Clamp leftMin to 0 when it goes negative. The string
    is valid if leftMin reaches 0 at the end.
  solution: |
    class Solution:
        def checkValidString(self, s: str) -> bool:
            leftMin, leftMax = 0, 0

            for c in s:
                if c == "(":
                    leftMin += 1
                    leftMax += 1
                elif c == ")":
                    leftMin -= 1
                    leftMax -= 1
                else:
                    leftMin -= 1
                    leftMax += 1

                if leftMax < 0:
                    return False
                if leftMin < 0:
                    leftMin = 0

            return leftMin == 0
- id: 684
  title: "Redundant Connection"
  difficulty: Medium
  tags: [Neetcode 150, Depth-First Search, Breadth-First Search, Union Find, Graph]
  verified: false
  description: |
    In this problem, a tree is an **undirected graph** that is connected and has no cycles.

    You are given a graph that started as a tree with `n` nodes labeled from `1` to `n`, with
    one additional edge added. The added edge has both its endpoints in `[1, n]`.

    The graph is represented as an array `edges` of length `n` where `edges[i] = [ai, bi]`
    indicates there is an edge between nodes `ai` and `bi` in the graph.

    Return an edge that can be removed so that the resulting graph is a tree. If there are
    multiple answers, return the edge that occurs **last** in the input.

    **Example 1:**
      Input:  edges = [[1,2],[1,3],[2,3]]
      Output: [2,3]

    **Example 2:**
      Input:  edges = [[1,2],[2,3],[3,4],[1,4],[1,5]]
      Output: [1,4]

    **Constraints:**
      - n == edges.length
      - 3 <= n <= 1000
      - 1 <= edges[i][0] < edges[i][1] <= edges.length
      - There are no repeated edges.
  time: "O(V + E)"
  space: "O(V + E)"
  approach: |
    Use Union-Find with path compression and union by rank. Process edges sequentially; when
    attempting to union two nodes that already share the same root (same connected component),
    that edge forms a cycle — return it immediately. Processing edges in order guarantees this
    is the last such cycle-forming edge.
  solution: |
    class Solution:
        def findRedundantConnection(self, edges: List[List[int]]) -> List[int]:
            n = len(edges)
            par = [i for i in range(n + 1)]
            rank = [1] * (n + 1)

            def find(x):
                p = par[x]
                while p != par[p]:
                    par[p] = par[par[p]]
                    p = par[p]
                return p

            def union(x, y):
                root_x, root_y = find(x), find(y)
                if root_x == root_y:
                    return False
                if rank[root_x] > rank[root_y]:
                    par[root_y] = root_x
                    rank[root_x] += rank[root_y]
                else:
                    par[root_x] = root_y
                    rank[root_y] += rank[root_x]
                return True

            for u, v in edges:
                if not union(u, v):
                    return [u, v]

            return []
- id: 695
  title: "Max Area of Island"
  difficulty: Medium
  tags: [Neetcode 150, Array, Depth-First Search, Breadth-First Search, Union Find, Matrix]
  verified: false
  description: |
    You are given an `m x n` binary matrix `grid`. An island is a group of `1`'s (land)
    connected **4-directionally** (horizontal or vertical). You may assume all four edges of
    the grid are surrounded by water.

    The **area** of an island is the number of cells with a value `1` in the island.

    Return the maximum **area** of an island in `grid`. If there is no island, return `0`.

    **Example 1:**
      Input:  grid =
        [[0,1,1,0,1],[1,0,1,0,1],[0,1,1,0,1],[0,1,0,0,1]]
      Output: 6

    **Example 2:**
      Input:  grid = [[0,0,0,0,0,0,0,0]]
      Output: 0

    **Constraints:**
      - m == grid.length
      - n == grid[i].length
      - 1 <= m, n <= 50
      - grid[i][j] is either 0 or 1.
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use DFS to explore each island. When encountering an unvisited land cell, initiate DFS to
    count all connected land cells, marking each as visited. DFS returns the total count for
    that island. Track the maximum area seen across all islands.
  solution: |
    class Solution:
        def maxAreaOfIsland(self, grid: List[List[int]]) -> int:
            ROWS, COLS = len(grid), len(grid[0])
            visit = set()

            def dfs(r, c):
                if (r < 0 or r == ROWS or c < 0 or c == COLS or
                    grid[r][c] == 0 or (r, c) in visit):
                    return 0
                visit.add((r, c))
                return (1 + dfs(r + 1, c) + dfs(r - 1, c) +
                        dfs(r, c + 1) + dfs(r, c - 1))

            area = 0
            for r in range(ROWS):
                for c in range(COLS):
                    area = max(area, dfs(r, c))
            return area
- id: 703
  title: "Kth Largest Element In a Stream"
  difficulty: Easy
  tags: [Neetcode 150, Tree, Design, Binary Search Tree, Heap (Priority Queue), Binary Tree, Data Stream]
  verified: false
  description: |
    Design a class to find the `kth` largest integer in a stream of values, including duplicates.
    For example, the 2nd largest from [1, 2, 3, 3] is 3. The stream is not necessarily sorted.

    Implement the following methods:

    - `KthLargest(int k, int[] nums)`: Initializes the object given the integer `k` and the
      stream of integers `nums`.
    - `int add(int val)`: Adds the integer `val` to the stream and returns the `kth` largest
      integer in the stream.

    **Example 1:**
      Input:  k = 3, nums = [1, 2, 3, 3]
        add(3) → 3
        add(5) → 3
        add(6) → 3
        add(7) → 5
        add(8) → 6

    **Constraints:**
      - 1 <= k <= 1000
      - 0 <= nums.length <= 1000
      - -1000 <= nums[i] <= 1000
      - -1000 <= val <= 1000
      - There will always be at least k integers in the stream when `add()` is called.
  time: "O(m log k) for each add() call"
  space: "O(k)"
  approach: |
    Use a min-heap of exactly k elements. Since a min-heap always exposes its smallest element
    at the root, keeping only the k largest elements in the heap means the root is always the
    kth largest. On each `add()`, push the new value and if the heap exceeds size k, pop the
    minimum. The root of the heap is then the answer.
  solution: |
    class KthLargest:
        def __init__(self, k: int, nums: List[int]):
            self.minHeap, self.k = nums, k
            heapq.heapify(self.minHeap)
            while len(self.minHeap) > k:
                heapq.heappop(self.minHeap)

        def add(self, val: int) -> int:
            heapq.heappush(self.minHeap, val)
            if len(self.minHeap) > self.k:
                heapq.heappop(self.minHeap)
            return self.minHeap[0]
- id: 704
  title: "Binary Search"
  difficulty: Easy
  tags: [Neetcode 150, Array, Binary Search]
  verified: false
  description: |
    Given an array of integers `nums` which is sorted in ascending order, and an integer
    `target`, write a function to search `target` in `nums`. If `target` exists, then return
    its index. Otherwise, return `-1`.

    You must write an algorithm with `O(log n)` runtime complexity.

    **Example 1:**
      Input:  nums = [-1,0,3,5,9,12], target = 9
      Output: 4
      Explanation: 9 exists in nums and its index is 4.

    **Example 2:**
      Input:  nums = [-1,0,3,5,9,12], target = 2
      Output: -1
      Explanation: 2 does not exist in nums so return -1.

    **Constraints:**
      - 1 <= nums.length <= 10^4
      - -10^4 < nums[i], target < 10^4
      - All the integers in nums are unique.
      - nums is sorted in ascending order.
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Classic binary search: l = 0, r = len(nums) - 1. Compute mid = l + (r - l) // 2. If nums[mid] == target return mid; if less, l = mid + 1; if greater, r = mid - 1. Return -1 if the loop ends without finding target.
  solution: |
    class Solution:
        def search(self, nums: List[int], target: int) -> int:
            l, r = 0, len(nums) - 1

            while l <= r:
                m = l + ((r - l) // 2)

                if nums[m] > target:
                    r = m - 1
                elif nums[m] < target:
                    l = m + 1
                else:
                    return m
            return -1
- id: 721
  title: "Accounts Merge"
  difficulty: Medium
  tags: [Array, Hash Table, String, Depth-First Search, Breadth-First Search, Union Find, Sorting]
  verified: false
  description: |
    Given a list of `accounts` where each element `accounts[i]` is a list of strings,
    where the first element `accounts[i][0]` is a name, and the rest of the elements
    are **emails** representing emails of the account.

    Now, we would like to merge these accounts. Two accounts definitely belong to the
    same person if there is some common email to both accounts. Note that even if two
    accounts have the same name, they may belong to different people as people could
    have the same name. A person can have any number of accounts initially, but all of
    their accounts definitely have the same name.

    After merging the accounts, return the accounts in the following format: the first
    element of each account is the name, and the rest of the elements are emails in
    **sorted order**. The accounts themselves can be returned in **any order**.

    **Example 1:**
      Input: accounts = [["John","johnsmith@mail.com","john_newyork@mail.com"],["John","johnsmith@mail.com","john00@mail.com"],["Mary","mary@mail.com"],["John","johnnybravo@mail.com"]]
      Output: [["John","john00@mail.com","john_newyork@mail.com","johnsmith@mail.com"],["Mary","mary@mail.com"],["John","johnnybravo@mail.com"]]

    **Example 2:**
      Input: accounts = [["Gabe","Gabe0@m.co","Gabe3@m.co","Gabe1@m.co"],["Kevin","Kevin3@m.co","Kevin5@m.co","Kevin0@m.co"],["Ethan","Ethan5@m.co","Ethan4@m.co","Ethan0@m.co"],["Hanzo","Hanzo3@m.co","Hanzo1@m.co","Hanzo0@m.co"],["Fern","Fern5@m.co","Fern1@m.co","Fern0@m.co"]]
      Output: [["Ethan","Ethan0@m.co","Ethan4@m.co","Ethan5@m.co"],["Gabe","Gabe0@m.co","Gabe1@m.co","Gabe3@m.co"],["Hanzo","Hanzo0@m.co","Hanzo1@m.co","Hanzo3@m.co"],["Kevin","Kevin0@m.co","Kevin3@m.co","Kevin5@m.co"],["Fern","Fern0@m.co","Fern1@m.co","Fern5@m.co"]]

    **Constraints:**
      - 1 <= accounts.length <= 1000
      - 2 <= accounts[i].length <= 10
      - 1 <= accounts[i][j].length <= 30
      - accounts[i][0] consists of English letters.
      - accounts[i][j] (for j > 0) is a valid email.
  time: "O((n * m) log(n * m))"
  space: "O(n * m)"
  approach: |
    Model as a connected components problem using Union-Find. Each account is a node.
    Map each email to its first owning account index. When an email has been seen
    before, union the current account with the prior owner. Then group emails by
    their root representative, sort each group, and prepend the account name.
  solution: |
    class UnionFind:
        def __init__(self, n):
            self.par = list(range(n))
            self.rank = [1] * n

        def find(self, x):
            while x != self.par[x]:
                self.par[x] = self.par[self.par[x]]
                x = self.par[x]
            return x

        def union(self, x1, x2):
            p1, p2 = self.find(x1), self.find(x2)
            if p1 == p2:
                return False
            if self.rank[p1] >= self.rank[p2]:
                self.par[p2] = p1
                self.rank[p1] += self.rank[p2]
            else:
                self.par[p1] = p2
                self.rank[p2] += self.rank[p1]
            return True

    class Solution:
        def accountsMerge(self, accounts: List[List[str]]) -> List[List[str]]:
            uf = UnionFind(len(accounts))
            emailToAcc = {}

            for i, account in enumerate(accounts):
                for email in account[1:]:
                    if email in emailToAcc:
                        uf.union(i, emailToAcc[email])
                    else:
                        emailToAcc[email] = i

            emailGroup = defaultdict(list)
            for email, accId in emailToAcc.items():
                emailGroup[uf.find(accId)].append(email)

            res = []
            for accId, emails in emailGroup.items():
                res.append([accounts[accId][0]] + sorted(emails))
            return res
- id: 733
  title: "Flood Fill"
  difficulty: Easy
  tags: [Array, Depth-First Search, Breadth-First Search, Matrix]
  verified: false
  description: |
    You are given an image represented by an `m x n` grid of integers `image`, where
    `image[i][j]` represents the pixel value of the image. You are also given three
    integers `sr`, `sc`, and `color`. Your task is to perform a **flood fill** on
    the image starting from the pixel `image[sr][sc]`.

    To perform a **flood fill**:
      1. Begin with the starting pixel and change its color to `color`.
      2. Perform the same process for each pixel that is **directly adjacent** (up,
         down, left, or right) to the current pixel and shares the **same color** as
         the starting pixel.
      3. Keep repeating this process by checking neighboring pixels of the **updated**
         pixels.

    Return the **modified** image after performing the flood fill.

    **Example 1:**
      Input: image = [[1,1,1],[1,1,0],[1,0,1]], sr = 1, sc = 1, color = 2
      Output: [[2,2,2],[2,2,0],[2,0,1]]

    **Example 2:**
      Input: image = [[0,0,0],[0,0,0]], sr = 0, sc = 0, color = 0
      Output: [[0,0,0],[0,0,0]]

    **Constraints:**
      - m == image.length
      - n == image[i].length
      - 1 <= m, n <= 50
      - 0 <= image[i][j], color < 2^16
      - 0 <= sr < m
      - 0 <= sc < n
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use DFS from the starting pixel. Store the original color before modifying.
    If the new color equals the original, return immediately to avoid infinite
    recursion. Recursively visit all four neighbors that share the original color,
    changing each to the new color. The color change itself marks visited pixels.
  solution: |
    class Solution:
        def floodFill(self, image: List[List[int]], sr: int, sc: int, color: int) -> List[List[int]]:
            if image[sr][sc] == color:
                return image

            m, n = len(image), len(image[0])
            dirs = [1, 0, -1, 0, 1]

            def dfs(r, c, org):
                if not (0 <= r < m) or not (0 <= c < n) or image[r][c] != org:
                    return
                image[r][c] = color
                for d in range(4):
                    dfs(r + dirs[d], c + dirs[d + 1], org)

            dfs(sr, sc, image[sr][sc])
            return image
- id: 739
  title: "Daily Temperatures"
  difficulty: Medium
  tags: [Neetcode 150, Array, Stack, Monotonic Stack]
  verified: false
  description: |
    Given an array of integers `temperatures` represents the daily temperatures, return an
    array `answer` such that `answer[i]` is the number of days you have to wait after the
    `i`th day to get a warmer temperature. If there is no future day for which this is
    possible, keep `answer[i] == 0`.

    **Example 1:**
      Input:  temperatures = [73,74,75,71,69,72,76,73]
      Output: [1,1,4,2,1,1,0,0]

    **Example 2:**
      Input:  temperatures = [30,40,50,60]
      Output: [1,1,1,0]

    **Example 3:**
      Input:  temperatures = [30,60,90]
      Output: [1,1,0]

    **Constraints:**
      - 1 <= temperatures.length <= 10^5
      - 30 <= temperatures[i] <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    Monotonic decreasing stack of (temperature, index) pairs. For each day, pop all stack entries with a lower temperature — the wait for each is current_index - popped_index. Push the current day. Entries remaining in the stack have no warmer future day and keep their default 0.
  solution: |
    class Solution:
        def dailyTemperatures(self, temperatures: List[int]) -> List[int]:
            res = [0] * len(temperatures)
            stack = []  # pair: [temp, index]

            for i, t in enumerate(temperatures):
                while stack and t > stack[-1][0]:
                    stackT, stackInd = stack.pop()
                    res[stackInd] = i - stackInd
                stack.append((t, i))
            return res
- id: 743
  title: "Network Delay Time"
  difficulty: Medium
  tags: [Neetcode 150, DFS, BFS, Graph, Heap, Shortest Path]
  time: "O(E log V)"
  space: "O(V + E)"
  description: |
    You are given a network of `n` nodes, labeled from `1` to `n`. You are also given `times`, a list of travel times as directed edges `times[i] = (ui, vi, wi)`, where `ui` is the source node, `vi` is the target node, and `wi` is the time it takes for a signal to travel from source to target.

    We will send a signal from a given node `k`. Return the minimum time it takes for all the `n` nodes to receive the signal. If it is impossible for all the `n` nodes to receive the signal, return `-1`.

    **Example 1:**
    Input: times = [[2,1,1],[2,3,1],[3,4,1]], n = 4, k = 2
    Output: 2

    **Example 2:**
    Input: times = [[1,2,1]], n = 2, k = 1
    Output: 1

    **Example 3:**
    Input: times = [[1,2,1]], n = 2, k = 2
    Output: -1

    **Constraints:**
    - `1 <= k <= n <= 100`
    - `1 <= times.length <= 6000`
    - `times[i].length == 3`
    - `1 <= ui, vi <= n`
    - `ui != vi`
    - `0 <= wi <= 100`
    - All the pairs `(ui, vi)` are unique.
  approach: |
    Run Dijkstra's algorithm from node k. Use a min-heap initialized with `(0, k)` representing cost 0 to reach node k. Track visited nodes to avoid reprocessing. At each step, pop the cheapest node, mark it visited, and push its unvisited neighbors with updated cumulative costs.

    After the heap is exhausted, check if all n nodes were visited. If so, return the maximum cost among all visited nodes (the last cost popped is the time for the signal to reach the farthest node). Otherwise return -1.
  solution: |
    class Solution:
        def networkDelayTime(self, times: List[List[int]], n: int, k: int) -> int:
            edges = defaultdict(list)
            for u, v, w in times:
                edges[u].append((v, w))

            minHeap = [(0, k)]
            visit = set()
            t = 0

            while minHeap:
                w1, n1 = heapq.heappop(minHeap)
                if n1 in visit:
                    continue
                visit.add(n1)
                t = w1
                for n2, w2 in edges[n1]:
                    if n2 not in visit:
                        heapq.heappush(minHeap, (w1 + w2, n2))

            return t if len(visit) == n else -1
