- id: 1
  title: "Two Sum"
  difficulty: Easy
  tags: [Array, Hash Table]
  verified: true
  description: |
    Given an array of integers `nums` and an integer `target`, return indices of the two numbers
    such that they add up to `target`.

    You may assume that each input would have **exactly one solution**, and you may not use the
    same element twice. You can return the answer in any order.

    **Example 1:**
      Input:  nums = [2,7,11,15], target = 9
      Output: [0,1]
      Explanation: nums[0] + nums[1] == 9, so we return [0, 1].

    **Example 2:**
      Input:  nums = [3,2,4], target = 6
      Output: [1,2]

    **Constraints:**
      - 2 <= nums.length <= 10^4
      - -10^9 <= nums[i] <= 10^9
      - Only one valid answer exists.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a hash map to store (key=number,value=index) as you iterate.
    For each element, check if (target - current) is already in the map.
    If yes → found the pair. If no → add current to the map.
  solution: |
    def two_sum(nums: list[int], target: int) -> list[int]:
        seen = {}  # value -> index
        for i, num in enumerate(nums):
            diff = target - num
            if diff in seen:
                return [seen[diff], i]
            seen[num] = i
        return []  # no solution found
- id: 2
  title: "Add Two Numbers"
  difficulty: Medium
  tags: [Linked List, Math, Recursion]
  verified: false
  description: |
    You are given two **non-empty** linked lists representing two non-negative integers. The
    digits are stored in **reverse order**, and each of their nodes contains a single digit.
    Add the two numbers and return the sum as a linked list.

    You may assume the two numbers do not contain any leading zero, except the number 0 itself.

    **Example 1:**
      Input:  l1 = [2,4,3], l2 = [5,6,4]
      Output: [7,0,8]
      Explanation: 342 + 465 = 807.

    **Example 2:**
      Input:  l1 = [0], l2 = [0]
      Output: [0]

    **Example 3:**
      Input:  l1 = [9,9,9,9,9,9,9], l2 = [9,9,9,9]
      Output: [8,9,9,9,0,0,0,1]

    **Constraints:**
      - The number of nodes in each linked list is in the range [1, 100].
      - 0 <= Node.val <= 9
      - It is guaranteed that the list represents a number that does not have leading zeros.
  time: "O(n + m)"
  space: "O(n + m)"
  approach: |
    Use a dummy head and iterate through both lists simultaneously, summing node values with
    carry. Treat exhausted lists as 0. After the loop, if a remaining carry exists append a
    new node. Return dummy.next.
  solution: |
    def addTwoNumbers(l1: Optional[ListNode], l2: Optional[ListNode]) -> Optional[ListNode]:
        dummy = ListNode()
        cur = dummy
        carry = 0
        while l1 or l2 or carry:
            v1 = l1.val if l1 else 0
            v2 = l2.val if l2 else 0
            val = v1 + v2 + carry
            carry = val // 10
            val = val % 10
            cur.next = ListNode(val)
            cur = cur.next
            l1 = l1.next if l1 else None
            l2 = l2.next if l2 else None
        return dummy.next
- id: 3
  title: "Longest Substring Without Repeating Characters"
  difficulty: Medium
  tags: [Hash Table, String, Sliding Window]
  verified: false
  description: |
    Given a string `s`, find the length of the **longest substring** without duplicate
    characters.

    **Example 1:**
      Input:  s = "abcabcbb"
      Output: 3
      Explanation: The answer is "abc", with the length of 3.

    **Example 2:**
      Input:  s = "bbbbb"
      Output: 1
      Explanation: The answer is "b", with the length of 1.

    **Example 3:**
      Input:  s = "pwwkew"
      Output: 3
      Explanation: The answer is "wke", with the length of 3. Notice that the answer must be a
        substring, "pwke" is a subsequence and not a substring.

    **Constraints:**
      - 0 <= s.length <= 5 * 10^4
      - s consists of English letters, digits, symbols and spaces.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Sliding window with a character set. Expand the right pointer, adding each character to the
    set. If the new character is already in the set (duplicate), shrink from the left, removing
    characters until the duplicate is eliminated. Track the maximum window size throughout.
  solution: |
    def length_of_longest_substring(s: str) -> int:
        char_set = set()
        l = 0
        res = 0
        for r in range(len(s)):
            while s[r] in char_set:
                char_set.remove(s[l])
                l += 1
            char_set.add(s[r])
            res = max(res, r - l + 1)
        return res
- id: 4
  title: "Median of Two Sorted Arrays"
  difficulty: Hard
  tags: [Array, Binary Search, Divide and Conquer]
  verified: false
  description: |
    Given two sorted arrays `nums1` and `nums2` of size `m` and `n` respectively, return the
    **median** of the two sorted arrays.

    The overall run time complexity should be `O(log (m+n))`.

    **Example 1:**
      Input:  nums1 = [1,3], nums2 = [2]
      Output: 2.00000
      Explanation: merged array = [1,2,3] and median is 2.

    **Example 2:**
      Input:  nums1 = [1,2], nums2 = [3,4]
      Output: 2.50000
      Explanation: merged array = [1,2,3,4] and median is (2 + 3) / 2 = 2.5.

    **Constraints:**
      - nums1.length == m
      - nums2.length == n
      - 0 <= m <= 1000
      - 0 <= n <= 1000
      - 1 <= m + n <= 2000
      - -10^6 <= nums1[i], nums2[i] <= 10^6
  time: "O(log(min(m, n)))"
  space: "O(1)"
  approach: |
    Binary search on the smaller array. Find partition points i (in A) and j = half - i - 2
    (in B) such that A[i] <= B[j+1] and B[j] <= A[i+1]. Use boundary sentinels (-inf/+inf)
    for out-of-range indices. Once the correct partition is found, the median is derived from
    the max of the left elements and the min of the right elements.
  solution: |
    def find_median_sorted_arrays(nums1: list[int], nums2: list[int]) -> float:
        A, B = nums1, nums2
        total = len(nums1) + len(nums2)
        half = total // 2
        if len(B) < len(A):
            A, B = B, A
        l, r = 0, len(A) - 1
        while True:
            i = (l + r) // 2
            j = half - i - 2
            Aleft = A[i] if i >= 0 else float("-infinity")
            Aright = A[i + 1] if (i + 1) < len(A) else float("infinity")
            Bleft = B[j] if j >= 0 else float("-infinity")
            Bright = B[j + 1] if (j + 1) < len(B) else float("infinity")
            if Aleft <= Bright and Bleft <= Aright:
                if total % 2:
                    return min(Aright, Bright)
                return (max(Aleft, Bleft) + min(Aright, Bright)) / 2
            elif Aleft > Bright:
                r = i - 1
            else:
                l = i + 1
- id: 11
  title: "Container With Most Water"
  difficulty: Medium
  tags: [Array, Two Pointers, Greedy]
  verified: false
  description: |
    You are given an integer array `height` of length `n`. There are `n` vertical lines drawn
    such that the two endpoints of the `i`th line are `(i, 0)` and `(i, height[i])`.

    Find two lines that together with the x-axis form a container, such that the container
    contains the most water.

    Return the maximum amount of water a container can store.

    **Note:** You may not slant the container.

    **Example 1:**
      Input:  height = [1,8,6,2,5,4,8,3,7]
      Output: 49
      Explanation: The above vertical lines are represented by array [1,8,6,2,5,4,8,3,7].
        In this case, the max area of water the container can contain is 49.

    **Example 2:**
      Input:  height = [1,1]
      Output: 1

    **Constraints:**
      - n == height.length
      - 2 <= n <= 10^5
      - 0 <= height[i] <= 10^4
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end of the array. At each step, calculate the water
    trapped between them as min(height[l], height[r]) * (r - l). Move the pointer with the
    smaller height inward, since the width decreases regardless, and only a taller boundary
    could increase the area.
  solution: |
    def max_area(height: list[int]) -> int:
        l, r = 0, len(height) - 1
        res = 0
        while l < r:
            res = max(res, min(height[l], height[r]) * (r - l))
            if height[l] < height[r]:
                l += 1
            else:
                r -= 1
        return res
- id: 15
  title: "3Sum"
  difficulty: Medium
  tags: [Array, Two Pointers, Sorting]
  verified: false
  description: |
    Given an integer array `nums`, return all the triplets `[nums[i], nums[j], nums[k]]` such
    that `i != j`, `i != k`, and `j != k`, and `nums[i] + nums[j] + nums[k] == 0`.

    Notice that the solution set must not contain duplicate triplets.

    **Example 1:**
      Input:  nums = [-1,0,1,2,-1,-4]
      Output: [[-1,-1,2],[-1,0,1]]
      Explanation: nums[0] + nums[1] + nums[2] = (-1) + 0 + 1 = 0.
        nums[1] + nums[2] + nums[4] = 0 + 1 + (-1) = 0.
        nums[0] + nums[3] + nums[4] = (-1) + 2 + (-1) = 0.
        The distinct triplets are [-1,0,1] and [-1,-1,2].
        Notice that the order of the output and the order of the triplets does not matter.

    **Example 2:**
      Input:  nums = [0,1,1]
      Output: []
      Explanation: The only possible triplet does not sum up to 0.

    **Example 3:**
      Input:  nums = [0,0,0]
      Output: [[0,0,0]]
      Explanation: The only possible triplet sums up to 0.

    **Constraints:**
      - 3 <= nums.length <= 3000
      - -10^5 <= nums[i] <= 10^5
  time: "O(n^2)"
  space: "O(1)"
  approach: |
    Sort the array, then iterate with a fixed index i. For each i, skip duplicates and use
    two pointers (l = i+1, r = end) to find pairs that sum to -nums[i]. If the sum is too
    large, move r left; if too small, move l right. When a valid triplet is found, record it
    and advance l past any duplicate values before continuing.
  solution: |
    def three_sum(nums: list[int]) -> list[list[int]]:
        nums.sort()
        res = []
        for i, a in enumerate(nums):
            if i > 0 and nums[i] == nums[i - 1]:
                continue
            l, r = i + 1, len(nums) - 1
            while l < r:
                total = a + nums[l] + nums[r]
                if total > 0:
                    r -= 1
                elif total < 0:
                    l += 1
                else:
                    res.append([a, nums[l], nums[r]])
                    l += 1
                    while l < r and nums[l] == nums[l - 1]:
                        l += 1
        return res
- id: 19
  title: "Remove Nth Node From End of List"
  difficulty: Medium
  tags: [Linked List, Two Pointers]
  verified: false
  description: |
    Given the head of a linked list, remove the `n`th node from the end of the list and return
    its head.

    **Example 1:**
      Input:  head = [1,2,3,4,5], n = 2
      Output: [1,2,3,5]

    **Example 2:**
      Input:  head = [1], n = 1
      Output: []

    **Example 3:**
      Input:  head = [1,2], n = 1
      Output: [1]

    **Constraints:**
      - The number of nodes in the list is sz.
      - 1 <= sz <= 30
      - 0 <= Node.val <= 100
      - 1 <= n <= sz

    **Follow up:** Could you do this in one pass?
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use a dummy node pointing to head and two pointers (left starting at dummy, right starting
    at head). Advance right by n steps. Then advance both together until right reaches null.
    left is now just before the target node — set left.next = left.next.next and return
    dummy.next.
  solution: |
    def removeNthFromEnd(head: Optional[ListNode], n: int) -> Optional[ListNode]:
        dummy = ListNode(0, head)
        left = dummy
        right = head
        while n > 0:
            right = right.next
            n -= 1
        while right:
            left = left.next
            right = right.next
        left.next = left.next.next
        return dummy.next
- id: 20
  title: "Valid Parentheses"
  difficulty: Easy
  tags: [String, Stack]
  verified: false
  description: |
    Given a string `s` containing just the characters `'('`, `')'`, `'{'`, `'}'`, `'['` and
    `']'`, determine if the input string is valid.

    An input string is valid if:
    1. Open brackets must be closed by the same type of brackets.
    2. Open brackets must be closed in the correct order.
    3. Every close bracket has a corresponding open bracket of the same type.

    **Example 1:**
      Input:  s = "()"
      Output: true

    **Example 2:**
      Input:  s = "()[]{}"
      Output: true

    **Example 3:**
      Input:  s = "(]"
      Output: false

    **Example 4:**
      Input:  s = "([])"
      Output: true

    **Constraints:**
      - 1 <= s.length <= 10^4
      - s consists of parentheses only `'()[]{}'`.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a stack. For each opening bracket, push it onto the stack. For each closing bracket,
    check if the stack is non-empty and its top matches the expected opening bracket. If not,
    return False. After processing all characters, return True only if the stack is empty.
  solution: |
    def is_valid(s: str) -> bool:
        stack = []
        close_to_open = {')': '(', '}': '{', ']': '['}
        for c in s:
            if c in close_to_open:
                if stack and stack[-1] == close_to_open[c]:
                    stack.pop()
                else:
                    return False
            else:
                stack.append(c)
        return not stack
- id: 21
  title: "Merge Two Sorted Lists"
  difficulty: Easy
  tags: [Linked List, Recursion]
  verified: false
  description: |
    You are given the heads of two sorted linked lists `list1` and `list2`.

    Merge the two lists into one **sorted** list. The list should be made by splicing together
    the nodes of the first two lists.

    Return the head of the merged linked list.

    **Example 1:**
      Input:  list1 = [1,1,2], list2 = [1,3,4]
      Output: [1,1,1,2,3,4]

    **Example 2:**
      Input:  list1 = [], list2 = []
      Output: []

    **Example 3:**
      Input:  list1 = [], list2 = [0]
      Output: [0]

    **Constraints:**
      - The number of nodes in both lists is in the range [0, 50].
      - -100 <= Node.val <= 100
      - Both list1 and list2 are sorted in non-decreasing order.
  time: "O(n + m)"
  space: "O(1)"
  approach: |
    Use a dummy head node and a cur pointer. While both lists have nodes, compare the two heads
    and append the smaller one to cur, advancing that list. After either list is exhausted,
    attach the remainder of the other. Return dummy.next.
  solution: |
    def mergeTwoLists(list1: Optional[ListNode], list2: Optional[ListNode]) -> Optional[ListNode]:
        dummy = ListNode()
        cur = dummy
        while list1 and list2:
            if list1.val <= list2.val:
                cur.next = list1
                list1 = list1.next
            else:
                cur.next = list2
                list2 = list2.next
            cur = cur.next
        cur.next = list1 if list1 else list2
        return dummy.next
- id: 23
  title: "Merge K Sorted Lists"
  difficulty: Hard
  tags: [Linked List, Divide and Conquer, Heap (Priority Queue), Merge Sort]
  verified: false
  description: |
    You are given an array of `k` linked-lists `lists`, each linked-list is sorted in ascending
    order.

    Merge all the linked-lists into one sorted linked-list and return it.

    **Example 1:**
      Input:  lists = [[1,4,5],[1,3,4],[2,6]]
      Output: [1,1,2,3,4,4,5,6]
      Explanation: The linked-lists are:
        [1->4->5, 1->3->4, 2->6]
        Merging them into one sorted list: 1->1->2->3->4->4->5->6

    **Example 2:**
      Input:  lists = []
      Output: []

    **Example 3:**
      Input:  lists = [[]]
      Output: []

    **Constraints:**
      - k == lists.length
      - 0 <= k <= 10^4
      - 0 <= lists[i].length <= 500
      - -10^4 <= lists[i][j] <= 10^4
      - lists[i] is sorted in ascending order.
      - The sum of lists[i].length will not exceed 10^4.
  time: "O(n log k)"
  space: "O(1)"
  approach: |
    Divide and conquer: repeatedly merge adjacent pairs of lists until only one remains. Each
    round halves the number of lists. With log k rounds each processing O(n) total nodes, the
    overall complexity is O(n log k). Each pair is merged with the standard two-pointer dummy
    head approach.
  solution: |
    def mergeKLists(lists: List[Optional[ListNode]]) -> Optional[ListNode]:
        if not lists or len(lists) == 0:
            return None
        while len(lists) > 1:
            merged = []
            for i in range(0, len(lists), 2):
                l1 = lists[i]
                l2 = lists[i + 1] if (i + 1) < len(lists) else None
                merged.append(mergeList(l1, l2))
            lists = merged
        return lists[0]

    def mergeList(l1, l2):
        dummy = ListNode()
        tail = dummy
        while l1 and l2:
            if l1.val <= l2.val:
                tail.next = l1
                l1 = l1.next
            else:
                tail.next = l2
                l2 = l2.next
            tail = tail.next
        tail.next = l1 if l1 else l2
        return dummy.next
- id: 25
  title: "Reverse Nodes In K Group"
  difficulty: Hard
  tags: [Linked List, Recursion]
  verified: false
  description: |
    Given the head of a linked list, reverse the nodes of the list `k` at a time, and return
    the modified list.

    `k` is a positive integer and is less than or equal to the length of the linked list. If
    the number of nodes is not a multiple of `k` then left-out nodes, in the end, should remain
    as is.

    You may not alter the values in the list's nodes, only nodes themselves may be changed.

    **Example 1:**
      Input:  head = [1,2,3,4,5], k = 2
      Output: [2,1,4,3,5]

    **Example 2:**
      Input:  head = [1,2,3,4,5], k = 3
      Output: [3,2,1,4,5]

    **Constraints:**
      - The number of nodes in the list is n.
      - 1 <= k <= n <= 5000
      - 0 <= Node.val <= 1000

    **Follow up:** Can you solve the problem in `O(1)` extra memory space?
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use a dummy node and a groupPrev pointer. For each group, find the k-th node with a helper
    (return if fewer than k remain). Save groupNext (the node after the group). Reverse the k
    nodes between groupPrev and groupNext. Connect groupPrev to the reversed head (kth node)
    and the reversed tail (original first node) to groupNext. Advance groupPrev to the tail.
  solution: |
    def reverseKGroup(head: Optional[ListNode], k: int) -> Optional[ListNode]:
        dummy = ListNode(0, head)
        groupPrev = dummy
        while True:
            kth = getKth(groupPrev, k)
            if not kth:
                break
            groupNext = kth.next
            prev, curr = kth.next, groupPrev.next
            while curr != groupNext:
                tmp = curr.next
                curr.next = prev
                prev = curr
                curr = tmp
            tmp = groupPrev.next
            groupPrev.next = kth
            groupPrev = tmp
        return dummy.next

    def getKth(curr, k):
        while curr and k > 0:
            curr = curr.next
            k -= 1
        return curr
- id: 33
  title: "Search In Rotated Sorted Array"
  difficulty: Medium
  tags: [Array, Binary Search]
  verified: false
  description: |
    There is an integer array `nums` sorted in ascending order (with **distinct** values).

    Prior to being passed to your function, `nums` is **possibly rotated** at an unknown pivot
    index `k` (`1 <= k < nums.length`) such that the resulting array is
    `[nums[k], nums[k+1], ..., nums[n-1], nums[0], nums[1], ..., nums[k-1]]` (0-indexed).
    For example, `[0,1,2,4,5,6,7]` might be rotated at pivot index `3` and become
    `[4,5,6,7,0,1,2]`.

    Given the array `nums` after the possible rotation and an integer `target`, return the index
    of `target` if it is in `nums`, or `-1` if it is not in `nums`.

    You must write an algorithm with `O(log n)` runtime complexity.

    **Example 1:**
      Input:  nums = [4,5,6,7,0,1,2], target = 0
      Output: 4

    **Example 2:**
      Input:  nums = [4,5,6,7,0,1,2], target = 3
      Output: -1

    **Example 3:**
      Input:  nums = [1], target = 3
      Output: -1

    **Constraints:**
      - 1 <= nums.length <= 5000
      - -10^4 <= nums[i] <= 10^4
      - All values of nums are unique.
      - nums is an ascending array that is possibly rotated.
      - -10^4 <= target <= 10^4
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Standard binary search with rotation detection at each step. If the left half is sorted
    (nums[l] <= nums[mid]), check if target falls in [nums[l], nums[mid]); if so search left,
    otherwise right. If the right half is sorted, check if target falls in (nums[mid], nums[r]];
    if so search right, otherwise left.
  solution: |
    def search(nums: list[int], target: int) -> int:
        l, r = 0, len(nums) - 1
        while l <= r:
            mid = (l + r) // 2
            if nums[mid] == target:
                return mid
            if nums[l] <= nums[mid]:
                if nums[l] <= target < nums[mid]:
                    r = mid - 1
                else:
                    l = mid + 1
            else:
                if nums[mid] < target <= nums[r]:
                    l = mid + 1
                else:
                    r = mid - 1
        return -1
- id: 36
  title: "Valid Sudoku"
  difficulty: Medium
  tags: [Array, Hash Table, Matrix]
  verified: false
  description: |
    Determine if a `9 x 9` Sudoku board is valid. Only the filled cells need to be validated
    according to the following rules:

    1. Each row must contain the digits `1-9` without repetition.
    2. Each column must contain the digits `1-9` without repetition.
    3. Each of the nine `3 x 3` sub-boxes of the grid must contain the digits `1-9` without
       repetition.

    **Note:**
      - A Sudoku board (partially filled) could be valid but is not necessarily solvable.
      - Only the filled cells need to be validated according to the mentioned rules.

    **Example 1:**
      Input:  board =
        [["5","3",".",".","7",".",".",".","."]
        ,["6",".",".","1","9","5",".",".","."]
        ,[".","9","8",".",".",".",".","6","."]
        ,["8",".",".",".","6",".",".",".","3"]
        ,["4",".",".","8",".","3",".",".","1"]
        ,["7",".",".",".","2",".",".",".","6"]
        ,[".","6",".",".",".",".","2","8","."]
        ,[".",".",".","4","1","9",".",".","5"]
        ,[".",".",".",".","8",".",".","7","9"]]
      Output: true

    **Example 2:**
      Input:  board =
        [["8","3",".",".","7",".",".",".","."]
        ,["6",".",".","1","9","5",".",".","."]
        ,[".","9","8",".",".",".",".","6","."]
        ,["8",".",".",".","6",".",".",".","3"]
        ,["4",".",".","8",".","3",".",".","1"]
        ,["7",".",".",".","2",".",".",".","6"]
        ,[".","6",".",".",".",".","2","8","."]
        ,[".",".",".","4","1","9",".",".","5"]
        ,[".",".",".",".","8",".",".","7","9"]]
      Output: false
      Explanation: Same as Example 1, except with the 5 in the top left corner being modified
        to 8. Since there are two 8's in the top left 3x3 sub-box, it is invalid.

    **Constraints:**
      - board.length == 9
      - board[i].length == 9
      - board[i][j] is a digit 1-9 or '.'.
  time: "O(n^2) where n is the number of rows in the grid"
  space: "O(n^2)"
  approach: |
    Use three arrays of sets — one per row, one per column, one per 3x3 box.
    The box index for cell (r, c) is (r // 3) * 3 + (c // 3).
    Iterate every cell; skip '.'. If the digit is already in any of the three
    corresponding sets, return False. Otherwise add it to all three.
  solution: |
    def is_valid_sudoku(board: list[list[str]]) -> bool:
        rows = [set() for _ in range(9)]
        cols = [set() for _ in range(9)]
        boxes = [set() for _ in range(9)]

        for r in range(9):
            for c in range(9):
                val = board[r][c]
                if val == ".":
                    continue
                box = (r // 3) * 3 + (c // 3)
                if val in rows[r] or val in cols[c] or val in boxes[box]:
                    return False
                rows[r].add(val)
                cols[c].add(val)
                boxes[box].add(val)
        return True
- id: 42
  title: "Trapping Rain Water"
  difficulty: Hard
  tags: [Array, Two Pointers, Dynamic Programming, Stack, Monotonic Stack]
  verified: false
  description: |
    Given `n` non-negative integers representing an elevation map where the width of each bar
    is `1`, compute how much water it can trap after raining.

    **Example 1:**
      Input:  height = [0,1,0,2,1,0,1,3,2,1,2,1]
      Output: 6
      Explanation: The above elevation map (black section) is represented by array
        [0,1,0,2,1,0,1,3,2,1,2,1]. In this case, 6 units of rain water (blue section)
        are being trapped.

    **Example 2:**
      Input:  height = [4,2,0,3,2,5]
      Output: 9

    **Constraints:**
      - n == height.length
      - 1 <= n <= 2 * 10^4
      - 0 <= height[i] <= 10^5
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end. Track the maximum height seen from each side
    (left_max and right_max). At each step, process the side with the smaller max — the water
    it can hold at that position is max - current height. Move that pointer inward. This works
    because the water level is bounded by the smaller of the two surrounding maximums.
  solution: |
    def trap(height: list[int]) -> int:
        l, r = 0, len(height) - 1
        left_max, right_max = height[l], height[r]
        res = 0
        while l < r:
            if left_max < right_max:
                l += 1
                left_max = max(left_max, height[l])
                res += left_max - height[l]
            else:
                r -= 1
                right_max = max(right_max, height[r])
                res += right_max - height[r]
        return res
- id: 49
