- id: 55
  title: "Jump Game"
  difficulty: Medium
  tags: [Neetcode 150, Array, Dynamic Programming, Greedy]
  verified: false
  description: |
    You are given an integer array `nums`. You are initially positioned at the array's **first
    index**, and each element in the array represents your maximum jump length at that position.

    Return `true` if you can reach the last index, or `false` otherwise.

    **Example 1:**
      Input:  nums = [2,3,1,1,4]
      Output: true
      Explanation: Jump 1 step from index 0 to 1, then 3 steps to the last index.

    **Example 2:**
      Input:  nums = [3,2,1,0,4]
      Output: false
      Explanation: You will always arrive at index 3 no matter what. Its maximum jump length
        is 0, which makes it impossible to reach the last index.

    **Constraints:**
      - 1 <= nums.length <= 10^4
      - 0 <= nums[i] <= 10^5
  time: "O(n)"
  space: "O(1)"
  approach: |
    Work backward from the last index, maintaining a "goal" — the leftmost index known to
    reach the end. For each position moving right to left, if that index can jump far enough
    to reach or exceed the current goal, it becomes the new goal. If the goal reaches index 0,
    the start can reach the end.
  solution: |
    class Solution:
        def canJump(self, nums: List[int]) -> bool:
            goal = len(nums) - 1

            for i in range(len(nums) - 2, -1, -1):
                if i + nums[i] >= goal:
                    goal = i

            return goal == 0
- id: 56
  title: "Merge Intervals"
  difficulty: Medium
  tags: [Neetcode 150, Array, Sorting]
  verified: false
  description: |
    Given an array of `intervals` where `intervals[i] = [start_i, end_i]`, merge all overlapping
    intervals, and return an array of the non-overlapping intervals that cover all the intervals
    in the input.

    **Example 1:**
      Input:  intervals = [[1,3],[2,6],[8,10],[15,18]]
      Output: [[1,6],[8,10],[15,18]]
      Explanation: Since intervals [1,3] and [2,6] overlap, merge them into [1,6].

    **Example 2:**
      Input:  intervals = [[1,4],[4,5]]
      Output: [[1,5]]
      Explanation: Intervals [1,4] and [4,5] are considered overlapping.

    **Constraints:**
      - 1 <= intervals.length <= 10^4
      - intervals[i].length == 2
      - 0 <= start_i <= end_i <= 10^4
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    Sort intervals by start time. Initialize output with the first interval. For each subsequent
    interval, check if it overlaps with the last merged interval (current start <= last end). If
    it overlaps, extend the last interval's end to the maximum of the two end values. Otherwise,
    append the current interval as a new entry.
  solution: |
    class Solution:
        def merge(self, intervals: List[List[int]]) -> List[List[int]]:
            intervals.sort(key=lambda pair: pair[0])
            output = [intervals[0]]

            for start, end in intervals:
                lastEnd = output[-1][1]

                if start <= lastEnd:
                    output[-1][1] = max(lastEnd, end)
                else:
                    output.append([start, end])

            return output
- id: 57
  title: "Insert Interval"
  difficulty: Medium
  tags: [Neetcode 150, Array]
  verified: false
  description: |
    You are given an array of non-overlapping intervals `intervals` where
    `intervals[i] = [start_i, end_i]` represent the start and the end of the `i`th interval and
    `intervals` is sorted in ascending order by `start_i`. You are also given an interval
    `newInterval = [start, end]` that represents the start and end of another interval.

    Insert `newInterval` into `intervals` such that `intervals` is still sorted in ascending
    order by `start_i` and `intervals` still does not have any overlapping intervals (merge
    overlapping intervals if necessary).

    Return `intervals` after the insertion.

    **Note** that you don't need to modify `intervals` in-place. You can make a new array and
    return it.

    **Example 1:**
      Input:  intervals = [[1,3],[6,9]], newInterval = [2,5]
      Output: [[1,5],[6,9]]

    **Example 2:**
      Input:  intervals = [[1,2],[3,5],[6,7],[8,10],[12,16]], newInterval = [4,8]
      Output: [[1,2],[3,10],[12,16]]
      Explanation: Because the new interval [4,8] overlaps with [3,5],[6,7],[8,10].

    **Constraints:**
      - 0 <= intervals.length <= 10^4
      - intervals[i].length == 2
      - 0 <= start_i <= end_i <= 10^5
      - intervals is sorted by start_i in ascending order.
      - newInterval.length == 2
      - 0 <= start <= end <= 10^5
  time: "O(n)"
  space: "O(n)"
  approach: |
    Single-pass greedy. For each existing interval, one of three cases applies: if the new
    interval ends before the current one starts, append the new interval and return the rest
    unchanged. If the new interval starts after the current one ends, append the current
    interval and continue. Otherwise they overlap — merge by taking the min start and max end.
    After the loop, append the (possibly merged) new interval.
  solution: |
    class Solution:
        def insert(self, intervals: List[List[int]], newInterval: List[int]) -> List[List[int]]:
            res = []

            for i in range(len(intervals)):
                if newInterval[1] < intervals[i][0]:
                    res.append(newInterval)
                    return res + intervals[i:]
                elif newInterval[0] > intervals[i][1]:
                    res.append(intervals[i])
                else:
                    newInterval = [
                        min(newInterval[0], intervals[i][0]),
                        max(newInterval[1], intervals[i][1]),
                    ]

            res.append(newInterval)
            return res
- id: 62
  title: "Unique Paths"
  difficulty: Medium
  tags: [Neetcode 150, Dynamic Programming, Math, Combinatorics]
  verified: false
  description: |
    There is an `m x n` grid. You are located at the top-left corner (`grid[0][0]`) and your
    goal is to reach the bottom-right corner (`grid[m-1][n-1]`). You can only move either
    down or right at any point in time.

    Given the two integers `m` and `n`, return the number of possible unique paths.

    **Example 1:**
      Input:  m = 3, n = 6
      Output: 21

    **Example 2:**
      Input:  m = 3, n = 3
      Output: 6

    **Constraints:**
      - 1 <= m, n <= 100
      - The answer will be less than or equal to 2 * 10^9
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use dynamic programming with space optimization. Each cell's path count equals the sum of
    paths from the cell below plus paths from the cell to its right. Process the grid from
    bottom-right to top-left using a single 1D array, updating values from right to left in
    each row. This accumulates path counts while maintaining only the values needed to compute
    the final answer at `dp[0]`.
  solution: |
    class Solution:
        def uniquePaths(self, m: int, n: int) -> int:
            dp = [1] * n
            for i in range(m - 2, -1, -1):
                for j in range(n - 2, -1, -1):
                    dp[j] += dp[j + 1]
            return dp[0]
- id: 66
  title: "Plus One"
  difficulty: Easy
  tags: [Neetcode 150, Array, Math]
  time: "O(n)"
  space: "O(n)"
  description: |
    You are given a **large integer** represented as an integer array `digits`, where each `digits[i]` is the `i`th digit of the integer. The digits are ordered from most significant to least significant in left-to-right order. The large integer does not contain any leading `0`'s.

    Increment the large integer by one and return the resulting array of digits.

    **Example 1:**
    Input: digits = [1,2,3]
    Output: [1,2,4]
    Explanation: The array represents the integer 123. Incrementing by one gives 123 + 1 = 124.

    **Example 2:**
    Input: digits = [4,3,2,1]
    Output: [4,3,2,2]
    Explanation: The array represents the integer 4321. Incrementing by one gives 4321 + 1 = 4322.

    **Example 3:**
    Input: digits = [9]
    Output: [1,0]
    Explanation: The array represents the integer 9. Incrementing by one gives 9 + 1 = 10.

    **Constraints:**
    - `1 <= digits.length <= 100`
    - `0 <= digits[i] <= 9`
    - `digits` does not contain any leading `0`'s.
  approach: |
    Traverse from the rightmost digit leftward. If the digit is less than 9, increment it and return immediately — no carry propagates. If it's 9, set it to 0 and continue left. If all digits were 9 and the loop completes, prepend a 1 to the array.
  solution: |
    class Solution:
        def plusOne(self, digits: List[int]) -> List[int]:
            for i in range(len(digits) - 1, -1, -1):
                if digits[i] < 9:
                    digits[i] += 1
                    return digits
                digits[i] = 0

            return [1] + digits
