      Output: false

    **Constraints:**
      - The number of nodes in both trees is in the range [0, 100].
      - -10^4 <= Node.val <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    Recursive DFS: if both nodes are null return True; if both exist with matching values recurse on both subtrees; otherwise return False.
  solution: |
    class Solution:
        def isSameTree(self, p: Optional[TreeNode], q: Optional[TreeNode]) -> bool:
            if not p and not q:
                return True
            if p and q and p.val == q.val:
                return self.isSameTree(p.left, q.left) and self.isSameTree(p.right, q.right)
            else:
