  description: |
    Given the roots of two binary trees `p` and `q`, write a function to check if they are the
    same or not.

    Two binary trees are considered the same if they are structurally identical, and the nodes
    have the same value.

    **Example 1:**
      Input:  p = [1,2,3], q = [1,2,3]
      Output: true

    **Example 2:**
      Input:  p = [1,2], q = [1,null,2]
      Output: false

    **Example 3:**
      Input:  p = [1,2,1], q = [1,1,2]
      Output: false

    **Constraints:**
      - The number of nodes in both trees is in the range [0, 100].
      - -10^4 <= Node.val <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    Recursively compare both trees. If both nodes are None, return True. If one is None or
    values differ, return False. Otherwise recurse on left and right subtrees.
  solution: |
    def isSameTree(p: Optional[TreeNode], q: Optional[TreeNode]) -> bool:
        if not p and not q:
            return True
        if not p or not q or p.val != q.val:
            return False
        return isSameTree(p.left, q.left) and isSameTree(p.right, q.right)
- id: 102
  title: "Binary Tree Level Order Traversal"
  difficulty: Medium
  tags: [Tree, BFS]
  verified: false
  description: |
    Given the `root` of a binary tree, return the level order traversal of its nodes' values
    (i.e., from left to right, level by level).

    **Example 1:**
      Input:  root = [3,9,20,null,null,15,7]
      Output: [[3],[9,20],[15,7]]

    **Example 2:**
      Input:  root = [1]
      Output: [[1]]

    **Example 3:**
      Input:  root = []
      Output: []

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 2000].
      - -1000 <= Node.val <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    BFS with a queue. For each level, process all currently-queued nodes, collect their values,
    and enqueue their children. Append each level's values to the result list.
  solution: |
    def levelOrder(root: Optional[TreeNode]) -> list[list[int]]:
        res = []
        q = collections.deque()
        if root:
            q.append(root)
        while q:
            level = []
            for _ in range(len(q)):
                node = q.popleft()
                level.append(node.val)
                if node.left:
                    q.append(node.left)
                if node.right:
                    q.append(node.right)
            res.append(level)
        return res
