- id: 746
  title: "Min Cost Climbing Stairs"
  difficulty: Easy
  tags: [Neetcode 150, Array, Dynamic Programming]
  verified: false
  description: |
    You are given an integer array `cost` where `cost[i]` is the cost of stepping on the `i`th
    floor. After paying, you can advance to either the `(i+1)`th or `(i+2)`th floor. You may
    begin at index 0 or 1.

    Find the minimum cost to reach the top (past the last index).

    **Example 1:**
      Input:  cost = [1,2,3]
      Output: 2
      Explanation: Start at index 1, pay 2, and take two steps to reach the top.

    **Example 2:**
      Input:  cost = [1,2,1,2,1,1,1]
      Output: 4

    **Constraints:**
      - 2 <= cost.length <= 100
      - 0 <= cost[i] <= 100
  time: "O(n)"
  space: "O(1)"
  approach: |
    Work backwards through the cost array. Starting from the third-to-last position, each index
    stores the minimum total cost to reach the top from that point:
    cost[i] += min(cost[i+1], cost[i+2]). Finally, return the smaller of starting at index 0
    or 1, since both are free entry points.
  solution: |
    class Solution:
        def minCostClimbingStairs(self, cost: List[int]) -> int:
            for i in range(len(cost) - 3, -1, -1):
                cost[i] += min(cost[i + 1], cost[i + 2])
            return min(cost[0], cost[1])
- id: 763
  title: "Partition Labels"
  difficulty: Medium
  tags: [Neetcode 150, Hash Table, Two Pointers, String, Greedy]
  verified: false
  description: |
    You are given a string `s`. We want to partition the string into as many parts as possible
    so that each letter appears in at most one part.

    Note that the partition is done so that after concatenating all the parts in order, the
    resultant string should be `s`.

    Return a list of integers representing the size of these parts.

    **Example 1:**
      Input:  s = "ababcbacadefegdehijhklij"
      Output: [9,7,8]
      Explanation: The partition is "ababcbaca", "defegde", "hijhklij". This is a partition so
        that each letter appears in at most one part. A partition like "ababcbacadefegde",
        "hijhklij" is incorrect, because it splits s into fewer parts.

    **Example 2:**
      Input:  s = "eccbbbbdec"
      Output: [10]

    **Constraints:**
      - 1 <= s.length <= 500
      - s consists of lowercase English letters.
  time: "O(n)"
  space: "O(m)"
  approach: |
    Precompute the last index of every character. Then scan left to right, extending the
    current partition's end to the farthest last occurrence of any character seen so far.
    When the current index equals the end, the partition is complete — record its size and
    start a fresh partition from the next index.
  solution: |
    class Solution:
        def partitionLabels(self, s: str) -> List[int]:
            lastIndex = {}
            for i, c in enumerate(s):
                lastIndex[c] = i

            res = []
            size = end = 0
            for i, c in enumerate(s):
                size += 1
                end = max(end, lastIndex[c])

                if i == end:
                    res.append(size)
                    size = 0
            return res
- id: 778
  title: "Swim in Rising Water"
  difficulty: Hard
  tags: [Neetcode 150, Array, Binary Search, DFS, BFS, Union Find, Heap, Matrix]
  time: "O(n^2 log n)"
  space: "O(n^2)"
  description: |
    You are given an `n x n` integer grid where each value `grid[i][j]` represents the elevation at that point `(i, j)`.

    The rain starts to fall. At time `t`, the depth of the water everywhere is `t`. You can swim from a square to another 4-directionally adjacent square if and only if the elevation of both squares individually are at most `t`. You can swim infinite distances in zero time. Of course, you must stay within the boundaries of the grid during your swim.

    Return the least time until you can reach bottom right square `(n - 1, n - 1)` if you start at the top left square `(0, 0)`.

    **Example 1:**
    Input: grid = [[0,2],[1,3]]
    Output: 3
    Explanation: At time 0, you are in grid location (0, 0). You cannot go anywhere else because 4-directionally adjacent neighbors have a higher elevation than t = 0. You cannot reach point (1, 1) until time 3. When the depth of water is 3, we can swim anywhere inside the grid.

    **Example 2:**
    Input: grid = [[0,1,2,3,4],[24,23,22,21,5],[12,13,14,15,16],[11,17,18,19,20],[10,9,8,7,6]]
    Output: 16
    Explanation: The final route is shown. We need to wait until time 16 so that (0, 0) and (4, 4) are connected.

    **Constraints:**
    - `n == grid.length`
    - `n == grid[i].length`
    - `1 <= n <= 50`
    - `0 <= grid[i][j] < n * n`
    - Each value `grid[i][j]` is unique.
  approach: |
    Use a modified Dijkstra's algorithm where the "cost" to reach a cell is the maximum elevation encountered on the path, rather than the sum. Initialize a min-heap with `(grid[0][0], 0, 0)`.

    At each step, pop the cell with the minimum maximum-elevation-so-far. If it's the bottom-right corner, return that value. Otherwise, explore all 4 neighbors; for each unvisited neighbor, push `(max(current_cost, grid[nr][nc]), nr, nc)` onto the heap. The first time we reach `(n-1, n-1)`, we've found the minimum required time.
  solution: |
    class Solution:
        def swimInWater(self, grid: List[List[int]]) -> int:
            N = len(grid)
            visit = set()
            minH = [[grid[0][0], 0, 0]]
            directions = [[0, 1], [0, -1], [1, 0], [-1, 0]]
            visit.add((0, 0))

            while minH:
                t, r, c = heapq.heappop(minH)
                if r == N - 1 and c == N - 1:
                    return t
                for dr, dc in directions:
                    neiR, neiC = r + dr, c + dc
                    if (neiR < 0 or neiC < 0 or
                            neiR >= N or neiC >= N or
                            (neiR, neiC) in visit):
                        continue
                    visit.add((neiR, neiC))
                    heapq.heappush(minH, [max(t, grid[neiR][neiC]), neiR, neiC])
  verified: false
- id: 787
  title: "Cheapest Flights Within K Stops"
  difficulty: Medium
  tags: [Neetcode 150, DP, DFS, BFS, Graph, Heap, Shortest Path]
  time: "O(n + m * k)"
  space: "O(n)"
  description: |
    There are `n` cities connected by some number of flights. You are given an array `flights` where `flights[i] = [fromi, toi, pricei]` indicates that there is a flight from city `fromi` to city `toi` with cost `pricei`.

    Given three integers `src`, `dst`, and `k`, return the cheapest price from `src` to `dst` with at most `k` stops. If there is no such route, return `-1`.

    **Example 1:**
    Input: n = 4, flights = [[0,1,100],[1,2,100],[2,0,100],[1,3,600],[2,3,200]], src = 0, dst = 3, k = 1
    Output: 700
    Explanation: The optimal path with at most 1 stop from city 0 to 3 has cost 100 + 600 = 700. Note that the path through cities [0,1,2,3] is cheaper but is invalid because it uses 2 stops.

    **Example 2:**
    Input: n = 3, flights = [[0,1,100],[1,2,100],[0,2,500]], src = 0, dst = 2, k = 1
    Output: 200
    Explanation: The optimal path with at most 1 stop from city 0 to 2 has cost 100 + 100 = 200.

    **Constraints:**
    - `1 <= n <= 100`
    - `0 <= flights.length <= (n * (n - 1) / 2)`
    - `flights[i].length == 3`
    - `0 <= fromi, toi < n`
    - `fromi != toi`
    - `1 <= pricei <= 10000`
    - There will not be any multiple flights between two cities.
    - `0 <= src, dst, k < n`
    - `src != dst`
  approach: |
    Use Bellman-Ford with exactly `k + 1` relaxation rounds (since at most k stops means at most k+1 edges). Maintain a `prices` array initialized to infinity except `prices[src] = 0`.

    Each round, copy `prices` to a temporary array `tmpPrices` to prevent using updates from the current round (which would allow more than one hop per round). For each flight, if the source price is not infinity, update `tmpPrices[dst]` if we can improve the cost. After all rounds, return `prices[dst]` or -1 if still infinity.
  solution: |
    class Solution:
        def findCheapestPrice(self, n: int, flights: List[List[int]], src: int, dst: int, k: int) -> int:
            prices = [float("inf")] * n
            prices[src] = 0

            for i in range(k + 1):
                tmpPrices = prices.copy()
                for s, d, p in flights:
                    if prices[s] == float("inf"):
                        continue
                    if prices[s] + p < tmpPrices[d]:
                        tmpPrices[d] = prices[s] + p
                prices = tmpPrices

            return -1 if prices[dst] == float("inf") else prices[dst]
  verified: false
- id: 846
  title: "Hand of Straights"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, Greedy, Sorting]
  verified: false
  description: |
    Alice has some number of cards and she wants to rearrange the cards into groups so that
    each group is of size `groupSize`, and consists of `groupSize` consecutive cards.

    Given an integer array `hand` where `hand[i]` is the value written on the `i`th card and
    an integer `groupSize`, return `true` if she can rearrange the cards, or `false` otherwise.

    **Example 1:**
      Input:  hand = [1,2,3,6,2,3,4,7,8], groupSize = 3
      Output: true
      Explanation: Alice's hand can be rearranged as [1,2,3],[2,3,4],[6,7,8].

    **Example 2:**
      Input:  hand = [1,2,3,4,5], groupSize = 4
      Output: false
      Explanation: Alice's hand can't be rearranged into groups of 4.

    **Constraints:**
      - 1 <= hand.length <= 10^4
      - 0 <= hand[i] <= 10^9
      - 1 <= groupSize <= hand.length
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    If the total card count is not divisible by groupSize, return false immediately. Build a
    frequency counter, then iterate through card values in sorted order. For each card with a
    positive count, attempt to form a complete group of groupSize consecutive values, decrementing
    counts as cards are used. If any required consecutive value is missing, return false.
  solution: |
    class Solution:
        def isNStraightHand(self, hand: List[int], groupSize: int) -> bool:
            if len(hand) % groupSize:
                return False

            count = Counter(hand)
            hand.sort()
            for num in hand:
                if count[num]:
                    for i in range(num, num + groupSize):
                        if not count[i]:
                            return False
                        count[i] -= 1
            return True
- id: 853
  title: "Car Fleet"
  difficulty: Medium
  tags: [Neetcode 150, Array, Stack, Sorting, Monotonic Stack]
  verified: false
  description: |
    There are `n` cars at given miles away from the starting mile `0`, traveling to their
    destination at `target` miles.

    You are given two integer arrays `position` and `speed`, both of length `n`, where
    `position[i]` is the position of the `i`th car and `speed[i]` is the speed of the `i`th
    car (in miles per hour).

    A car cannot pass another car, but it can catch up and then travel next to it at the speed
    of the slower car.

    A **car fleet** is a non-empty set of cars driving at the same position and same speed.
    A single car is also a car fleet.

    If a car catches up to a car fleet at the moment the fleet reaches the destination, it
    will still be considered as one car fleet.

    Return the number of car fleets that will arrive at the destination.

    **Example 1:**
      Input:  target = 12, position = [10,8,0,5,3], speed = [2,4,1,1,3]
      Output: 3
      Explanation: The cars starting at 10 (speed 2) and 8 (speed 4) become a fleet, meeting
        each other at 12. The car starting at 0 does not catch up to any other car, so it is
        a fleet by itself. The cars starting at 5 (speed 1) and 3 (speed 3) become a fleet,
        meeting each other at 6. The fleet moves at speed 1 until it reaches 12.

    **Example 2:**
      Input:  target = 10, position = [3], speed = [3]
      Output: 1
      Explanation: There is only one car, hence there is only one fleet.

    **Example 3:**
      Input:  target = 100, position = [0,2,4], speed = [4,2,1]
      Output: 1
      Explanation: The cars starting at 0 (speed 4) and 2 (speed 2) become a fleet at
        position 4. The fleet moves at speed 2. Then the fleet (speed 2) and the car at
        position 4 (speed 1) become one fleet at position 6. The fleet moves at speed 1
        until it reaches 100.

    **Constraints:**
      - n == position.length == speed.length
      - 1 <= n <= 10^5
      - 0 < target <= 10^6
      - 0 <= position[i] < target
      - 0 < speed[i] <= 10^6
      - All the values of position are unique.
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    Sort cars by position descending. Track prevTime (time of the leading fleet). For each car, compute currTime = (target - pos) / speed. If currTime > prevTime the car can't catch the fleet ahead — it forms a new fleet and becomes the new prevTime. Count the number of fleets.
  solution: |
    class Solution:
        def carFleet(self, target: int, position: List[int], speed: List[int]) -> int:
            pair = [(p, s) for p, s in zip(position, speed)]
            pair.sort(reverse=True)

            fleets = 1
            prevTime = (target - pair[0][0]) / pair[0][1]
            for i in range(1, len(pair)):
                currCar = pair[i]
                currTime = (target - currCar[0]) / currCar[1]
                if currTime > prevTime:
                    fleets += 1
                    prevTime = currTime
            return fleets
- id: 875
  title: "Koko Eating Bananas"
  difficulty: Medium
  tags: [Neetcode 150, Array, Binary Search]
  verified: false
  description: |
    Koko loves to eat bananas. There are `n` piles of bananas, the `i`th pile has `piles[i]`
    bananas. The guards have gone and will come back in `h` hours.

    Koko can decide her bananas-per-hour eating speed of `k`. Each hour, she chooses some pile
    of bananas and eats `k` bananas from that pile. If the pile has less than `k` bananas, she
    eats all of them instead and will not eat any more bananas during this hour.

    Koko likes to eat slowly but still wants to finish eating all the bananas before the guards
    return.

    Return the minimum integer `k` such that she can eat all the bananas within `h` hours.

    **Example 1:**
      Input:  piles = [3,6,7,11], h = 8
      Output: 4

    **Example 2:**
      Input:  piles = [30,11,23,4,20], h = 5
      Output: 30

    **Example 3:**
      Input:  piles = [30,11,23,4,20], h = 6
      Output: 23

    **Constraints:**
      - 1 <= piles.length <= 10^4
      - piles.length <= h <= 10^9
      - 1 <= piles[i] <= 10^9
  time: "O(n log m)"
  space: "O(1)"
  approach: |
    Binary search on eating speed from 1 to max(piles). For each candidate speed k, compute total hours = sum of ceil(p / k) for each pile. If total <= h, try a lower speed (r = k - 1) and record k as a candidate. Otherwise try higher (l = k + 1).
  solution: |
    class Solution:
        def minEatingSpeed(self, piles: List[int], h: int) -> int:
            l, r = 1, max(piles)
            res = r

            while l <= r:
                k = (l + r) // 2

                totalTime = 0
                for p in piles:
                    totalTime += math.ceil(float(p) / k)

                if totalTime <= h:
                    res = k
                    r = k - 1
                else:
                    l = k + 1

            return res
- id: 876
  title: "Middle of the Linked List"
  difficulty: Easy
  tags: [Linked List, Two Pointers]
  verified: false
  description: |
    Given the `head` of a singly linked list, return the **middle** node of the
    linked list.

    If there are two middle nodes, return the **second middle** node.

    **Example 1:**
      Input: head = [1,2,3,4,5]
      Output: [3,4,5]
      Explanation: The middle node of the list is node 3.

    **Example 2:**
      Input: head = [1,2,3,4,5,6]
      Output: [4,5,6]
      Explanation: Since the list has two middle nodes with values 3 and 4, we return the second one.

    **Constraints:**
      - The number of nodes in the list is in the range [1, 100].
      - 1 <= Node.val <= 100
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use the fast and slow pointer technique. Initialize both pointers at the head.
    Advance slow by one step and fast by two steps each iteration. When fast reaches
    the end of the list, slow will be at the middle node. For even-length lists this
    naturally lands on the second middle node.
  solution: |
    class Solution:
        def middleNode(self, head: Optional[ListNode]) -> Optional[ListNode]:
            slow, fast = head, head

            while fast and fast.next:
                slow = slow.next
                fast = fast.next.next

            return slow
- id: 973
  title: "K Closest Points to Origin"
  difficulty: Medium
  tags: [Neetcode 150, Array, Math, Divide and Conquer, Geometry, Sorting, Heap (Priority Queue), Quickselect]
  verified: false
  description: |
    Given an array of points where `points[i] = [xi, yi]` represents a point on the **X-Y
    plane** and an integer `k`, return the `k` closest points to the origin `(0, 0)`.

    The distance between two points on the X-Y plane is the Euclidean distance:
    `sqrt((x1 - x2)^2 + (y1 - y2)^2)`.

    You may return the answer in **any order**. The answer is **guaranteed** to be **unique**
    (except for the order that it is in).

    **Example 1:**
      Input:  points = [[0,2],[2,2]], k = 1
      Output: [[0,2]]
      Explanation: The distance from (0, 2) to the origin is 2. The distance from (2, 2) to
        the origin is sqrt(8) ≈ 2.83. So the closest point is [0, 2].

    **Example 2:**
      Input:  points = [[0,2],[2,0],[2,2]], k = 2
      Output: [[0,2],[2,0]]

    **Constraints:**
      - 1 <= k <= points.length <= 10^4
      - -10^4 <= points[i][0], points[i][1] <= 10^4
  time: "O(n log k)"
  space: "O(k)"
  approach: |
    Maintain a max-heap of size k (using negated distances since Python only has a min-heap).
    For each point, compute its squared Euclidean distance (no need for sqrt) and push it onto
    the heap. If the heap exceeds k elements, pop the farthest point. After processing all
    points, the heap contains exactly the k closest points.
  solution: |
    class Solution:
        def kClosest(self, points: List[List[int]], k: int) -> List[List[int]]:
            maxHeap = []
            for x, y in points:
                dist = -(x ** 2 + y ** 2)
                heapq.heappush(maxHeap, [dist, x, y])
                if len(maxHeap) > k:
                    heapq.heappop(maxHeap)

            res = []
            while maxHeap:
                dist, x, y = heapq.heappop(maxHeap)
                res.append([x, y])
            return res
- id: 981
  title: "Time Based Key Value Store"
  difficulty: Medium
  tags: [Neetcode 150, Hash Table, String, Binary Search, Design]
  verified: false
  description: |
    Design a time-based key-value data structure that can store multiple values for the same
    key at different time stamps and retrieve the key's value at a certain timestamp.

    Implement the `TimeMap` class:
      - `TimeMap()` Initializes the object of the data structure.
      - `void set(String key, String value, int timestamp)` Stores the key `key` with the
        value `value` at the given time `timestamp`.
      - `String get(String key, int timestamp)` Returns a value such that `set` was called
        previously, with `timestamp_prev <= timestamp`. If there are multiple such values, it
        returns the value associated with the largest `timestamp_prev`. If there are no values,
        it returns `""`.

    **Example 1:**
      Input:
        ["TimeMap", "set", "get", "get", "set", "get", "get"]
        [[], ["foo", "bar", 1], ["foo", 1], ["foo", 3], ["foo", "bar2", 4], ["foo", 4], ["foo", 5]]
      Output: [null, null, "bar", "bar", null, "bar2", "bar2"]
      Explanation:
        TimeMap timeMap = new TimeMap();
        timeMap.set("foo", "bar", 1);
        timeMap.get("foo", 1);  // return "bar"
        timeMap.get("foo", 3);  // return "bar"
        timeMap.set("foo", "bar2", 4);
        timeMap.get("foo", 4);  // return "bar2"
        timeMap.get("foo", 5);  // return "bar2"

    **Constraints:**
      - 1 <= key.length, value.length <= 100
      - key and value consist of lowercase English letters and digits.
      - 1 <= timestamp <= 10^7
      - All the timestamps timestamp of set are strictly increasing.
      - At most 2 * 10^5 calls will be made to set and get.
  time: "O(1) for set, O(log n) for get"
  space: "O(m * n)"
  approach: |
    Hash map where each key maps to a list of [value, timestamp] pairs in chronological order (naturally sorted since timestamps are strictly increasing). For set: append in O(1). For get: binary search for the largest timestamp <= query timestamp and return the corresponding value, or '' if none.
  solution: |
    class TimeMap:
        def __init__(self):
            self.keyStore = {}  # key : list of [val, timestamp]

        def set(self, key: str, value: str, timestamp: int) -> None:
            if key not in self.keyStore:
                self.keyStore[key] = []
            self.keyStore[key].append([value, timestamp])

        def get(self, key: str, timestamp: int) -> str:
            res, values = "", self.keyStore.get(key, [])
            l, r = 0, len(values) - 1
            while l <= r:
                m = (l + r) // 2
                if values[m][1] <= timestamp:
                    res = values[m][0]
                    l = m + 1
                else:
                    r = m - 1
            return res
- id: 994
  title: "Rotting Oranges"
  difficulty: Medium
  tags: [Neetcode 150, Array, Breadth-First Search, Matrix]
  verified: false
  description: |
    You are given an `m x n` grid where each cell can have one of three values:
    - `0`: an empty cell,
    - `1`: a fresh orange,
    - `2`: a rotten orange.

    Every minute, any fresh orange that is **4-directionally adjacent** to a rotten orange
    becomes rotten.

    Return the **minimum** number of minutes that must elapse until no cell has a fresh orange.
    If this is impossible, return `-1`.

    **Example 1:**
      Input:  grid = [[2,1,1],[1,1,0],[0,1,1]]
      Output: 4

    **Example 2:**
      Input:  grid = [[2,1,1],[0,1,1],[1,0,1]]
      Output: -1
      Explanation: The orange in the bottom left corner is never rotten.

    **Example 3:**
      Input:  grid = [[0,2]]
      Output: 0
      Explanation: There are no fresh oranges.

    **Constraints:**
      - m == grid.length
      - n == grid[i].length
      - 1 <= m, n <= 10
      - grid[i][j] is 0, 1, or 2.
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Multi-source BFS from all rotten oranges simultaneously. Initialize the queue with all
    rotten orange positions and count all fresh oranges. Process BFS level by level — each
    level represents one minute. For each rotten orange, infect adjacent fresh oranges,
    decrement the fresh count, and enqueue the newly rotten cells. Return elapsed time if no
    fresh oranges remain; otherwise return -1.
  solution: |
    class Solution:
        def orangesRotting(self, grid: List[List[int]]) -> int:
            q = collections.deque()
            fresh = 0
            time = 0

            for r in range(len(grid)):
                for c in range(len(grid[0])):
                    if grid[r][c] == 1:
                        fresh += 1
                    if grid[r][c] == 2:
                        q.append((r, c))

            directions = [[0, 1], [0, -1], [1, 0], [-1, 0]]
            while fresh > 0 and q:
                length = len(q)
                for i in range(length):
                    r, c = q.popleft()

                    for dr, dc in directions:
                        row, col = r + dr, c + dc
                        if (row in range(len(grid)) and
                            col in range(len(grid[0])) and
                            grid[row][col] == 1):
                            grid[row][col] = 2
                            q.append((row, col))
                            fresh -= 1
                time += 1

            return time if fresh == 0 else -1
- id: 1046
  title: "Last Stone Weight"
  difficulty: Easy
  tags: [Neetcode 150, Array, Heap (Priority Queue)]
  verified: true
  description: |
    You are given an array of integers `stones` where `stones[i]` is the weight of the `ith`
    stone.

    We are playing a game with the stones. On each turn, we choose the **heaviest two stones**
    and smash them together. Suppose the heaviest two stones have weights `x` and `y` with
    `x <= y`. The result of this smash is:

    - If `x == y`, both stones are destroyed.
    - If `x != y`, the stone of weight `x` is destroyed, and the stone of weight `y` has new
      weight `y - x`.

    At the end of the game, there is **at most one** stone left. Return the weight of the last
    remaining stone. If there are no stones left, return `0`.

    **Example 1:**
      Input:  stones = [2,3,6,2,4]
      Output: 1
      Explanation: Smash 6 and 4 → [2,3,2,2]; smash 3 and 2 → [1,2,2]; smash 2 and 2 → [1].

    **Example 2:**
      Input:  stones = [1,2]
      Output: 1

    **Constraints:**
      - 1 <= stones.length <= 20
      - 1 <= stones[i] <= 100
  time_easy: "O(n log n)"
  space_easy: "O(n)"
  approach_easy: |
    Use a max-heap (simulated with negated values in Python's min-heap). Heapify all stone
    weights. Repeatedly pop the two heaviest stones; if they differ, push the difference back.
    Continue until one or zero stones remain, then return the result (or 0 if empty).
  solution_easy: |
    class Solution:
        def lastStoneWeight(self, stones: List[int]) -> int:
            stones = [-s for s in stones]
            heapq.heapify(stones)

            while len(stones) > 1:
                first = heapq.heappop(stones)
                second = heapq.heappop(stones)
                if second > first:
                    heapq.heappush(stones, first - second)

            stones.append(0)
            return abs(stones[0])
  time: "O(n + w), n is the length of stones array, w is the max value in the stones array"
  space: "O(w)"
  approach: |
    Since all stone values lie within a limited numeric range, we can avoid sorting or using a heap by using bucket sort / frequency counting.

    Instead of tracking every stone individually, we store how many stones exist for each possible weight.

    Key ideas:

    Let bucket[w] store how many stones of weight w we have.
    We repeatedly look for the heaviest available stone.

    When smashing stones of weights a and b:
      - If a == b, they cancel out.
      - If different, the leftover stone a - b gets added back into the bucket.

    We continue until only one non-zero weight remains.

    This works because bucket operations (increment, decrement, scanning) are efficient when the weight range is manageable.
  solution: |
    class Solution:
        def lastStoneWeight(self, stones: List[int]) -> int:

            maxStone = max(stones)
            bucket = [0] * (maxStone + 1)
            for stone in stones:
                bucket[stone] += 1

            first = second = maxStone
            while first > 0:
                if bucket[first] % 2 == 0:
                    first -= 1
                    continue

                j = min(first - 1, second)
                while j > 0 and bucket[j] == 0:
                    j -= 1

                if j == 0:
                    return first
                second = j
                bucket[first] -= 1
                bucket[second] -= 1
                bucket[first - second] += 1
                first = max(first - second, second)
            return first
- id: 1143
  title: "Longest Common Subsequence"
  difficulty: Medium
  tags: [Neetcode 150, String, Dynamic Programming]
  verified: false
  description: |
    Given two strings `text1` and `text2`, return the length of their longest common
    subsequence. Return 0 if none exists.

    A **subsequence** is derived by deleting some or no elements without changing the relative
    order of remaining characters (e.g., "cat" is a subsequence of "crabt").

    **Example 1:**
      Input:  text1 = "cat", text2 = "crabt"
      Output: 3
      Explanation: The longest common subsequence is "cat".

    **Example 2:**
      Input:  text1 = "abcd", text2 = "abcd"
      Output: 4

    **Example 3:**
      Input:  text1 = "abcd", text2 = "efgh"
      Output: 0

    **Constraints:**
      - 1 <= text1.length, text2.length <= 1000
      - Both strings consist of lowercase English characters
  time: "O(m * n)"
  space: "O(m * n)"
  approach: |
    Use dynamic programming. When characters at current positions match, add 1 to the diagonal
    value (the LCS of the remaining substrings). When they don't match, take the maximum of
    skipping either character. The space-optimized version uses a single 1D array instead of a
    full 2D table, iterating right-to-left within each row to preserve needed values before
    they are overwritten.
  solution: |
    class Solution:
        def longestCommonSubsequence(self, text1: str, text2: str) -> int:
            if len(text1) < len(text2):
                text1, text2 = text2, text1

            dp = [0] * (len(text2) + 1)

            for i in range(len(text1) - 1, -1, -1):
                prev = 0
                for j in range(len(text2) - 1, -1, -1):
                    temp = dp[j]
                    if text1[i] == text2[j]:
                        dp[j] = 1 + prev
                    else:
                        dp[j] = max(dp[j], dp[j + 1])
                    prev = temp

            return dp[0]
- id: 1235
  title: "Maximum Profit in Job Scheduling"
  difficulty: Hard
  tags: [Array, Binary Search, Dynamic Programming, Sorting]
  verified: false
  description: |
    We have `n` jobs, where every job is scheduled to be done during the time
    `startTime[i]` to `endTime[i]`, obtaining a profit of `profit[i]`.

    You're given the `startTime`, `endTime` and `profit` arrays, return the maximum
    profit you can take such that there are no two jobs in the subset with overlapping
    time range.

    If you choose a job that ends at time `X` you will be able to start another job
    that starts at time `X`.

    **Example 1:**
      Input: startTime = [1,2,3,3], endTime = [3,4,5,6], profit = [50,10,40,70]
      Output: 120
      Explanation: The subset chosen is the first and fourth job. Time range [1-3]+[3-6] and we get profit of 120 = 50 + 70.

    **Example 2:**
      Input: startTime = [1,2,3,4,6], endTime = [3,5,10,6,9], profit = [20,20,100,200,200]
      Output: 200
      Explanation: The subset chosen is the fifth job. Profit is 200.

    **Example 3:**
      Input: startTime = [1,1,1], endTime = [2,3,4], profit = [5,6,4]
      Output: 6

    **Constraints:**
      - 1 <= startTime.length == endTime.length == profit.length <= 5 * 10^4
      - 1 <= startTime[i] < endTime[i] <= 10^9
      - 1 <= profit[i] <= 10^4
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    Sort jobs by start time. Use top-down DP with memoization: at each job, decide
    to skip it or take it. When taking a job, use binary search to find the next
    non-overlapping job (the first job whose start time >= current job's end time).
    Cache results to avoid recomputing overlapping subproblems.
  solution: |
    class Solution:
        def jobScheduling(self, startTime: List[int], endTime: List[int], profit: List[int]) -> int:
            n = len(startTime)
            index = list(range(n))
            index.sort(key=lambda i: startTime[i])

            cache = [-1] * n

            def dfs(i):
                if i == n:
                    return 0
                if cache[i] != -1:
                    return cache[i]

                res = dfs(i + 1)

                left, right, j = i + 1, n, n
                while left < right:
                    mid = (left + right) // 2
                    if startTime[index[mid]] >= endTime[index[i]]:
                        j = mid
                        right = mid
                    else:
                        left = mid + 1

                cache[i] = res = max(res, profit[index[i]] + dfs(j))
                return res

            return dfs(0)
- id: 1249
  title: "Minimum Remove to Make Valid Parentheses"
  difficulty: Medium
  tags: [String, Stack]
  verified: true
  description: |
    Given a string s of '(' , ')' and lowercase English characters.

    Your task is to remove the minimum number of parentheses ( '(' or ')', in any positions ) so that the resulting parentheses string is valid and return any valid string.

    Formally, a parentheses string is valid if and only if:

        It is the empty string, contains only lowercase characters, or
        It can be written as AB (A concatenated with B), where A and B are valid strings, or
        It can be written as (A), where A is a valid string.

    **Example 1:**
      Input: s = "lee(t(c)o)de)"
      Output: "lee(t(c)o)de"
      Explanation: "lee(t(co)de)" , "lee(t(c)ode)" would also be accepted.

    **Example 2:**
      Input: s = "a)b(c)d"
      Output: "ab(c)d"

    **Example 3:**
      Input: s = "))(("
      Output: ""
      Explanation: An empty string is also valid.


    **Constraints:**
      - 1 <= s.length <= 105
      - s[i] is either '(' , ')', or lowercase English letter.
  time: "O(n)"
  space: "O(n)"
  approach: |
    1. Convert string to list, because String is an immutable data structure in Python and it's much easier and memory-efficient to deal with a list for this task.
    2. Iterate through list
    3. Keep track of indices with open parentheses in the stack. In other words, when we come across open parenthesis we add an index to the stack.
    4. When we come across close parenthesis we pop an element from the stack. If the stack is empty we replace current list element with an empty string
    5. After iteration, we replace all indices we have in the stack with empty strings, because we don't have close parentheses for them.
    6. Convert list to string and return
  solution: |
    class Solution:
      def minRemoveToMakeValid(self, s: str) -> str:
          s = list(s)
          stack = []
          for i, char in enumerate(s):
              if char == '(':
                  stack.append(i)
              elif char == ')':
                  if stack:
                      stack.pop()
                  else:
                      s[i] = ''
          while stack:
              s[stack.pop()] = ''
          return ''.join(s)
- id: 1448
  title: "Count Good Nodes In Binary Tree"
  difficulty: Medium
  tags: [Neetcode 150, Tree, DFS]
  verified: false
  description: |
    Given a binary tree `root`, a node X in the tree is named **good** if in the path from root
    to X there are no nodes with a value **greater than** X's value.

    Return the number of **good** nodes in the binary tree.

    **Example 1:**
      Input:  root = [3,1,4,3,null,1,5]
      Output: 4
      Explanation: Root Node (3) is always good. Node 4 -> (3,4) is the max in the path from
        root. Node 3 -> (3,1,3) is the max in the path from root. Node 5 -> (3,4,5) is the max.

    **Example 2:**
      Input:  root = [3,3,null,4,2]
      Output: 3
      Explanation: Node 2 -> (3,3,2) is not good because "3" is higher than it.

    **Example 3:**
      Input:  root = [1]
      Output: 1
      Explanation: Root is considered as good.

    **Constraints:**
      - The number of nodes in the binary tree is in the range [1, 10^5].
      - Each node's value is between [-10^4, 10^4].
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS passing the maximum value seen along the current path from root. A node is good if its value >= the path maximum. Count good nodes recursively while updating the running maximum for child calls.
  solution: |
    class Solution:
        def goodNodes(self, root: TreeNode) -> int:
            def dfs(node, maxVal):
                if not node:
                    return 0
                res = 1 if node.val >= maxVal else 0
                maxVal = max(maxVal, node.val)
                res += dfs(node.left, maxVal)
                res += dfs(node.right, maxVal)
                return res

            return dfs(root, root.val)
- id: 1584
  title: "Min Cost to Connect All Points"
  difficulty: Medium
  tags: [Neetcode 150, Array, Union Find, Graph, Minimum Spanning Tree]
  time: "O(n^2 log n)"
  space: "O(n^2)"
  description: |
    You are given an array `points` representing integer coordinates of some points on a 2D-plane, where `points[i] = [xi, yi]`.

    The cost of connecting two points `[xi, yi]` and `[xj, yj]` is the **Manhattan distance** between them: `|xi - xj| + |yi - yj|`.

    Return the minimum cost to make all points connected. All points are connected if there is exactly one simple path between any two points.

    **Example 1:**
    Input: points = [[0,0],[2,2],[3,10],[5,2],[7,0]]
    Output: 20

    **Example 2:**
    Input: points = [[3,12],[-2,5],[-4,1]]
    Output: 18

    **Constraints:**
    - `1 <= points.length <= 1000`
    - `-10^6 <= xi, yi <= 10^6`
    - All pairs `(xi, yi)` are distinct.
  approach: |
    Use Prim's algorithm to find the Minimum Spanning Tree. Build an adjacency list where every pair of points is connected with their Manhattan distance.

    Start with point 0 in the MST. Use a min-heap initialized with `(0, 0)` (cost, point index). At each step, pop the cheapest edge, and if the destination isn't already in the MST, add it and push all its unvisited neighbors. Accumulate the total cost. Continue until all n points are in the MST.
  solution: |
    class Solution:
        def minCostConnectPoints(self, points: List[List[int]]) -> int:
            N = len(points)
            adj = {i: [] for i in range(N)}
            for i in range(N):
                x1, y1 = points[i]
                for j in range(i + 1, N):
                    x2, y2 = points[j]
                    dist = abs(x1 - x2) + abs(y1 - y2)
                    adj[i].append([dist, j])
                    adj[j].append([dist, i])

            res = 0
            visit = set()
            minH = [[0, 0]]
            while len(visit) < N:
                cost, i = heapq.heappop(minH)
                if i in visit:
                    continue
                res += cost
                visit.add(i)
                for neiCost, nei in adj[i]:
                    if nei not in visit:
                        heapq.heappush(minH, [neiCost, nei])
            return res
