- id: 1851
  title: "Minimum Interval to Include Each Query"
  difficulty: Hard
  tags: [Neetcode 150, Array, Binary Search, Sorting, Heap (Priority Queue)]
  verified: false
  description: |
    You are given a 2D integer array `intervals`, where `intervals[i] = [left_i, right_i]`
    represents the `i`th interval starting at `left_i` and ending at `right_i` (inclusive). The
    **size** of an interval is defined as the number of integers it contains, or more formally
    `right_i - left_i + 1`.

    You are also given an integer array `queries`. The answer to the `j`th query is the **size
    of the smallest interval** `i` such that `left_i <= queries[j] <= right_i`. If no such
    interval exists, the answer is `-1`.

    Return an array containing the answers to the queries.

    **Example 1:**
      Input:  intervals = [[1,4],[2,4],[3,6],[4,4]], queries = [2,3,4,5]
      Output: [3,3,1,4]
      Explanation:
        - Query = 2: The interval [2,4] is the smallest interval containing 2. The answer is
          4 - 2 + 1 = 3.
        - Query = 3: The interval [2,4] is the smallest interval containing 3. The answer is
          4 - 2 + 1 = 3.
        - Query = 4: The interval [4,4] is the smallest interval containing 4. The answer is
          4 - 4 + 1 = 1.
        - Query = 5: The interval [3,6] is the smallest interval containing 5. The answer is
          6 - 3 + 1 = 4.

    **Example 2:**
      Input:  intervals = [[2,3],[2,5],[1,8],[20,25]], queries = [2,19,5,22]
      Output: [2,-1,4,6]

    **Constraints:**
      - 1 <= intervals.length <= 10^5
      - 1 <= queries.length <= 10^5
      - 1 <= left_i <= right_i <= 10^7
      - 1 <= queries[j] <= 10^7
  time: "O(n log n + m log m)"
  space: "O(n + m)"
  approach: |
    Sort intervals by start and sort queries (preserving original indices). Process queries in
    ascending order. For each query, push all intervals whose start <= query into a min-heap
    keyed by size (right - left + 1). Pop any heap entries whose right end < query (they no
    longer cover it). The heap's minimum is the smallest interval covering the query, or -1 if
    the heap is empty. Map results back to the original query order.
  solution: |
    class Solution:
        def minInterval(self, intervals: List[List[int]], queries: List[int]) -> List[int]:
            intervals.sort()
            minHeap = []
            res = {}
            i = 0

            for q in sorted(queries):
                while i < len(intervals) and intervals[i][0] <= q:
                    l, r = intervals[i]
                    heapq.heappush(minHeap, (r - l + 1, r))
                    i += 1

                while minHeap and minHeap[0][1] < q:
                    heapq.heappop(minHeap)

                res[q] = minHeap[0][0] if minHeap else -1

            return [res[q] for q in queries]
- id: 1899
  title: "Merge Triplets to Form Target Triplet"
  difficulty: Medium
  tags: [Neetcode 150, Array, Greedy]
  verified: false
  description: |
    A **triplet** is an array of three integers. You are given a 2D integer array `triplets`,
    where `triplets[i] = [ai, bi, ci]` describes the `i`th triplet. You are also given an
    integer array `target = [x, y, z]` that describes the triplet you want to obtain.

    To obtain `target`, you may apply the following operation on `triplets` any number of times
    (possibly zero):
      - Choose two indices (`0-indexed`) `i` and `j` (`i != j`) and **update** `triplets[j]`
        to become `[max(ai, aj), max(bi, bj), max(ci, cj)]`.

    For example, if `triplets[i] = [2, 5, 3]` and `triplets[j] = [1, 7, 5]`, `triplets[j]`
    will be updated to `[max(2, 1), max(5, 7), max(3, 5)] = [2, 7, 5]`.

    Return `true` if it is possible to obtain the `target` triplet `[x, y, z]` as an
    **element** of `triplets`, or `false` otherwise.

    **Example 1:**
      Input:  triplets = [[2,5,3],[1,8,4],[1,7,5]], target = [2,7,5]
      Output: true
      Explanation: Perform the following operations:
        - Choose the first and last triplets [[2,5,3],[1,8,4],[1,7,5]]. Update the last triplet
          to be [max(2,1), max(5,7), max(3,5)] = [2,7,5]. triplets = [[2,5,3],[1,8,4],[2,7,5]]
        The target triplet [2,7,5] is now an element of triplets.

    **Example 2:**
      Input:  triplets = [[3,4,5],[4,5,6]], target = [3,2,5]
      Output: false
      Explanation: It is impossible to have [3,2,5] as an element of triplets.

    **Constraints:**
      - 1 <= triplets.length <= 10^5
      - triplets[i].length == target.length == 3
      - 1 <= ai, bi, ci, x, y, z <= 1000
  time: "O(n)"
  space: "O(1)"
  approach: |
    Since merging only takes the element-wise maximum, a triplet with any value exceeding the
    corresponding target position would overshoot the target and cannot contribute. Skip all
    such triplets. For the remaining valid triplets, track which target positions have been
    matched. A position is matched when a valid triplet equals the target at that position.
    Return true when all three positions are matched.
  solution: |
    class Solution:
        def mergeTriplets(self, triplets: List[List[int]], target: List[int]) -> bool:
            good = set()

            for t in triplets:
                if t[0] > target[0] or t[1] > target[1] or t[2] > target[2]:
                    continue
                for i, v in enumerate(t):
                    if v == target[i]:
                        good.add(i)

            return len(good) == 3
- id: 2013
  title: "Detect Squares"
  difficulty: Medium
  tags: [Neetcode 150, Array, Hash Table, Design, Counting]
  time: "O(n)"
  space: "O(n)"
  description: |
    You are given a stream of points on the X-Y plane. Design an algorithm that:
    - **Adds** new points from the stream into a data structure. **Duplicate** points are allowed and should be treated as different points.
    - Given a query point, **counts** the number of ways to choose three points from the data structure such that the three points and the query point form an **axis-aligned square** with **positive area**.

    An axis-aligned square is a square whose edges are all the same length and are either parallel or perpendicular to the x-axis and y-axis.

    Implement the `CountSquares` class:
    - `CountSquares()` Initializes the object with an empty data structure.
    - `void add(int[] point)` Adds a new point `point = [x, y]` to the data structure.
    - `int count(int[] point)` Counts the number of ways to form axis-aligned squares with `point = [x, y]` as described above.

    **Example 1:**
    Input: ["CountSquares","add","add","add","count","count","add","count"]
    [[],[[3,10]],[[11,2]],[[3,2]],[[11,10]],[[14,8]],[[11,2]],[[11,10]]]
    Output: [null,null,null,null,1,0,null,2]

    **Constraints:**
    - `point.length == 2`
    - `0 <= x, y <= 1000`
    - At most `3000` calls will be made to `add` and `count`.
  approach: |
    Store points in a nested hash map keyed first by x-coordinate, then y-coordinate, with the value being the count of that point. For `count(x1, y1)`, iterate over all y-coordinates `y2` stored at `x1`. The vertical distance `side = y2 - y1` determines the square's side length. For each, check two horizontal positions (`x1 + side` and `x1 - side`) and multiply the frequencies of the three other required corners.
  solution: |
    class CountSquares:
        def __init__(self):
            self.ptsCount = defaultdict(lambda: defaultdict(int))

        def add(self, point: List[int]) -> None:
            self.ptsCount[point[0]][point[1]] += 1

        def count(self, point: List[int]) -> int:
            res = 0
            x1, y1 = point
            for y2 in self.ptsCount[x1]:
                side = y2 - y1
                if side == 0:
                    continue
                x3, x4 = x1 + side, x1 - side
                res += (self.ptsCount[x1][y2] *
                        self.ptsCount[x3][y1] *
                        self.ptsCount[x3][y2])
                res += (self.ptsCount[x1][y2] *
                        self.ptsCount[x4][y1] *
                        self.ptsCount[x4][y2])
            return res
  verified: false
