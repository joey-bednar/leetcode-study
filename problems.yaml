- id: 105
  title: "Construct Binary Tree From Preorder And Inorder Traversal"
  difficulty: Medium
  tags: [Tree, DFS, Array, Hash Table]
  verified: false
  description: |
    Given two integer arrays `preorder` and `inorder` where `preorder` is the preorder traversal
    of a binary tree and `inorder` is the inorder traversal of the same tree, construct and
    return the binary tree.

    **Example 1:**
      Input:  preorder = [3,9,20,15,7], inorder = [9,3,15,20,7]
      Output: [3,9,20,null,null,15,7]

    **Example 2:**
      Input:  preorder = [-1], inorder = [-1]
      Output: [-1]

    **Constraints:**
      - 1 <= preorder.length <= 3000
      - inorder.length == preorder.length
      - -3000 <= preorder[i], inorder[i] <= 3000
      - preorder and inorder consist of unique values.
      - Each value of inorder also appears in preorder.
      - preorder is guaranteed to be the preorder traversal of the tree.
      - inorder is guaranteed to be the inorder traversal of the tree.
  time: "O(n)"
  space: "O(n)"
  approach: |
    The first element of preorder is always the root. Find that root value in inorder to split
    into left and right subtrees. Recurse on each half. Use a hash map for O(1) inorder lookups.
  solution: |
    def buildTree(preorder: list[int], inorder: list[int]) -> Optional[TreeNode]:
        if not preorder or not inorder:
            return None
        root = TreeNode(preorder[0])
        mid = inorder.index(preorder[0])
        root.left = buildTree(preorder[1:mid + 1], inorder[:mid])
        root.right = buildTree(preorder[mid + 1:], inorder[mid + 1:])
        return root
- id: 110
  title: "Balanced Binary Tree"
  difficulty: Easy
  tags: [Tree, DFS]
  verified: false
  description: |
    Given a binary tree, determine if it is **height-balanced**.

    A **height-balanced** binary tree is a binary tree in which the depth of the two subtrees of
    every node never differs by more than one.

    **Example 1:**
      Input:  root = [3,9,20,null,null,15,7]
      Output: true

    **Example 2:**
      Input:  root = [1,2,2,3,3,null,null,4,4]
      Output: false

    **Example 3:**
      Input:  root = []
      Output: true

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 5000].
      - -10^4 <= Node.val <= 10^4
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS that returns the height or -1 if unbalanced. At each node, compute left and right
    heights. If either is -1 or they differ by more than 1, return -1. Otherwise return
    1 + max(left, right).
  solution: |
    def isBalanced(root: Optional[TreeNode]) -> bool:
        def dfs(root):
            if not root:
                return 0
            left = dfs(root.left)
            if left == -1:
                return -1
            right = dfs(root.right)
            if right == -1:
                return -1
            if abs(left - right) > 1:
                return -1
            return 1 + max(left, right)
        return dfs(root) != -1
- id: 121
  title: "Best Time to Buy And Sell Stock"
  difficulty: Easy
  tags: [Array, Dynamic Programming]
  verified: false
  description: |
    You are given an array `prices` where `prices[i]` is the price of a given stock on the
    `i`th day.

    You want to maximize your profit by choosing a **single day** to buy one stock and choosing
    a **different day in the future** to sell that stock.

    Return the maximum profit you can achieve from this transaction. If you cannot achieve any
    profit, return `0`.

    **Example 1:**
      Input:  prices = [7,1,5,3,6,4]
      Output: 5
      Explanation: Buy on day 2 (price = 1) and sell on day 5 (price = 6), profit = 6-1 = 5.
        Note that buying on day 2 and selling on day 1 is not allowed because you must buy
        before you sell.

    **Example 2:**
      Input:  prices = [7,6,4,3,1]
      Output: 0
      Explanation: In this case, no transactions are done and the max profit = 0.

    **Constraints:**
      - 1 <= prices.length <= 10^5
      - 0 <= prices[i] <= 10^4
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers l (buy day) and r (sell day), starting at 0 and 1. If prices[l] <
    prices[r], compute the profit and update the maximum. Otherwise, the current sell price is
    lower than the buy price, so move l to r (new minimum buy candidate). Advance r each step.
  solution: |
    def max_profit(prices: list[int]) -> int:
        l, r = 0, 1
        max_p = 0
        while r < len(prices):
            if prices[l] < prices[r]:
                profit = prices[r] - prices[l]
                max_p = max(max_p, profit)
            else:
                l = r
            r += 1
        return max_p
- id: 124
  title: "Binary Tree Maximum Path Sum"
  difficulty: Hard
  tags: [Tree, DFS, DP]
  verified: false
  description: |
    A **path** in a binary tree is a sequence of nodes where each pair of adjacent nodes in the
    sequence has an edge connecting them. A node can only appear in the sequence **at most once**.
    Note that the path does not need to pass through the root.

    The **path sum** of a path is the sum of the node's values in the path.

    Given the `root` of a binary tree, return the maximum path sum of any **non-empty** path.

    **Example 1:**
      Input:  root = [1,2,3]
      Output: 6
      Explanation: The optimal path is 2 -> 1 -> 3 with a path sum of 2 + 1 + 3 = 6.

    **Example 2:**
      Input:  root = [-10,9,20,null,null,15,7]
      Output: 42
      Explanation: The optimal path is 15 -> 20 -> 7 with a path sum of 15 + 20 + 7 = 42.

    **Constraints:**
      - The number of nodes in the tree is in the range [1, 3 * 10^4].
      - -1000 <= Node.val <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS returning max gain through one direction from each node. Track a global max which can
    combine both left and right children. At each node, clamp left/right gains to 0 (skip
    negative branches), compute val + left + right as a candidate, and return val + max(left, right)
    as the gain upward.
  solution: |
    def maxPathSum(root: Optional[TreeNode]) -> int:
        res = [root.val]

        def dfs(root):
            if not root:
                return 0
            left_max = max(dfs(root.left), 0)
            right_max = max(dfs(root.right), 0)
            res[0] = max(res[0], root.val + left_max + right_max)
            return root.val + max(left_max, right_max)

        dfs(root)
        return res[0]
- id: 125
  title: "Valid Palindrome"
  difficulty: Easy
  tags: [Two Pointers, String]
  verified: false
  description: |
    A phrase is a **palindrome** if, after converting all uppercase letters into lowercase
    letters and removing all non-alphanumeric characters, it reads the same forward and
    backward. Alphanumeric characters include letters and numbers.

    Given a string `s`, return `true` if it is a **palindrome**, or `false` otherwise.

    **Example 1:**
      Input:  s = "A man, a plan, a canal: Panama"
      Output: true
      Explanation: "amanaplanacanalpanama" is a palindrome.

    **Example 2:**
      Input:  s = "race a car"
      Output: false
      Explanation: "raceacar" is not a palindrome.

    **Example 3:**
      Input:  s = " "
      Output: true
      Explanation: s is an empty string "" after removing non-alphanumeric characters.
        Since an empty string reads the same forward and backward, it is a palindrome.

    **Constraints:**
      - 1 <= s.length <= 2 * 10^5
      - s consists only of printable ASCII characters.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end of the string. Skip non-alphanumeric characters on
    both sides. Compare characters case-insensitively — if they differ at any point, return
    False. If the pointers meet without a mismatch, return True.
  solution: |
    def is_palindrome(s: str) -> bool:
        l, r = 0, len(s) - 1
        while l < r:
            while l < r and not s[l].isalnum():
                l += 1
            while l < r and not s[r].isalnum():
                r -= 1
            if s[l].lower() != s[r].lower():
                return False
            l += 1
            r -= 1
        return True
- id: 128
  title: "Longest Consecutive Sequence"
  difficulty: Medium
  tags: [Array, Hash Table, Union Find]
  verified: false
  description: |
    Given an unsorted array of integers `nums`, return the length of the longest consecutive
    elements sequence.

    You must write an algorithm that runs in `O(n)` time.

    **Example 1:**
      Input:  nums = [100,4,200,1,3,2]
      Output: 4
      Explanation: The longest consecutive elements sequence is [1, 2, 3, 4]. Therefore its
        length is 4.

    **Example 2:**
      Input:  nums = [0,3,7,2,5,8,1,6,0,4]
      Output: 9

    **Constraints:**
      - 0 <= nums.length <= 10^5
      - -10^9 <= nums[i] <= 10^9
  easy_time: "O(n)"
  easy_space: "O(n)"
  easy_approach: |
    Put all numbers into a hash set for O(1) lookup.
    For each number, check if (num - 1) is absent — that means it's the start of a sequence.
    From each sequence start, extend right while consecutive numbers exist and track the max length.
    Each number is visited at most twice overall, so the algorithm is O(n).
  easy_solution: |
    def longest_consecutive(nums: list[int]) -> int:
        num_set = set(nums)
        best = 0
        for num in num_set:
            if num - 1 not in num_set:
                length = 1
                while num + length in num_set:
                    length += 1
                best = max(best, length)
        return best
  time: "O(n)"
  space: "O(n)"
  approach: |
    Put all numbers into a hash set for O(1) lookup.
    For each number, check if (num - 1) is absent — that means it's the start of a sequence.
    From each sequence start, extend right while consecutive numbers exist and track the max length.
    Each number is visited at most twice overall, so the algorithm is O(n).
  solution: |
    def longest_consecutive(nums: list[int]) -> int:
        num_set = set(nums)
        best = 0
        for num in num_set:
            if num - 1 not in num_set:
                length = 1
                while num + length in num_set:
                    length += 1
                best = max(best, length)
        return best
- id: 138
  title: "Copy List With Random Pointer"
  difficulty: Medium
  tags: [Hash Table, Linked List]
  verified: false
  description: |
    A linked list of length `n` is given such that each node contains an additional **random
    pointer**, which could point to any node in the list, or `null`.

    Construct a **deep copy** of the list. The deep copy should consist of exactly `n` **brand
    new** nodes, where each new node has its value set to the value of its corresponding
    original node. Both the `next` and `random` pointer of the new nodes should point to new
    nodes in the copied list such that the pointers in the original list and copied list
    represent the same list state. **None of the pointers in the new list should point to
    nodes in the original list.**

    Return the head of the copied linked list.

    **Example 1:**
      Input:  head = [[7,null],[13,0],[11,4],[10,2],[1,0]]
      Output: [[7,null],[13,0],[11,4],[10,2],[1,0]]

    **Example 2:**
      Input:  head = [[1,1],[2,1]]
      Output: [[1,1],[2,1]]

    **Example 3:**
      Input:  head = [[3,null],[3,0],[3,null]]
      Output: [[3,null],[3,0],[3,null]]

    **Constraints:**
      - 0 <= n <= 1000
      - -10^4 <= Node.val <= 10^4
      - Node.random is null or is pointing to some node in the linked list.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a hash map from original nodes to their new copies, pre-seeded with {None: None}.
    First pass: create all new nodes. Second pass: assign next and random pointers using the
    map to translate original references to new copies.
  solution: |
    def copyRandomList(head: Optional[Node]) -> Optional[Node]:
        old_to_new = {None: None}
        cur = head
        while cur:
            old_to_new[cur] = Node(cur.val)
            cur = cur.next
        cur = head
        while cur:
            old_to_new[cur].next = old_to_new[cur.next]
            old_to_new[cur].random = old_to_new[cur.random]
            cur = cur.next
        return old_to_new[head]
- id: 141
  title: "Linked List Cycle"
  difficulty: Easy
  tags: [Hash Table, Linked List, Two Pointers]
  verified: false
  description: |
    Given `head`, the head of a linked list, determine if the linked list has a **cycle** in it.

    There is a cycle in a linked list if there is some node in the list that can be reached
    again by continuously following the `next` pointer. Internally, `pos` is used to denote
    the index of the node that tail's `next` pointer is connected to. **Note that `pos` is not
    passed as a parameter**.

    Return `true` if there is a cycle in the linked list. Otherwise, return `false`.

    **Example 1:**
      Input:  head = [3,2,0,-4], pos = 1
      Output: true
      Explanation: There is a cycle in the linked list, where the tail connects to the 1st
        node (0-indexed).

    **Example 2:**
      Input:  head = [1,2], pos = 0
      Output: true
      Explanation: There is a cycle in the linked list, where the tail connects to the 0th node.

    **Example 3:**
      Input:  head = [1], pos = -1
      Output: false
      Explanation: There is no cycle in the linked list.

    **Constraints:**
      - The number of the nodes in the list is in the range [0, 10^4].
      - -10^5 <= Node.val <= 10^5
      - pos is -1 or a valid index in the linked-list.

    **Follow up:** Can you solve it using `O(1)` (i.e. constant) memory?
  time: "O(n)"
  space: "O(1)"
  approach: |
    Floyd's cycle detection (tortoise and hare). Use slow and fast pointers both starting at
    head. Slow advances one step; fast advances two. If they ever meet, a cycle exists. If fast
    reaches null, there is no cycle.
  solution: |
    def hasCycle(head: Optional[ListNode]) -> bool:
        slow, fast = head, head
        while fast and fast.next:
            slow = slow.next
            fast = fast.next.next
            if slow == fast:
                return True
        return False
- id: 143
  title: "Reorder List"
  difficulty: Medium
  tags: [Linked List, Two Pointers, Stack, Recursion]
  verified: false
  description: |
    You are given the head of a singly linked-list:

    `L0 → L1 → … → Ln - 1 → Ln`

    Reorder it to:

    `L0 → Ln → L1 → Ln - 1 → L2 → Ln - 2 → …`

    You may not modify the values in the list's nodes. Only nodes themselves may be changed.

    **Example 1:**
      Input:  head = [1,2,3,4]
      Output: [1,4,2,3]

    **Example 2:**
      Input:  head = [1,2,3,4,5]
      Output: [1,5,2,4,3]

    **Constraints:**
      - The number of nodes in the list is in the range [1, 5 * 10^4].
      - 1 <= Node.val <= 1000
  time: "O(n)"
  space: "O(1)"
  approach: |
    Three steps: (1) Find the middle of the list using slow/fast pointers. (2) Reverse the
    second half in place. (3) Merge the two halves by alternating one node from each half
    until the second half is exhausted.
  solution: |
    def reorderList(head: Optional[ListNode]) -> None:
        slow, fast = head, head.next
        while fast and fast.next:
            slow = slow.next
            fast = fast.next.next
        second = slow.next
        slow.next = None
        prev = None
        while second:
            tmp = second.next
            second.next = prev
            prev = second
            second = tmp
        first, second = head, prev
        while second:
            tmp1, tmp2 = first.next, second.next
            first.next = second
            second.next = tmp1
            first, second = tmp1, tmp2
- id: 146
  title: "LRU Cache"
  difficulty: Medium
  tags: [Hash Table, Linked List, Design, Doubly-Linked List]
  verified: false
  description: |
    Design a data structure that follows the constraints of a **Least Recently Used (LRU)
    cache**.

    Implement the `LRUCache` class:
      - `LRUCache(int capacity)` Initialize the LRU cache with **positive** size `capacity`.
      - `int get(int key)` Return the value of the `key` if the key exists, otherwise return
        `-1`.
      - `void put(int key, int value)` Update the value of the `key` if the `key` exists.
        Otherwise, add the `key-value` pair to the cache. If the number of keys exceeds the
        `capacity` from this operation, **evict** the least recently used key.

    The functions `get` and `put` must each run in `O(1)` average time complexity.

    **Example 1:**
      Input:
        ["LRUCache", "put", "put", "get", "put", "get", "put", "get", "get", "get"]
        [[2], [1, 1], [2, 2], [1], [3, 3], [2], [4, 4], [1], [3], [4]]
      Output: [null, null, null, 1, null, -1, null, -1, 3, 4]
      Explanation:
        LRUCache lRUCache = new LRUCache(2);
        lRUCache.put(1, 1); // cache is {1=1}
        lRUCache.put(2, 2); // cache is {1=1, 2=2}
        lRUCache.get(1);    // return 1
        lRUCache.put(3, 3); // LRU key was 2, evicts key 2, cache is {1=1, 3=3}
        lRUCache.get(2);    // returns -1 (not found)
        lRUCache.put(4, 4); // LRU key was 1, evicts key 1, cache is {4=4, 3=3}
        lRUCache.get(1);    // return -1 (not found)
        lRUCache.get(3);    // return 3
        lRUCache.get(4);    // return 4

    **Constraints:**
      - 1 <= capacity <= 3000
      - 0 <= key <= 10^4
      - 0 <= value <= 10^5
      - At most 2 * 10^5 calls will be made to get and put.
  time: "O(1)"
  space: "O(n)"
  approach: |
    Combine a hash map (key → node) with a doubly linked list ordered by recency. Maintain
    dummy head (LRU end) and tail (MRU end) sentinels. On get or put, remove the node from its
    current position and reinsert it just before the tail. On eviction, remove the node just
    after the head (the least recently used item).
  solution: |
    class Node:
        def __init__(self, key, val):
            self.key, self.val = key, val
            self.prev = self.next = None

    class LRUCache:
        def __init__(self, capacity: int):
            self.cap = capacity
            self.cache = {}
            self.left = Node(0, 0)
            self.right = Node(0, 0)
            self.left.next = self.right
            self.right.prev = self.left

        def remove(self, node):
            prev, nxt = node.prev, node.next
            prev.next, nxt.prev = nxt, prev

        def insert(self, node):
            prev, nxt = self.right.prev, self.right
            prev.next = nxt.prev = node
            node.next, node.prev = nxt, prev

        def get(self, key: int) -> int:
            if key in self.cache:
                self.remove(self.cache[key])
                self.insert(self.cache[key])
                return self.cache[key].val
            return -1

        def put(self, key: int, value: int) -> None:
            if key in self.cache:
                self.remove(self.cache[key])
            self.cache[key] = Node(key, value)
            self.insert(self.cache[key])
            if len(self.cache) > self.cap:
                lru = self.left.next
                self.remove(lru)
                del self.cache[lru.key]
- id: 150
  title: "Evaluate Reverse Polish Notation"
  difficulty: Medium
  tags: [Array, Math, Stack]
  verified: false
  description: |
    You are given an array of strings `tokens` that represents an arithmetic expression in
    **Reverse Polish Notation**.

    Evaluate the expression. Return an integer that represents the value of the expression.

    **Note:**
      - The valid operators are `'+'`, `'-'`, `'*'`, and `'/'`.
      - Each operand may be an integer or another expression.
      - Division between two integers always **truncates toward zero**.
      - There will not be any division by zero.
      - The input represents a valid arithmetic expression in reverse polish notation.
      - The answer and all intermediate calculations can be represented in a **32-bit** integer.

    **Example 1:**
      Input:  tokens = ["2","1","+","3","*"]
      Output: 9
      Explanation: ((2 + 1) * 3) = 9

    **Example 2:**
      Input:  tokens = ["4","13","5","/","+"]
      Output: 6
      Explanation: (4 + (13 / 5)) = 6

    **Example 3:**
      Input:  tokens = ["10","6","9","3","+","-11","*","/","*","17","+","5","+"]
      Output: 22
      Explanation: ((10 * (6 / ((9 + 3) * -11))) + 17) + 5 = 22

    **Constraints:**
      - 1 <= tokens.length <= 10^4
      - tokens[i] is either an operator `"+"`, `"-"`, `"*"`, or `"/"`, or an integer in the
        range `[-200, 200]`.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a stack. For each token, if it is a number push it. If it is an operator, pop two
    operands (b then a), apply the operation (a op b), and push the result. For division,
    use int(a / b) to truncate toward zero. The final answer is the single remaining value
    on the stack.
  solution: |
    def eval_rpn(tokens: list[str]) -> int:
        stack = []
        for t in tokens:
            if t == '+':
                stack.append(stack.pop() + stack.pop())
            elif t == '-':
                b, a = stack.pop(), stack.pop()
                stack.append(a - b)
            elif t == '*':
                stack.append(stack.pop() * stack.pop())
            elif t == '/':
                b, a = stack.pop(), stack.pop()
                stack.append(int(a / b))
            else:
                stack.append(int(t))
        return stack[0]
- id: 153
  title: "Find Minimum In Rotated Sorted Array"
  difficulty: Medium
  tags: [Array, Binary Search]
  verified: false
  description: |
    Suppose an array of length `n` sorted in ascending order is **rotated** between `1` and `n`
    times. For example, the array `nums = [0,1,2,4,5,6,7]` might become:
      - `[4,5,6,7,0,1,2]` if it was rotated `4` times.
      - `[0,1,2,4,5,6,7]` if it was rotated `7` times.

    Notice that **rotating** an array `[a[0], a[1], a[2], ..., a[n-1]]` 1 time results in the
    array `[a[n-1], a[0], a[1], a[2], ..., a[n-2]]`.

    Given the sorted rotated array `nums` of **unique** elements, return the **minimum element**
    of this array.

    You must write an algorithm that runs in `O(log n)` time.

    **Example 1:**
      Input:  nums = [3,4,5,1,2]
      Output: 1
      Explanation: The original array was [1,2,3,4,5] rotated 3 times.

    **Example 2:**
      Input:  nums = [4,5,6,7,0,1,2]
      Output: 0
      Explanation: The original array was [0,1,2,4,5,6,7] and it was rotated 4 times.

    **Example 3:**
      Input:  nums = [11,13,15,17]
      Output: 11
      Explanation: The original array was [11,13,15,17] and it was rotated 4 times.

    **Constraints:**
      - n == nums.length
      - 1 <= n <= 5000
      - -5000 <= nums[i] <= 5000
      - All the integers of nums are unique.
      - nums is sorted and rotated between 1 and n times.
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Binary search tracking the minimum seen so far. If nums[l] < nums[r], the current
    subarray is fully sorted so nums[l] is the local minimum — record it and break. Otherwise
    compute mid, update res with nums[mid], and detect which half contains the rotation: if
    nums[mid] >= nums[l], the left half is sorted and the minimum lies in the right half
    (l = mid + 1); otherwise search the left half (r = mid - 1).
  solution: |
    def find_min(nums: list[int]) -> int:
        l, r = 0, len(nums) - 1
        res = nums[0]
        while l <= r:
            if nums[l] < nums[r]:
                res = min(res, nums[l])
                break
            mid = (l + r) // 2
            res = min(res, nums[mid])
            if nums[mid] >= nums[l]:
                l = mid + 1
            else:
                r = mid - 1
        return res
- id: 155
  title: "Min Stack"
  difficulty: Medium
  tags: [Stack, Design]
  verified: false
  description: |
    Design a stack that supports push, pop, top, and retrieving the minimum element in
    constant time.

    Implement the `MinStack` class:
      - `MinStack()` initializes the stack object.
      - `void push(int val)` pushes the element `val` onto the stack.
      - `void pop()` removes the element on the top of the stack.
      - `int top()` gets the top element of the stack.
      - `int getMin()` retrieves the minimum element in the stack.

    You must implement a solution with `O(1)` time complexity for each function.

    **Example 1:**
      Input:
        ["MinStack","push","push","push","getMin","pop","top","getMin"]
        [[],[-3],[0],[-2],[],[],[],[]]
      Output: [null,null,null,null,-3,null,0,-2]
      Explanation:
        MinStack minStack = new MinStack();
        minStack.push(-3);
        minStack.push(0);
        minStack.push(-2);
        minStack.getMin(); // return -3
        minStack.pop();
        minStack.top();    // return 0
        minStack.getMin(); // return -3

    **Constraints:**
      - -2^31 <= val <= 2^31 - 1
      - Methods pop, top and getMin operations will always be called on non-empty stacks.
      - At most 3 * 10^4 calls will be made to push, pop, top, and getMin.
  time: "O(1)"
  space: "O(n)"
  approach: |
    Use two stacks: one for values and one to track the running minimum. On each push,
    append the new value to the main stack and append the minimum of the new value and the
    current min (stack top) to the min stack. On pop, pop both stacks. getMin() returns the
    top of the min stack.
  solution: |
    class MinStack:
        def __init__(self):
            self.stack = []
            self.min_stack = []

        def push(self, val: int) -> None:
            self.stack.append(val)
            min_val = min(val, self.min_stack[-1] if self.min_stack else val)
            self.min_stack.append(min_val)

        def pop(self) -> None:
            self.stack.pop()
            self.min_stack.pop()

        def top(self) -> int:
            return self.stack[-1]

        def getMin(self) -> int:
            return self.min_stack[-1]
- id: 167
  title: "Two Sum II - Input Array Is Sorted"
  difficulty: Medium
  tags: [Array, Two Pointers, Binary Search]
  verified: false
  description: |
    Given a **1-indexed** array of integers `numbers` that is already **sorted in non-decreasing
    order**, find two numbers such that they add up to a specific `target` number. Let these two
    numbers be `numbers[index1]` and `numbers[index2]` where
    `1 <= index1 < index2 <= numbers.length`.

    Return the indices of the two numbers, `index1` and `index2`, **added by one** as an integer
    array `[index1, index2]` of length 2.

    The tests are generated such that there is **exactly one solution**. You **may not** use the
    same element twice.

    Your solution must use only constant extra space.

    **Example 1:**
      Input:  numbers = [2,7,11,15], target = 9
      Output: [1,2]
      Explanation: The sum of 2 and 7 is 9. Therefore, index1 = 1, index2 = 2. We return [1, 2].

    **Example 2:**
      Input:  numbers = [2,3,4], target = 6
      Output: [1,3]
      Explanation: The sum of 2 and 4 is 6. Therefore index1 = 1, index2 = 3. We return [1, 3].

    **Example 3:**
      Input:  numbers = [-1,0], target = -1
      Output: [1,2]
      Explanation: The sum of -1 and 0 is -1. Therefore index1 = 1, index2 = 2. We return [1, 2].

    **Constraints:**
      - 2 <= numbers.length <= 3 * 10^4
      - -1000 <= numbers[i] <= 1000
      - numbers is sorted in non-decreasing order.
      - -1000 <= target <= 1000
      - The tests are generated such that there is exactly one solution.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two pointers starting at each end. If the sum equals target, return the 1-indexed
    positions. If the sum is greater than target, move the right pointer left to decrease it.
    If less, move the left pointer right to increase it. The sorted order guarantees
    convergence to exactly one solution.
  solution: |
    def two_sum(numbers: list[int], target: int) -> list[int]:
        l, r = 0, len(numbers) - 1
        while l < r:
            s = numbers[l] + numbers[r]
            if s == target:
                return [l + 1, r + 1]
            elif s > target:
                r -= 1
            else:
                l += 1
        return []
- id: 199
  title: "Binary Tree Right Side View"
  difficulty: Medium
  tags: [Tree, BFS, DFS]
  verified: false
  description: |
    Given the `root` of a binary tree, imagine yourself standing on the **right side** of it,
    return the values of the nodes you can see ordered from top to bottom.

    **Example 1:**
      Input:  root = [1,2,3,null,5,null,4]
      Output: [1,3,4]

    **Example 2:**
      Input:  root = [1,2,3,4,null,null,null,5]
      Output: [1,3,4]

    **Example 3:**
      Input:  root = [1,null,3]
      Output: [1,3]

    **Example 4:**
      Input:  root = []
      Output: []

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 100].
      - -100 <= Node.val <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    BFS level by level. For each level, the last node processed is the rightmost node visible
    from the right side. Append its value to the result.
  solution: |
    def rightSideView(root: Optional[TreeNode]) -> list[int]:
        res = []
        q = collections.deque()
        if root:
            q.append(root)
        while q:
            rightSide = None
            for _ in range(len(q)):
                node = q.popleft()
                if node:
                    rightSide = node
                    q.append(node.left)
                    q.append(node.right)
            if rightSide:
                res.append(rightSide.val)
        return res
- id: 206
  title: "Reverse Linked List"
  difficulty: Easy
  tags: [Linked List, Recursion]
  verified: false
  description: |
    Given the head of a singly linked list, reverse the list, and return the reversed list.

    **Example 1:**
      Input:  head = [1,2,3,4,5]
      Output: [5,4,3,2,1]

    **Example 2:**
      Input:  head = [1,2]
      Output: [2,1]

    **Example 3:**
      Input:  head = [1]
      Output: [1]

    **Constraints:**
      - The number of nodes in the list is the range [0, 5000].
      - -5000 <= Node.val <= 5000

    **Follow up:** A linked list can be reversed either iteratively or recursively. Could you
    implement both?
  time: "O(n)"
  space: "O(1)"
  approach: |
    Iterative: maintain prev (starts as None) and curr (starts at head). At each step, save
    curr.next, point curr.next back to prev, then advance both pointers. When curr is None,
    prev is the new head.
  solution: |
    def reverseList(head: Optional[ListNode]) -> Optional[ListNode]:
        prev, curr = None, head
        while curr:
            next_node = curr.next
            curr.next = prev
            prev = curr
            curr = next_node
        return prev
- id: 217
  title: "Contains Duplicate"
  difficulty: Easy
  tags: [Array, Hash Table, Sorting]
  verified: false
  description: |
    Given an integer array `nums`, return `True` if any value appears **at least twice**
    in the array, and return `False` if every element is distinct.

    **Example 1:**
      Input:  nums = [1,2,3,1]
      Output: True

    **Example 2:**
      Input:  nums = [1,2,3,4]
      Output: False

    **Example 3:**
      Input:  nums = [1,1,1,3,3,4,3,2,4,2]
      Output: True

    **Constraints:**
      - 1 <= nums.length <= 10^5
      - -10^9 <= nums[i] <= 10^9
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a hash set to track seen numbers as you iterate.
    For each element, check if it's already in the set.
    If yes → duplicate found. If no → add it to the set.
  solution: |
    def contains_duplicate(nums: list[int]) -> bool:
        seen = set()
        for num in nums:
            if num in seen:
                return True
            seen.add(num)
        return False
- id: 226
  title: "Invert Binary Tree"
  difficulty: Easy
  tags: [Tree, DFS, BFS]
  verified: false
  description: |
    Given the `root` of a binary tree, invert the tree, and return its root.

    **Example 1:**
      Input:  root = [4,2,7,1,3,6,9]
      Output: [4,7,2,9,6,3,1]

    **Example 2:**
      Input:  root = [2,1,3]
      Output: [2,3,1]

    **Example 3:**
      Input:  root = []
      Output: []

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 100].
      - -100 <= Node.val <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    Recursively swap left and right children at each node, then recurse into both subtrees.
  solution: |
    def invertTree(root: Optional[TreeNode]) -> Optional[TreeNode]:
        if not root:
            return None
        root.left, root.right = root.right, root.left
        invertTree(root.left)
        invertTree(root.right)
        return root
- id: 230
  title: "Kth Smallest Element In a Bst"
