  approach: |
    Iterative in-order traversal (left, root, right) using a stack, which visits BST nodes in
    ascending order. Decrement k each time a node is popped; return the value when k reaches 0.
  solution: |
    def kthSmallest(root: Optional[TreeNode], k: int) -> int:
        stack = []
        curr = root
        while True:
            while curr:
                stack.append(curr)
                curr = curr.left
            curr = stack.pop()
            k -= 1
            if k == 0:
                return curr.val
            curr = curr.right
- id: 235
  title: "Lowest Common Ancestor of a Binary Search Tree"
  difficulty: Medium
  tags: [Tree, DFS, BST]
  verified: false
  description: |
    Given a binary search tree (BST), find the lowest common ancestor (LCA) node of two given
    nodes in the BST.

    According to the definition of LCA on Wikipedia: "The lowest common ancestor is defined
    between two nodes `p` and `q` as the lowest node in `T` that has both `p` and `q` as
    descendants (where we allow **a node to be a descendant of itself**)."

    **Example 1:**
      Input:  root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 8
      Output: 6
      Explanation: The LCA of nodes 2 and 8 is 6.

    **Example 2:**
      Input:  root = [6,2,8,0,4,7,9,null,null,3,5], p = 2, q = 4
      Output: 2
      Explanation: The LCA of nodes 2 and 4 is 2, since a node can be a descendant of itself.

    **Constraints:**
      - The number of nodes in the tree is in the range [2, 10^5].
      - -10^9 <= Node.val <= 10^9
      - All Node.val are unique.
      - p != q
      - p and q will exist in the BST.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use the BST property. If both p and q are less than the current node, go left. If both are
    greater, go right. Otherwise the current node is the split point and thus the LCA.
  solution: |
    def lowestCommonAncestor(root: TreeNode, p: TreeNode, q: TreeNode) -> TreeNode:
        while True:
            if p.val < root.val and q.val < root.val:
                root = root.left
            elif p.val > root.val and q.val > root.val:
                root = root.right
            else:
                return root
- id: 238
  title: "Product of Array Except Self"
  difficulty: Medium
  tags: [Array, Prefix Sum]
  verified: false
  description: |
    Given an integer array `nums`, return an array `answer` such that `answer[i]` is equal to
    the product of all the elements of `nums` except `nums[i]`.

    The product of any prefix or suffix of `nums` is **guaranteed** to fit in a **32-bit** integer.

    You must write an algorithm that runs in `O(n)` time and without using the division operation.

    **Example 1:**
      Input:  nums = [1,2,3,4]
      Output: [24,12,8,6]

    **Example 2:**
      Input:  nums = [-1,1,0,-3,3]
      Output: [0,0,9,0,0]

    **Constraints:**
      - 2 <= nums.length <= 10^5
      - -30 <= nums[i] <= 30
      - The product of any prefix or suffix of nums is guaranteed to fit in a 32-bit integer.

    **Follow up:** Can you solve the problem in `O(1)` extra space complexity? (The output array
    does not count as extra space for space complexity analysis.)
  time: "O(n)"
  space: "O(1)"
  approach: |
    Two-pass prefix/suffix approach using the output array itself.
    First pass (left → right): store the running prefix product before each index.
    Second pass (right → left): multiply each position by the running suffix product.
    No extra array needed — only two scalar accumulators.
  solution: |
    def product_except_self(nums: list[int]) -> list[int]:
        n = len(nums)
        result = [1] * n

        prefix = 1
        for i in range(n):
            result[i] = prefix
            prefix *= nums[i]

        suffix = 1
        for i in range(n - 1, -1, -1):
            result[i] *= suffix
            suffix *= nums[i]

        return result
- id: 239
  title: "Sliding Window Maximum"
  difficulty: Hard
  tags: [Array, Queue, Sliding Window, Heap (Priority Queue), Monotonic Queue]
  verified: false
  description: |
    You are given an array of integers `nums`, there is a sliding window of size `k` which is
    moving from the very left of the array to the very right. You can only see the `k` numbers
    in the window. Each time the sliding window moves right by one position.

    Return the max sliding window.

    **Example 1:**
      Input:  nums = [1,3,-1,-3,5,3,6,7], k = 3
      Output: [3,3,5,5,6,7]
      Explanation:
        Window position            Max
        ---------------           -----
        [1  3  -1] -3  5  3  6  7   3
         1 [3  -1  -3] 5  3  6  7   3
         1  3 [-1  -3  5] 3  6  7   5
         1  3  -1 [-3  5  3] 6  7   5
         1  3  -1  -3 [5  3  6] 7   6
         1  3  -1  -3  5 [3  6  7]  7

    **Example 2:**
      Input:  nums = [1], k = 1
      Output: [1]

    **Constraints:**
      - 1 <= nums.length <= 10^5
      - -10^4 <= nums[i] <= 10^4
      - 1 <= k <= nums.length
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a monotonic decreasing deque of indices. For each new element r, pop from the back
    while the element there is smaller than nums[r] — those indices can never be the window
    maximum. Remove the front index if it has left the window (index < l). Append r. Once the
    window reaches size k, record nums[deque[0]] as the current maximum and advance l.
  solution: |
    def max_sliding_window(nums: list[int], k: int) -> list[int]:
        output = []
        q = deque()  # indices
        l = r = 0
        while r < len(nums):
            while q and nums[q[-1]] < nums[r]:
                q.pop()
            q.append(r)
            if l > q[0]:
                q.popleft()
            if (r + 1) >= k:
                output.append(nums[q[0]])
                l += 1
            r += 1
        return output
- id: 242
  title: "Valid Anagram"
  difficulty: Easy
  tags: [Hash Table, String, Sorting]
  verified: false
  description: |
    Given two strings `s` and `t`, return `true` if `t` is an anagram of `s`, and `false`
    otherwise.

    **Example 1:**
      Input:  s = "anagram", t = "nagaram"
      Output: true

    **Example 2:**
      Input:  s = "rat", t = "car"
      Output: false

    **Constraints:**
      - 1 <= s.length, t.length <= 5 * 10^4
      - s and t consist of lowercase English letters.

    **Follow up:** What if the inputs contain Unicode characters? How would you adapt your
    solution to such a case?
  time: "O(n)"
  space: "O(1)"
  approach: |
    If lengths differ, immediately return False.
    Use a hash map to count character frequencies in s, then decrement for each character in t.
    If any count goes negative or a character is missing, return False.
    If all counts reach zero, the strings are anagrams.
  solution: |
    def is_anagram(s: str, t: str) -> bool:
        if len(s) != len(t):
            return False
        count = {}
        for c in s:
            count[c] = count.get(c, 0) + 1
        for c in t:
            if c not in count:
                return False
            count[c] -= 1
            if count[c] == 0:
                del count[c]
        return len(count) == 0
- id: 271
  title: "Encode and Decode Strings"
  difficulty: Medium
  tags: [Array, String, Design]
  verified: false
  description: |
    Design an algorithm to encode **a list of strings** to **a single string**. The encoded
    string is then sent over the network and is decoded back to the original list of strings.

    Please implement `encode` and `decode`.

    **Example 1:**
      Input:  dummy_input = ["Hello","World"]
      Output: ["Hello","World"]
      Explanation: Machine 1 encodes ["Hello","World"] into a single string, then Machine 2
        decodes it back to the original list.

    **Example 2:**
      Input:  dummy_input = [""]
      Output: [""]

    **Constraints:**
      - 1 <= strs.length <= 200
      - 0 <= strs[i].length <= 200
      - strs[i] contains any possible characters out of 256 valid ASCII characters.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use length-prefixed encoding: for each string, write its length, a '#' delimiter, then the
    string content. During decoding, read up to the next '#' to get the length, then slice
    exactly that many characters. This handles any character including '#' itself.
  solution: |
    def encode(strs: list[str]) -> str:
        return "".join(f"{len(s)}#{s}" for s in strs)

    def decode(s: str) -> list[str]:
        result = []
        i = 0
        while i < len(s):
            j = s.index("#", i)
            length = int(s[i:j])
            result.append(s[j + 1:j + 1 + length])
            i = j + 1 + length
        return result
- id: 287
  title: "Find The Duplicate Number"
  difficulty: Medium
  tags: [Array, Two Pointers, Binary Search, Bit Manipulation]
  verified: false
  description: |
    Given an array of integers `nums` containing `n + 1` integers where each integer is in the
    range `[1, n]` inclusive.

    There is only **one repeated number** in `nums`, return this repeated number.

    You must solve the problem **without** modifying the array `nums` and uses only constant
    extra space.

    **Example 1:**
      Input:  nums = [1,3,4,2,2]
      Output: 2

    **Example 2:**
      Input:  nums = [3,1,3,4,2]
      Output: 3

    **Example 3:**
      Input:  nums = [3,3,3,3,3]
      Output: 3

    **Constraints:**
      - 1 <= n <= 10^5
      - nums.length == n + 1
      - 1 <= nums[i] <= n
      - All the integers in nums appear only once except for precisely one integer which appears
        two or more times.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Floyd's cycle detection: treat each value as a pointer to the next index. The duplicate
    creates a cycle. Phase 1 — find the intersection of slow (1 step) and fast (2 steps)
    pointers. Phase 2 — reset a second slow pointer to index 0 and advance both slow pointers
    one step at a time; where they meet is the duplicate.
  solution: |
    def findDuplicate(nums: list[int]) -> int:
        slow, fast = 0, 0
        while True:
            slow = nums[slow]
            fast = nums[nums[fast]]
            if slow == fast:
                break
        slow2 = 0
        while True:
            slow = nums[slow]
            slow2 = nums[slow2]
            if slow == slow2:
                return slow
- id: 297
  title: "Serialize And Deserialize Binary Tree"
  difficulty: Hard
  tags: [Tree, DFS, BFS, Design]
  verified: false
  description: |
    Serialization is the process of converting a data structure or object into a sequence of bits
    so that it can be stored in a file or memory buffer, or transmitted across a network
    connection link to be reconstructed later in the same or another computer environment.

    Design an algorithm to serialize and deserialize a binary tree. There is no restriction on
    how your serialization/deserialization algorithm should work. You just need to ensure that a
    binary tree can be serialized to a string and this string can be deserialized to the original
    tree structure.

    **Example 1:**
      Input:  root = [1,2,3,null,null,4,5]
      Output: [1,2,3,null,null,4,5]

    **Example 2:**
      Input:  root = []
      Output: []

    **Constraints:**
      - The number of nodes in the tree is in the range [0, 10^4].
      - -1000 <= Node.val <= 1000
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use preorder DFS for both operations. Serialize: record each node value, or "N" for None,
    joined by commas. Deserialize: split by comma, use a shared index pointer and recursively
    build the tree by consuming values left to right.
  solution: |
    class Codec:
        def serialize(self, root):
            res = []

            def dfs(node):
                if not node:
                    res.append("N")
                    return
                res.append(str(node.val))
                dfs(node.left)
                dfs(node.right)

            dfs(root)
            return ",".join(res)

        def deserialize(self, data):
            vals = data.split(",")
            self.i = 0

            def dfs():
                if vals[self.i] == "N":
                    self.i += 1
                    return None
                node = TreeNode(int(vals[self.i]))
                self.i += 1
                node.left = dfs()
                node.right = dfs()
                return node

            return dfs()
- id: 347
  title: "Top K Frequent Elements"
  difficulty: Medium
  tags: [Array, Hash Table, Divide and Conquer, Sorting, Heap, Bucket Sort, Counting, Quickselect]
  verified: false
  description: |
    Given an integer array `nums` and an integer `k`, return the `k` most frequent elements.
    You may return the answer in **any order**.

    **Example 1:**
      Input:  nums = [1,1,1,2,2,3], k = 2
      Output: [1,2]

    **Example 2:**
      Input:  nums = [1], k = 1
      Output: [1]

    **Constraints:**
      - 1 <= nums.length <= 10^5
      - -10^4 <= nums[i] <= 10^4
      - k is in the range [1, the number of unique elements in the array].
      - It is guaranteed that the answer is unique.

    **Follow up:** Your algorithm's time complexity must be better than `O(n log n)`, where n
    is the array's size.
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use bucket sort to achieve O(n). Count frequencies with a hash map, then create an array of
    buckets indexed by frequency (max frequency is at most n). Fill each bucket with numbers
    that have that frequency. Sweep buckets from highest to lowest, collecting elements until
    k are found.
  solution: |
    def top_k_frequent(nums: list[int], k: int) -> list[int]:
        count = {}
        for num in nums:
            count[num] = count.get(num, 0) + 1

        buckets = [[] for _ in range(len(nums) + 1)]
        for num, freq in count.items():
            buckets[freq].append(num)

        result = []
        for i in range(len(buckets) - 1, 0, -1):
            for num in buckets[i]:
                result.append(num)
                if len(result) == k:
                    return result
        return result
- id: 424
  title: "Longest Repeating Character Replacement"
  difficulty: Medium
  tags: [Hash Table, String, Sliding Window]
  verified: false
  description: |
    You are given a string `s` and an integer `k`. You can choose any character of the string
    and change it to any other uppercase English character. You can perform this operation at
    most `k` times.

    Return the length of the longest substring containing the same letter you can get after
    performing the above operations.

    **Example 1:**
      Input:  s = "ABAB", k = 2
      Output: 4
      Explanation: Replace the two 'A's with two 'B's or vice versa.

    **Example 2:**
      Input:  s = "AABABBA", k = 1
      Output: 4
      Explanation: Replace the one 'A' in the middle with 'B' and form "AABBBBA". The
        substring "BBBB" has the longest repeating letters, which is 4. There may exist other
        ways to achieve this answer too.

    **Constraints:**
      - 1 <= s.length <= 10^5
      - s consists of only uppercase English letters.
      - 0 <= k <= s.length
  time: "O(n)"
  space: "O(1)"
  approach: |
    Sliding window with a character frequency map. A window is valid if
    (window_size - max_freq) <= k, meaning we need at most k replacements to make all
    characters the same. Expand the right pointer; if the window becomes invalid, shrink from
    the left. Track the maximum valid window size.
  solution: |
    def character_replacement(s: str, k: int) -> int:
        count = {}
        res = 0
        l = 0
        maxf = 0
        for r in range(len(s)):
            count[s[r]] = 1 + count.get(s[r], 0)
            maxf = max(maxf, count[s[r]])
            while (r - l + 1) - maxf > k:
                count[s[l]] -= 1
                l += 1
            res = max(res, r - l + 1)
        return res
- id: 543
  title: "Diameter of Binary Tree"
  difficulty: Easy
  tags: [Tree, DFS]
  verified: false
  description: |
    Given the `root` of a binary tree, return the length of the **diameter** of the tree.

    The **diameter** of a binary tree is the **length** of the longest path between any two
    nodes in a tree. This path may or may not pass through the `root`.

    The **length** of a path between two nodes is represented by the number of edges between them.

    **Example 1:**
      Input:  root = [1,2,3,4,5]
      Output: 3
      Explanation: 3 is the length of the path [4,2,1,3] or [5,2,1,3].

    **Example 2:**
      Input:  root = [1,2]
      Output: 1

    **Constraints:**
      - The number of nodes in the tree is in the range [1, 10^4].
      - -100 <= Node.val <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS returning the height of each subtree. At each node, compute left_height + right_height
    as the candidate diameter through that node and update the global max. Return
    1 + max(left, right) as the height.
  solution: |
    def diameterOfBinaryTree(root: Optional[TreeNode]) -> int:
        res = 0

        def dfs(root):
            nonlocal res
            if not root:
                return 0
            left = dfs(root.left)
            right = dfs(root.right)
            res = max(res, left + right)
            return 1 + max(left, right)

        dfs(root)
        return res
- id: 567
  title: "Permutation In String"
  difficulty: Medium
  tags: [Hash Table, Two Pointers, String, Sliding Window]
  verified: false
  description: |
    Given two strings `s1` and `s2`, return `true` if `s2` contains a **permutation** of `s1`,
    or `false` otherwise.

    In other words, return `true` if one of `s1`'s permutations is a substring of `s2`.

    **Example 1:**
      Input:  s1 = "ab", s2 = "eidbaooo"
      Output: true
      Explanation: s2 contains one permutation of s1 ("ba").

    **Example 2:**
      Input:  s1 = "ab", s2 = "eidboaoo"
      Output: false

    **Constraints:**
      - 1 <= s1.length, s2.length <= 10^4
      - s1 and s2 consist of lowercase English letters.
  time: "O(n)"
  space: "O(1)"
  approach: |
    Use two character-count arrays of size 26 (one for s1, one for the current window in s2).
    Slide a fixed window of length len(s1) through s2. Track a `matches` counter for how many
    of the 26 positions have equal counts. Update `matches` when adding the entering character
    and removing the leaving character. Return True if matches == 26 at any position.
  solution: |
    def check_inclusion(s1: str, s2: str) -> bool:
        if len(s1) > len(s2):
            return False
        count1, count2 = [0] * 26, [0] * 26
        for i in range(len(s1)):
            count1[ord(s1[i]) - ord('a')] += 1
            count2[ord(s2[i]) - ord('a')] += 1
        matches = sum(1 for i in range(26) if count1[i] == count2[i])
        l = 0
        for r in range(len(s1), len(s2)):
            if matches == 26:
                return True
            idx = ord(s2[r]) - ord('a')
            count2[idx] += 1
            if count1[idx] == count2[idx]:
                matches += 1
            elif count1[idx] + 1 == count2[idx]:
                matches -= 1
            idx = ord(s2[l]) - ord('a')
            count2[idx] -= 1
            if count1[idx] == count2[idx]:
                matches += 1
            elif count1[idx] - 1 == count2[idx]:
                matches -= 1
            l += 1
        return matches == 26
- id: 572
  title: "Subtree of Another Tree"
  difficulty: Easy
  tags: [Tree, DFS, Hash Function]
  verified: false
  description: |
    Given the roots of two binary trees `root` and `subRoot`, return `true` if there is a
    subtree of `root` with the same structure and node values of `subRoot` and `false` otherwise.

    A subtree of a binary tree `tree` is a tree that consists of a node in `tree` and all of
    this node's descendants. The tree `tree` could also be considered as a subtree of itself.

    **Example 1:**
      Input:  root = [3,4,5,1,2], subRoot = [4,1,2]
      Output: true

    **Example 2:**
      Input:  root = [3,4,5,1,2,null,null,null,null,0], subRoot = [4,1,2]
      Output: false

    **Constraints:**
      - The number of nodes in the root tree is in the range [1, 2000].
      - The number of nodes in the subRoot tree is in the range [1, 1000].
      - -10^4 <= root.val <= 10^4
      - -10^4 <= subRoot.val <= 10^4
  time: "O(m * n)"
  space: "O(m + n)"
  approach: |
    For each node in the main tree, check if the subtree rooted there matches subRoot using a
    helper isSameTree function. Return True if any node matches.
  solution: |
    def isSubtree(root: Optional[TreeNode], subRoot: Optional[TreeNode]) -> bool:
        if not subRoot:
            return True
        if not root:
            return False
        if isSameTree(root, subRoot):
            return True
        return isSubtree(root.left, subRoot) or isSubtree(root.right, subRoot)

    def isSameTree(s: Optional[TreeNode], t: Optional[TreeNode]) -> bool:
        if not s and not t:
            return True
        if s and t and s.val == t.val:
            return isSameTree(s.left, t.left) and isSameTree(s.right, t.right)
        return False
- id: 704
  title: "Binary Search"
  difficulty: Easy
  tags: [Array, Binary Search]
  verified: false
  description: |
    Given an array of integers `nums` which is sorted in ascending order, and an integer
    `target`, write a function to search `target` in `nums`. If `target` exists, then return
    its index. Otherwise, return `-1`.

    You must write an algorithm with `O(log n)` runtime complexity.

    **Example 1:**
      Input:  nums = [-1,0,3,5,9,12], target = 9
      Output: 4
      Explanation: 9 exists in nums and its index is 4.

    **Example 2:**
      Input:  nums = [-1,0,3,5,9,12], target = 2
      Output: -1
      Explanation: 2 does not exist in nums so return -1.

    **Constraints:**
      - 1 <= nums.length <= 10^4
      - -10^4 < nums[i], target < 10^4
      - All the integers in nums are unique.
      - nums is sorted in ascending order.
  time: "O(log n)"
  space: "O(1)"
  approach: |
    Initialize l = 0 and r = len(nums) - 1. At each step compute mid = (l + r) // 2. If
    nums[mid] == target return mid. If nums[mid] < target, the answer must be to the right
    (l = mid + 1). Otherwise it must be to the left (r = mid - 1). Return -1 if the loop
    ends without finding target.
  solution: |
    def search(nums: list[int], target: int) -> int:
        l, r = 0, len(nums) - 1
        while l <= r:
            mid = (l + r) // 2
            if nums[mid] == target:
                return mid
            elif nums[mid] < target:
                l = mid + 1
            else:
                r = mid - 1
        return -1
- id: 739
  title: "Daily Temperatures"
  difficulty: Medium
  tags: [Array, Stack, Monotonic Stack]
  verified: false
  description: |
    Given an array of integers `temperatures` represents the daily temperatures, return an
    array `answer` such that `answer[i]` is the number of days you have to wait after the
    `i`th day to get a warmer temperature. If there is no future day for which this is
    possible, keep `answer[i] == 0`.

    **Example 1:**
      Input:  temperatures = [73,74,75,71,69,72,76,73]
      Output: [1,1,4,2,1,1,0,0]

    **Example 2:**
      Input:  temperatures = [30,40,50,60]
      Output: [1,1,1,0]

    **Example 3:**
      Input:  temperatures = [30,60,90]
      Output: [1,1,0]

    **Constraints:**
      - 1 <= temperatures.length <= 10^5
      - 30 <= temperatures[i] <= 100
  time: "O(n)"
  space: "O(n)"
  approach: |
    Use a monotonic decreasing stack of (temperature, index) pairs. For each day, while the
    stack is non-empty and the current temperature is warmer than the top, pop and set the
    answer for the popped index to (current index - popped index). Push the current day.
    Entries remaining in the stack never found a warmer day, so their answer stays 0.
  solution: |
    def daily_temperatures(temperatures: list[int]) -> list[int]:
        res = [0] * len(temperatures)
        stack = []  # (temp, index)
        for i, t in enumerate(temperatures):
            while stack and t > stack[-1][0]:
                _, j = stack.pop()
                res[j] = i - j
            stack.append((t, i))
        return res
- id: 853
  title: "Car Fleet"
  difficulty: Medium
  tags: [Array, Stack, Sorting, Monotonic Stack]
  verified: false
  description: |
    There are `n` cars at given miles away from the starting mile `0`, traveling to their
    destination at `target` miles.

    You are given two integer arrays `position` and `speed`, both of length `n`, where
    `position[i]` is the position of the `i`th car and `speed[i]` is the speed of the `i`th
    car (in miles per hour).

    A car cannot pass another car, but it can catch up and then travel next to it at the speed
    of the slower car.

    A **car fleet** is a non-empty set of cars driving at the same position and same speed.
    A single car is also a car fleet.

    If a car catches up to a car fleet at the moment the fleet reaches the destination, it
    will still be considered as one car fleet.

    Return the number of car fleets that will arrive at the destination.

    **Example 1:**
      Input:  target = 12, position = [10,8,0,5,3], speed = [2,4,1,1,3]
      Output: 3
      Explanation: The cars starting at 10 (speed 2) and 8 (speed 4) become a fleet, meeting
        each other at 12. The car starting at 0 does not catch up to any other car, so it is
        a fleet by itself. The cars starting at 5 (speed 1) and 3 (speed 3) become a fleet,
        meeting each other at 6. The fleet moves at speed 1 until it reaches 12.

    **Example 2:**
      Input:  target = 10, position = [3], speed = [3]
      Output: 1
      Explanation: There is only one car, hence there is only one fleet.

    **Example 3:**
      Input:  target = 100, position = [0,2,4], speed = [4,2,1]
      Output: 1
      Explanation: The cars starting at 0 (speed 4) and 2 (speed 2) become a fleet at
        position 4. The fleet moves at speed 2. Then the fleet (speed 2) and the car at
        position 4 (speed 1) become one fleet at position 6. The fleet moves at speed 1
        until it reaches 100.

    **Constraints:**
      - n == position.length == speed.length
      - 1 <= n <= 10^5
      - 0 < target <= 10^6
      - 0 <= position[i] < target
      - 0 < speed[i] <= 10^6
      - All the values of position are unique.
  time: "O(n log n)"
  space: "O(n)"
  approach: |
    Sort cars by starting position in descending order. Compute each car's time to reach the
    target. Use a stack: if the current car's time is greater than the top of the stack, it
    cannot catch the car ahead and forms a new fleet — push it. Otherwise it joins the fleet
    ahead and is ignored. The stack size at the end is the number of fleets.
  solution: |
    def car_fleet(target: int, position: list[int], speed: list[int]) -> int:
        pairs = sorted(zip(position, speed), reverse=True)
        stack = []
        for pos, spd in pairs:
            time = (target - pos) / spd
            if not stack or time > stack[-1]:
                stack.append(time)
        return len(stack)
- id: 875
  title: "Koko Eating Bananas"
  difficulty: Medium
  tags: [Array, Binary Search]
  verified: false
  description: |
    Koko loves to eat bananas. There are `n` piles of bananas, the `i`th pile has `piles[i]`
    bananas. The guards have gone and will come back in `h` hours.

    Koko can decide her bananas-per-hour eating speed of `k`. Each hour, she chooses some pile
    of bananas and eats `k` bananas from that pile. If the pile has less than `k` bananas, she
    eats all of them instead and will not eat any more bananas during this hour.

    Koko likes to eat slowly but still wants to finish eating all the bananas before the guards
    return.

    Return the minimum integer `k` such that she can eat all the bananas within `h` hours.

    **Example 1:**
      Input:  piles = [3,6,7,11], h = 8
      Output: 4

    **Example 2:**
      Input:  piles = [30,11,23,4,20], h = 5
      Output: 30

    **Example 3:**
      Input:  piles = [30,11,23,4,20], h = 6
      Output: 23

    **Constraints:**
      - 1 <= piles.length <= 10^4
      - piles.length <= h <= 10^9
      - 1 <= piles[i] <= 10^9
  time: "O(log(max(p)) * n)"
  space: "O(1)"
  approach: |
    Binary search on eating speed from 1 to max(piles). For each candidate speed k, compute
    total hours needed as sum of ceil(pile / k) for each pile (using integer arithmetic:
    (pile + k - 1) // k). If total hours <= h the speed is feasible — record it and search
    lower (r = k - 1). Otherwise search higher (l = k + 1).
  solution: |
    def min_eating_speed(piles: list[int], h: int) -> int:
        l, r = 1, max(piles)
        res = r
        while l <= r:
            k = (l + r) // 2
            hours = sum((p + k - 1) // k for p in piles)
            if hours <= h:
                res = k
                r = k - 1
            else:
                l = k + 1
        return res
- id: 981
  title: "Time Based Key Value Store"
  difficulty: Medium
  tags: [Hash Table, String, Binary Search, Design]
  verified: false
  description: |
    Design a time-based key-value data structure that can store multiple values for the same
    key at different time stamps and retrieve the key's value at a certain timestamp.

    Implement the `TimeMap` class:
      - `TimeMap()` Initializes the object of the data structure.
      - `void set(String key, String value, int timestamp)` Stores the key `key` with the
        value `value` at the given time `timestamp`.
      - `String get(String key, int timestamp)` Returns a value such that `set` was called
        previously, with `timestamp_prev <= timestamp`. If there are multiple such values, it
        returns the value associated with the largest `timestamp_prev`. If there are no values,
        it returns `""`.

    **Example 1:**
      Input:
        ["TimeMap", "set", "get", "get", "set", "get", "get"]
        [[], ["foo", "bar", 1], ["foo", 1], ["foo", 3], ["foo", "bar2", 4], ["foo", 4], ["foo", 5]]
      Output: [null, null, "bar", "bar", null, "bar2", "bar2"]
      Explanation:
        TimeMap timeMap = new TimeMap();
        timeMap.set("foo", "bar", 1);
        timeMap.get("foo", 1);  // return "bar"
        timeMap.get("foo", 3);  // return "bar"
        timeMap.set("foo", "bar2", 4);
        timeMap.get("foo", 4);  // return "bar2"
        timeMap.get("foo", 5);  // return "bar2"

    **Constraints:**
      - 1 <= key.length, value.length <= 100
      - key and value consist of lowercase English letters and digits.
      - 1 <= timestamp <= 10^7
      - All the timestamps timestamp of set are strictly increasing.
      - At most 2 * 10^5 calls will be made to set and get.
  time: "O(1) for set, O(log n) for get"
  space: "O(n)"
  approach: |
    Use a hash map where each key maps to a list of (timestamp, value) pairs stored in
    chronological order. For set, append the new pair to the list. For get, binary search the
    list for the largest timestamp <= the query timestamp and return its value, or "" if none
    exists.
  solution: |
    class TimeMap:
        def __init__(self):
            self.store = {}

        def set(self, key: str, value: str, timestamp: int) -> None:
            if key not in self.store:
                self.store[key] = []
            self.store[key].append((timestamp, value))

        def get(self, key: str, timestamp: int) -> str:
            res = ""
            values = self.store.get(key, [])
            l, r = 0, len(values) - 1
            while l <= r:
                mid = (l + r) // 2
                if values[mid][0] <= timestamp:
                    res = values[mid][1]
                    l = mid + 1
                else:
                    r = mid - 1
            return res
- id: 1448
  title: "Count Good Nodes In Binary Tree"
  difficulty: Medium
  tags: [Tree, DFS]
  verified: false
  description: |
    Given a binary tree `root`, a node X in the tree is named **good** if in the path from root
    to X there are no nodes with a value **greater than** X's value.

    Return the number of **good** nodes in the binary tree.

    **Example 1:**
      Input:  root = [3,1,4,3,null,1,5]
      Output: 4
      Explanation: Root Node (3) is always good. Node 4 -> (3,4) is the max in the path from
        root. Node 3 -> (3,1,3) is the max in the path from root. Node 5 -> (3,4,5) is the max.

    **Example 2:**
      Input:  root = [3,3,null,4,2]
      Output: 3
      Explanation: Node 2 -> (3,3,2) is not good because "3" is higher than it.

    **Example 3:**
      Input:  root = [1]
      Output: 1
      Explanation: Root is considered as good.

    **Constraints:**
      - The number of nodes in the binary tree is in the range [1, 10^5].
      - Each node's value is between [-10^4, 10^4].
  time: "O(n)"
  space: "O(n)"
  approach: |
    DFS passing the maximum value seen along the path from root to the current node. A node is
    good if its value >= that maximum. Count good nodes recursively.
  solution: |
    def goodNodes(root: TreeNode) -> int:
        def dfs(node, maxVal):
            if not node:
                return 0
            res = 1 if node.val >= maxVal else 0
            maxVal = max(maxVal, node.val)
            res += dfs(node.left, maxVal)
            res += dfs(node.right, maxVal)
            return res

        return dfs(root, root.val)
